name: QA Daily Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check app is live
        id: health
        run: |
          START_NS=$(date +%s%N)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://alonktz.github.io/TimeManagmentApp/)
          END_NS=$(date +%s%N)
          MS=$(( (END_NS - START_NS) / 1000000 ))
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "response_ms=$MS" >> $GITHUB_OUTPUT
          echo "app_ok=$([ "$STATUS" = "200" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Query Supabase stats
        id: stats
        env:
          SUPABASE_URL: https://yxmbammlzweasjvpouqn.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s \
            "$SUPABASE_URL/rest/v1/profiles?select=id,created_at,status" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            > /tmp/profiles.json

          curl -s \
            "$SUPABASE_URL/rest/v1/time_entries?select=id,user_id,hours,location,created_at" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            > /tmp/entries.json

          curl -s \
            "$SUPABASE_URL/rest/v1/days_off?select=id,user_id,created_at" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            > /tmp/daysoff.json

          python3 << 'PYEOF' >> $GITHUB_OUTPUT
          import json
          from datetime import datetime, timezone, timedelta

          now = datetime.now(timezone.utc)
          cut1d  = (now - timedelta(days=1)).isoformat()
          cut7d  = (now - timedelta(days=7)).isoformat()
          cut30d = (now - timedelta(days=30)).isoformat()

          def load(path):
              try:
                  d = json.load(open(path))
                  return d if isinstance(d, list) else []
              except Exception:
                  return []

          profiles = load('/tmp/profiles.json')
          entries  = load('/tmp/entries.json')
          daysoff  = load('/tmp/daysoff.json')

          # ── Users ──────────────────────────────────────────────
          total_users = len(profiles)
          new_users   = sum(1 for u in profiles if u.get('created_at','') > cut1d)
          pending     = sum(1 for u in profiles if u.get('status') == 'pending')

          # ── Time entries ───────────────────────────────────────
          total_entries = len(entries)
          entries_7d    = [e for e in entries if e.get('created_at','') > cut7d]
          total_hours   = round(sum(e.get('hours') or 0 for e in entries), 1)
          hours_7d      = round(sum(e.get('hours') or 0 for e in entries_7d), 1)
          active_7d     = len(set(e['user_id'] for e in entries_7d if e.get('user_id')))
          home_count    = sum(1 for e in entries if e.get('location') == 'home')
          office_count  = sum(1 for e in entries if e.get('location') == 'office')

          # ── Days off ───────────────────────────────────────────
          total_daysoff = len(daysoff)
          daysoff_30d   = sum(1 for d in daysoff if d.get('created_at','') > cut30d)

          # ── KPIs ───────────────────────────────────────────────
          punch_rate    = round(active_7d / total_users * 100)   if total_users  else 0
          avg_hrs_user  = round(hours_7d  / active_7d,     1)    if active_7d    else 0
          wfh_rate      = round(home_count / total_entries * 100) if total_entries else 0
          avg_daily_hrs = round(hours_7d / 7, 1)

          print(f"total_users={total_users}")
          print(f"new_users={new_users}")
          print(f"pending={pending}")
          print(f"total_entries={total_entries}")
          print(f"entries_7d={len(entries_7d)}")
          print(f"total_hours={total_hours}")
          print(f"hours_7d={hours_7d}")
          print(f"active_7d={active_7d}")
          print(f"home_count={home_count}")
          print(f"office_count={office_count}")
          print(f"total_daysoff={total_daysoff}")
          print(f"daysoff_30d={daysoff_30d}")
          print(f"punch_rate={punch_rate}")
          print(f"avg_hrs_user={avg_hrs_user}")
          print(f"wfh_rate={wfh_rate}")
          print(f"avg_daily_hrs={avg_daily_hrs}")
          PYEOF

      - name: Send email summary
        env:
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          APP_OK:           ${{ steps.health.outputs.app_ok }}
          HTTP_STATUS:      ${{ steps.health.outputs.status }}
          RESPONSE_MS:      ${{ steps.health.outputs.response_ms }}
          TOTAL_USERS:      ${{ steps.stats.outputs.total_users }}
          NEW_USERS:        ${{ steps.stats.outputs.new_users }}
          PENDING:          ${{ steps.stats.outputs.pending }}
          TOTAL_ENTRIES:    ${{ steps.stats.outputs.total_entries }}
          ENTRIES_7D:       ${{ steps.stats.outputs.entries_7d }}
          TOTAL_HOURS:      ${{ steps.stats.outputs.total_hours }}
          HOURS_7D:         ${{ steps.stats.outputs.hours_7d }}
          ACTIVE_7D:        ${{ steps.stats.outputs.active_7d }}
          HOME_COUNT:       ${{ steps.stats.outputs.home_count }}
          OFFICE_COUNT:     ${{ steps.stats.outputs.office_count }}
          TOTAL_DAYSOFF:    ${{ steps.stats.outputs.total_daysoff }}
          DAYSOFF_30D:      ${{ steps.stats.outputs.daysoff_30d }}
          PUNCH_RATE:       ${{ steps.stats.outputs.punch_rate }}
          AVG_HRS_USER:     ${{ steps.stats.outputs.avg_hrs_user }}
          WFH_RATE:         ${{ steps.stats.outputs.wfh_rate }}
          AVG_DAILY_HRS:    ${{ steps.stats.outputs.avg_daily_hrs }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          def v(k): return os.environ.get(k, 'N/A')

          app_ok      = v('APP_OK') == 'true'
          status_text = '✅ LIVE' if app_ok else '🔴 DOWN'
          hdr_color   = '#0f766e' if app_ok else '#dc2626'
          today       = __import__('datetime').date.today().strftime('%d/%m/%Y')

          pending     = v('PENDING')
          pending_cell = (
              f'<span style="background:#fee2e2;color:#dc2626;padding:1px 8px;'
              f'border-radius:10px;font-size:12px;font-weight:700">{pending} ממתינים</span>'
              if pending not in ('0', 'N/A') else pending
          )

          def kpi(val, label, color):
              return (
                  f'<td style="width:25%;padding:0 4px">'
                  f'<div style="background:#fff;border-radius:10px;padding:14px 8px;text-align:center;'
                  f'box-shadow:0 1px 3px rgba(0,0,0,.07)">'
                  f'<div style="font-size:20px;font-weight:700;color:{color}">{val}</div>'
                  f'<div style="font-size:11px;color:#78716c;margin-top:4px;line-height:1.3">{label}</div>'
                  f'</div></td>'
              )

          def stat_row(label, val, highlight=False):
              val_style = 'font-weight:600;' + ('color:#0f766e;' if highlight else '')
              return (
                  f'<tr>'
                  f'<td style="padding:6px 0;color:#78716c;font-size:13px;border-bottom:1px solid #f5f5f4">{label}</td>'
                  f'<td style="padding:6px 0;text-align:left;{val_style}font-size:13px;border-bottom:1px solid #f5f5f4">{val}</td>'
                  f'</tr>'
              )

          html = f"""
          <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Heebo,sans-serif;
                      max-width:560px;margin:0 auto;background:#f5f5f4;
                      padding:20px;direction:rtl;color:#1c1917">

            <!-- Header -->
            <table width="100%" style="background:{hdr_color};border-radius:14px;
                   margin-bottom:14px;border-collapse:collapse">
              <tr>
                <td style="padding:22px 24px">
                  <div style="font-size:11px;color:rgba(255,255,255,.7);
                              letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px">QA יומי · {today}</div>
                  <div style="font-size:22px;font-weight:700;color:#fff">⏱ Timekeeper</div>
                  <div style="margin-top:14px;background:rgba(255,255,255,.18);border-radius:8px;
                              padding:10px 14px;color:#fff;font-size:14px;font-weight:600">
                    {status_text} &nbsp;·&nbsp; HTTP {v('HTTP_STATUS')} &nbsp;·&nbsp; {v('RESPONSE_MS')} ms
                  </div>
                </td>
              </tr>
            </table>

            <!-- KPI row -->
            <table width="100%" style="border-collapse:collapse;margin-bottom:14px">
              <tr>
                {kpi(f"{v('PUNCH_RATE')}%",  "פעילות צוות (7י)",     "#0f766e")}
                {kpi(f"{v('AVG_HRS_USER')}h", "ממוצע שעות/משתמש (7י)", "#2563eb")}
                {kpi(f"{v('AVG_DAILY_HRS')}h","ממוצע שעות יומי (7י)",  "#d97706")}
                {kpi(f"{v('WFH_RATE')}%",     "עבודה מהבית",            "#7c3aed")}
              </tr>
            </table>

            <!-- Users + Entries -->
            <table width="100%" style="border-collapse:collapse;margin-bottom:14px">
              <tr>
                <!-- Users card -->
                <td width="49%" style="vertical-align:top;padding-left:7px">
                  <div style="background:#fff;border-radius:10px;padding:18px;
                              box-shadow:0 1px 3px rgba(0,0,0,.07)">
                    <div style="font-size:11px;font-weight:700;color:#78716c;
                                text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">
                      👥 משתמשים
                    </div>
                    <table width="100%" style="border-collapse:collapse">
                      {stat_row('סה"כ', v('TOTAL_USERS'))}
                      {stat_row('חדשים (24ש)', v('NEW_USERS'), highlight=True)}
                      {stat_row('פעילים (7י)', v('ACTIVE_7D'))}
                      {stat_row('ממתינים לאישור', pending_cell)}
                    </table>
                  </div>
                </td>
                <!-- Entries card -->
                <td width="49%" style="vertical-align:top;padding-right:7px">
                  <div style="background:#fff;border-radius:10px;padding:18px;
                              box-shadow:0 1px 3px rgba(0,0,0,.07)">
                    <div style="font-size:11px;font-weight:700;color:#78716c;
                                text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">
                      ⏱ שעות עבודה
                    </div>
                    <table width="100%" style="border-collapse:collapse">
                      {stat_row('סה"כ רשומות', v('TOTAL_ENTRIES'))}
                      {stat_row('רשומות (7י)', v('ENTRIES_7D'), highlight=True)}
                      {stat_row('סה"כ שעות', v('TOTAL_HOURS'))}
                      {stat_row('שעות (7י)', v('HOURS_7D'), highlight=True)}
                    </table>
                  </div>
                </td>
              </tr>
            </table>

            <!-- Location + Days Off -->
            <table width="100%" style="border-collapse:collapse;margin-bottom:14px">
              <tr>
                <!-- Location card -->
                <td width="49%" style="vertical-align:top;padding-left:7px">
                  <div style="background:#fff;border-radius:10px;padding:18px;
                              box-shadow:0 1px 3px rgba(0,0,0,.07)">
                    <div style="font-size:11px;font-weight:700;color:#78716c;
                                text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">
                      📍 מיקום
                    </div>
                    <table width="100%" style="border-collapse:collapse">
                      {stat_row('🏢 מהמשרד', v('OFFICE_COUNT'))}
                      {stat_row('🏠 מהבית',  v('HOME_COUNT'))}
                    </table>
                  </div>
                </td>
                <!-- Days Off card -->
                <td width="49%" style="vertical-align:top;padding-right:7px">
                  <div style="background:#fff;border-radius:10px;padding:18px;
                              box-shadow:0 1px 3px rgba(0,0,0,.07)">
                    <div style="font-size:11px;font-weight:700;color:#78716c;
                                text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">
                      🌴 ימי חופש
                    </div>
                    <table width="100%" style="border-collapse:collapse">
                      {stat_row('סה"כ', v('TOTAL_DAYSOFF'))}
                      {stat_row('ב-30 יום האחרונים', v('DAYSOFF_30D'), highlight=True)}
                    </table>
                  </div>
                </td>
              </tr>
            </table>

            <!-- Footer -->
            <table width="100%" style="border-collapse:collapse">
              <tr>
                <td style="text-align:center;padding:12px;font-size:12px;color:#a8a29e">
                  <a href="https://alonktz.github.io/TimeManagmentApp/"
                     style="color:#0f766e;text-decoration:none;font-weight:600">
                    פתח את Timekeeper ↗
                  </a>
                  &nbsp;·&nbsp; QA Bot
                </td>
              </tr>
            </table>

          </div>
          """

          subject = (
              f"[{'OK' if app_ok else 'DOWN'}] Timekeeper {today} — "
              f"{v('ACTIVE_7D')} פעילים · {v('HOURS_7D')}h · "
              f"פעילות {v('PUNCH_RATE')}%"
          )

          payload = json.dumps({
              "from": "QA Bot <onboarding@resend.dev>",
              "to":   ["alonkatz135@gmail.com"],
              "subject": subject,
              "html": html,
          }).encode()

          # Write payload to file so curl can send it (urllib blocked by Cloudflare WAF)
          with open('/tmp/email_payload.json', 'w') as f:
              f.write(payload.decode())
          PYEOF

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/email_payload.json
