name: QA Daily Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check app is live
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://alonktz.github.io/TimeManagmentApp/)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "200" ]; then
            echo "app_ok=true" >> $GITHUB_OUTPUT
          else
            echo "app_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Query Supabase user count
        id: users
        env:
          SUPABASE_URL: https://yxmbammlzweasjvpouqn.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          RESPONSE=$(curl -s \
            "$SUPABASE_URL/rest/v1/profiles?select=id,created_at&order=created_at.desc" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")

          TOTAL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "N/A")

          NEW=$(echo "$RESPONSE" | python3 -c "
          import sys,json
          from datetime import datetime, timezone, timedelta
          d=json.load(sys.stdin)
          cutoff=(datetime.now(timezone.utc)-timedelta(days=1)).isoformat()
          print(sum(1 for u in d if u.get('created_at','') > cutoff))
          " 2>/dev/null || echo "0")

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Send email summary
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APP_STATUS: ${{ steps.health.outputs.app_ok }}
          HTTP_STATUS: ${{ steps.health.outputs.status }}
          TOTAL_USERS: ${{ steps.users.outputs.total }}
          NEW_USERS: ${{ steps.users.outputs.new }}
        run: |
          STATUS_EMOJI=$([ "$APP_STATUS" = "true" ] && echo "OK" || echo "DOWN")
          DATE=$(date -u '+%d/%m/%Y')

          BODY=$(cat <<JSONEOF
          {
            "from": "QA Bot <onboarding@resend.dev>",
            "to": ["alonkatz135@gmail.com"],
            "subject": "[${STATUS_EMOJI}] QA Daily ${DATE} - HTTP ${HTTP_STATUS}",
            "html": "<div dir='rtl' style='font-family:sans-serif;max-width:480px'><h2>QA Daily - ${DATE}</h2><table style='border-collapse:collapse;width:100%'><tr><td style='padding:10px;border:1px solid #ddd'>App Status</td><td style='padding:10px;border:1px solid #ddd'>${STATUS_EMOJI} HTTP ${HTTP_STATUS}</td></tr><tr><td style='padding:10px;border:1px solid #ddd'>Total Users</td><td style='padding:10px;border:1px solid #ddd'>${TOTAL_USERS}</td></tr><tr><td style='padding:10px;border:1px solid #ddd'>New (24h)</td><td style='padding:10px;border:1px solid #ddd'>${NEW_USERS}</td></tr></table><p><a href='https://alonktz.github.io/TimeManagmentApp/'>Open App</a></p></div>"
          }
          JSONEOF
          )

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY"
