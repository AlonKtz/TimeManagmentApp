name: QA Daily Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      # Public anon key (same one shipped in the client bundle) — the QA bot uses
      # anon-callable RPCs (qa_stats / qa_cleanup_selftest), so it no longer needs
      # the service_role key at all.
      SB_URL: https://yxmbammlzweasjvpouqn.supabase.co
      SB_ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bWJhbW1sendlYXNqdnBvdXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTg0MjgsImV4cCI6MjA5MjY3NDQyOH0.JZfWJcSyGWVQhj2OScCzTpLvEpVly6IQSXfcKQI-YI0
    steps:

      # ── 1. Live health + perf ──────────────────────────────────────────────
      - name: Check app is live
        id: health
        run: |
          HEADERS=$(curl -sI https://alonktz.github.io/TimeManagmentApp/)
          START_NS=$(date +%s%N)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://alonktz.github.io/TimeManagmentApp/)
          END_NS=$(date +%s%N)
          MS=$(( (END_NS - START_NS) / 1000000 ))

          BUNDLE_BYTES=$(echo "$HEADERS" | grep -i content-length | awk '{print $2}' | tr -d '\r')
          BUNDLE_KB=$(( ${BUNDLE_BYTES:-0} / 1024 ))
          ENCODING=$(echo "$HEADERS" | grep -i content-encoding | awk '{print $2}' | tr -d '\r')
          CACHE=$(echo "$HEADERS" | grep -i cache-control | cut -d: -f2- | tr -d '\r' | xargs)

          echo "status=$STATUS"                                   >> $GITHUB_OUTPUT
          echo "response_ms=$MS"                                  >> $GITHUB_OUTPUT
          echo "app_ok=$([ "$STATUS" = "200" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "bundle_kb=${BUNDLE_KB:-N/A}"                      >> $GITHUB_OUTPUT
          echo "encoding=${ENCODING:-none}"                       >> $GITHUB_OUTPUT
          echo "cache_control=${CACHE:-N/A}"                      >> $GITHUB_OUTPUT

      # ── 2. Deployment + repo info (GitHub API) ─────────────────────────────
      - name: Query GitHub repo stats
        id: repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="AlonKtz/TimeManagmentApp"
          API="https://api.github.com/repos/$REPO"
          AUTH="-H \"Authorization: Bearer $GH_TOKEN\" -H \"Accept: application/vnd.github.v3+json\""

          # Last commit on master
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "$API/commits/master" > /tmp/last_commit.json

          # Last commit on gh-pages (= what's live)
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "$API/commits/gh-pages" > /tmp/gh_pages_commit.json

          # Open PRs
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "$API/pulls?state=open&per_page=100" > /tmp/prs.json

          # Open issues (exclude PRs)
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "$API/issues?state=open&per_page=100" > /tmp/issues.json

          # Recent workflow runs (this workflow)
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "$API/actions/runs?per_page=10&branch=master" > /tmp/runs.json

          python3 << 'PYEOF' >> $GITHUB_OUTPUT
          import json
          from datetime import datetime, timezone

          def load(p):
              try: return json.load(open(p))
              except: return {}

          def ago(iso):
              if not iso: return 'N/A'
              try:
                  dt = datetime.fromisoformat(iso.replace('Z', '+00:00'))
                  diff = datetime.now(timezone.utc) - dt
                  h = int(diff.total_seconds() // 3600)
                  if h < 24: return f"{h}h ago"
                  return f"{h // 24}d ago"
              except: return 'N/A'

          master = load('/tmp/last_commit.json')
          pages  = load('/tmp/gh_pages_commit.json')
          prs    = load('/tmp/prs.json')
          issues = load('/tmp/issues.json')
          runs   = load('/tmp/runs.json')

          # Master commit
          mc = master.get('commit', {})
          master_sha     = master.get('sha', 'N/A')[:7]
          master_msg     = mc.get('message', 'N/A').splitlines()[0][:60]
          master_author  = mc.get('author', {}).get('name', 'N/A')
          master_date    = mc.get('author', {}).get('date', '')
          master_ago     = ago(master_date)

          # gh-pages commit
          pc = pages.get('commit', {})
          pages_sha      = pages.get('sha', 'N/A')[:7]
          pages_msg      = pc.get('message', 'N/A').splitlines()[0][:60]
          pages_date     = pc.get('author', {}).get('date', '')
          pages_ago      = ago(pages_date)

          # gh-pages commit messages are "deploy: <full-sha>", extract that SHA
          pages_deployed_sha = ''
          raw_pages_msg = pc.get('message', '')
          if raw_pages_msg.startswith('deploy:'):
              pages_deployed_sha = raw_pages_msg.split('deploy:')[-1].strip()[:7]
          else:
              pages_deployed_sha = pages_sha  # fallback

          full_master_sha = master.get('sha', '')
          deploy_synced = full_master_sha.startswith(pages_deployed_sha) if pages_deployed_sha else master_sha == pages_sha
          if deploy_synced:
              deploy_lag = 'up to date'
          else:
              # A just-pushed commit is still deploying (deploys finish in ~2 min).
              # Only flag a real lag once master has been undeployed for a while,
              # so pushing right before a QA run doesn't raise a false alarm.
              try:
                  _dt = datetime.fromisoformat(master_date.replace('Z', '+00:00'))
                  _mins = (datetime.now(timezone.utc) - _dt).total_seconds() / 60
              except Exception:
                  _mins = 999
              deploy_lag = 'deploying' if _mins < 15 else f'master is ahead ({master_sha} vs deployed {pages_deployed_sha})'

          # PRs and issues
          open_prs    = len(prs) if isinstance(prs, list) else 0
          open_issues = sum(1 for i in (issues if isinstance(issues, list) else []) if 'pull_request' not in i)

          # CI run history — last 10 runs
          run_list = (runs.get('workflow_runs') or [])[:10]
          run_dots = ''.join(
              '✅' if r.get('conclusion') == 'success' else
              '❌' if r.get('conclusion') == 'failure' else
              '⏳'
              for r in run_list
          )
          run_pass = sum(1 for r in run_list if r.get('conclusion') == 'success')
          run_fail = sum(1 for r in run_list if r.get('conclusion') == 'failure')

          print(f"master_sha={master_sha}")
          print(f"master_msg={master_msg}")
          print(f"master_author={master_author}")
          print(f"master_ago={master_ago}")
          print(f"pages_sha={pages_sha}")
          print(f"pages_msg={pages_msg}")
          print(f"pages_ago={pages_ago}")
          print(f"deploy_lag={deploy_lag}")
          print(f"open_prs={open_prs}")
          print(f"open_issues={open_issues}")
          print(f"run_dots={run_dots}")
          print(f"run_pass={run_pass}")
          print(f"run_fail={run_fail}")
          PYEOF

      # ── 3. DB stats via anon RPC (public qa_stats — no service_role key) ───
      - name: DB stats
        id: db
        run: |
          RESP=$(curl -s "$SB_URL/rest/v1/rpc/qa_stats" -X POST \
            -H "apikey: $SB_ANON" -H "Authorization: Bearer $SB_ANON" \
            -H "Content-Type: application/json" -d '{}' -w $'\nSTATUS:%{http_code}')
          STATUS=$(printf '%s' "$RESP" | grep -o 'STATUS:[0-9]*' | cut -d: -f2)
          printf '%s' "$RESP" | grep -v 'STATUS:[0-9]*$' > /tmp/stats.json
          get() { python3 -c "import json;print(json.load(open('/tmp/stats.json')).get('$1','ERR'))" 2>/dev/null || echo ERR; }
          if [ "$STATUS" = "200" ]; then
            {
              echo "db_ok=true"
              echo "err_reason="
              echo "total_users=$(get total_users)"
              echo "active_7d=$(get active_7d)"
              echo "admins=$(get admins)"
              echo "inactive_14d=$(get inactive_14d)"
              echo "slow_queries=$(get slow_queries_24h)"
              echo "total_entries=$(get total_entries)"
              echo "total_daysoff=$(get total_leave)"
            } >> $GITHUB_OUTPUT
          else
            {
              echo "db_ok=false"
              echo "err_reason=qa_stats RPC failed (HTTP ${STATUS:-000})"
              echo "total_users=ERR"; echo "active_7d=ERR"; echo "admins=ERR"
              echo "inactive_14d=ERR"; echo "slow_queries=ERR"
              echo "total_entries=ERR"; echo "total_daysoff=ERR"
            } >> $GITHUB_OUTPUT
          fi

      # ── 3b. Registration self-test: real signup → profile+email → cleanup ──
      - name: Registration self-test
        id: reg
        run: |
          TS=$(date +%s)
          EMAIL="qa-selftest+${TS}@example.com"
          PASS="QaSelftest_${TS}Aa1!"
          curl -s "$SB_URL/auth/v1/signup" -H "apikey: $SB_ANON" -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\",\"data\":{\"name\":\"QA Selftest\"}}" > /tmp/sign.json
          TOK=$(python3 -c "import json;print(json.load(open('/tmp/sign.json')).get('access_token','') or '')" 2>/dev/null || echo "")
          NID=$(python3 -c "import json;print(json.load(open('/tmp/sign.json')).get('user',{}).get('id','') or '')" 2>/dev/null || echo "")
          REG_OK=false; REG_REASON=""
          if [ -n "$TOK" ] && [ -n "$NID" ]; then
            curl -s "$SB_URL/rest/v1/profiles?id=eq.$NID&select=id,email,role" \
              -H "apikey: $SB_ANON" -H "Authorization: Bearer $TOK" > /tmp/prof.json
            HAS=$(python3 -c "import json;d=json.load(open('/tmp/prof.json'));print('1' if isinstance(d,list) and d and d[0].get('email') else '0')" 2>/dev/null || echo 0)
            if [ "$HAS" = "1" ]; then REG_OK=true; else REG_REASON="signup ok but profile/email not created by trigger"; fi
          else
            REG_REASON=$(python3 -c "import json;d=json.load(open('/tmp/sign.json'));print(d.get('msg') or d.get('error_description') or d.get('error') or 'signup returned no session')" 2>/dev/null || echo "signup request failed")
          fi
          # Always clean up self-test accounts (scoped RPC)
          CLEANED=$(curl -s "$SB_URL/rest/v1/rpc/qa_cleanup_selftest" -X POST \
            -H "apikey: $SB_ANON" -H "Authorization: Bearer $SB_ANON" -H "Content-Type: application/json" -d '{}' 2>/dev/null)
          echo "reg_ok=$REG_OK"                      >> $GITHUB_OUTPUT
          echo "reg_reason=$REG_REASON"              >> $GITHUB_OUTPUT
          echo "reg_cleaned=${CLEANED:-0}"           >> $GITHUB_OUTPUT

      # ── 3c. Stability checks: bundle loads, version.json, auth service up ──
      - name: Stability checks
        id: stab
        run: |
          BASE="https://alonktz.github.io/TimeManagmentApp"
          HTML=$(curl -s "$BASE/?t=$(date +%s)")
          JS=$(printf '%s' "$HTML" | grep -o 'assets/index-[A-Za-z0-9_-]*\.js' | head -1)
          JS_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$BASE/$JS")
          VER_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$BASE/version.json?t=$(date +%s)")
          BUILD_ID=$(curl -s "$BASE/version.json?t=$(date +%s)" | python3 -c "import json,sys;print(json.load(sys.stdin).get('buildId','?'))" 2>/dev/null || echo "?")
          AUTH_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$SB_URL/auth/v1/health" -H "apikey: $SB_ANON")
          jsok=$([ "$JS_CODE" = "200" ] && echo true || echo false)
          verok=$([ "$VER_CODE" = "200" ] && echo true || echo false)
          authok=$([ "$AUTH_CODE" = "200" ] && echo true || echo false)
          allok=false
          [ "$jsok" = true ] && [ "$verok" = true ] && [ "$authok" = true ] && allok=true
          {
            echo "js_ok=$jsok";     echo "js_code=$JS_CODE"
            echo "ver_ok=$verok";   echo "build_id=$BUILD_ID"
            echo "auth_ok=$authok"; echo "auth_code=$AUTH_CODE"
            echo "stab_all_ok=$allok"
          } >> $GITHUB_OUTPUT

      # ── 4. Send email ──────────────────────────────────────────────────────
      - name: Send email summary
        env:
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          APP_OK:           ${{ steps.health.outputs.app_ok }}
          HTTP_STATUS:      ${{ steps.health.outputs.status }}
          RESPONSE_MS:      ${{ steps.health.outputs.response_ms }}
          BUNDLE_KB:        ${{ steps.health.outputs.bundle_kb }}
          ENCODING:         ${{ steps.health.outputs.encoding }}
          CACHE_CONTROL:    ${{ steps.health.outputs.cache_control }}
          MASTER_SHA:       ${{ steps.repo.outputs.master_sha }}
          MASTER_MSG:       ${{ steps.repo.outputs.master_msg }}
          MASTER_AUTHOR:    ${{ steps.repo.outputs.master_author }}
          MASTER_AGO:       ${{ steps.repo.outputs.master_ago }}
          PAGES_SHA:        ${{ steps.repo.outputs.pages_sha }}
          PAGES_MSG:        ${{ steps.repo.outputs.pages_msg }}
          PAGES_AGO:        ${{ steps.repo.outputs.pages_ago }}
          DEPLOY_LAG:       ${{ steps.repo.outputs.deploy_lag }}
          OPEN_PRS:         ${{ steps.repo.outputs.open_prs }}
          OPEN_ISSUES:      ${{ steps.repo.outputs.open_issues }}
          RUN_DOTS:         ${{ steps.repo.outputs.run_dots }}
          RUN_PASS:         ${{ steps.repo.outputs.run_pass }}
          RUN_FAIL:         ${{ steps.repo.outputs.run_fail }}
          DB_OK:            ${{ steps.db.outputs.db_ok }}
          ERR_REASON:       ${{ steps.db.outputs.err_reason }}
          TOTAL_USERS:      ${{ steps.db.outputs.total_users }}
          ACTIVE_7D:        ${{ steps.db.outputs.active_7d }}
          ADMINS:           ${{ steps.db.outputs.admins }}
          INACTIVE_14D:     ${{ steps.db.outputs.inactive_14d }}
          SLOW_QUERIES:     ${{ steps.db.outputs.slow_queries }}
          TOTAL_ENTRIES:    ${{ steps.db.outputs.total_entries }}
          TOTAL_DAYSOFF:    ${{ steps.db.outputs.total_daysoff }}
          REG_OK:           ${{ steps.reg.outputs.reg_ok }}
          REG_REASON:       ${{ steps.reg.outputs.reg_reason }}
          REG_CLEANED:      ${{ steps.reg.outputs.reg_cleaned }}
          JS_OK:            ${{ steps.stab.outputs.js_ok }}
          VER_OK:           ${{ steps.stab.outputs.ver_ok }}
          AUTH_OK:          ${{ steps.stab.outputs.auth_ok }}
          STAB_ALL_OK:      ${{ steps.stab.outputs.stab_all_ok }}
          BUILD_ID:         ${{ steps.stab.outputs.build_id }}
        run: |
          python3 << 'PYEOF'
          import os, json

          def v(k): return os.environ.get(k, 'N/A')

          app_ok    = v('APP_OK') == 'true'
          db_ok     = v('DB_OK').lower() == 'true'   # bash echoes lowercase
          today     = __import__('datetime').date.today().strftime('%d/%m/%Y')

          hdr_color = '#0f766e' if app_ok else '#dc2626'
          app_badge = '✅ LIVE' if app_ok else '🔴 DOWN'
          db_badge  = '✅ OK'   if db_ok  else '🔴 ERR'

          # Wrap "ERR" in red, leave everything else plain
          def num(val):
              if str(val) == 'ERR':
                  return '<span style="color:#dc2626;font-weight:700">ERR</span>'
              return str(val)

          reg_ok  = v('REG_OK').lower() == 'true'
          stab_ok = v('STAB_ALL_OK').lower() == 'true'
          reg_badge  = '✅ OK' if reg_ok  else '🔴 FAIL'
          stab_badge = '✅ OK' if stab_ok else '🔴 FAIL'

          # Slow queries (>2.5s in 24h) — red when any, plain otherwise
          slow = v('SLOW_QUERIES')
          slow_badge = (
              f'<span style="color:#dc2626;font-weight:700">{slow}</span>'
              if slow not in ('0', 'N/A', 'ERR') else num(slow)
          )

          # Red banner(s) under the header for any failed check
          problems = []
          err_reason = v('ERR_REASON')
          if err_reason and err_reason not in ('N/A', ''):
              problems.append(('DB read error', err_reason))
          if not reg_ok:
              problems.append(('Registration self-test failed', v('REG_REASON') or 'unknown'))
          if not stab_ok:
              problems.append(('Stability check failed',
                               f"JS {'ok' if v('JS_OK')=='true' else 'DOWN'} · version.json {'ok' if v('VER_OK')=='true' else 'DOWN'} · auth {'ok' if v('AUTH_OK')=='true' else 'DOWN'}"))
          err_banner = ''
          for title, detail in problems:
              err_banner += (
                  f'<table width="100%" style="background:#fee2e2;border:1px solid #fca5a5;'
                  f'border-radius:10px;margin-bottom:10px;border-collapse:collapse">'
                  f'<tr><td style="padding:14px 18px">'
                  f'<div style="font-size:11px;color:#dc2626;font-weight:700;'
                  f'text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">⚠️ {title}</div>'
                  f'<div style="font-size:13px;color:#7f1d1d">{detail}</div>'
                  f'</td></tr></table>'
              )

          dl = v('DEPLOY_LAG')
          if dl == 'up to date':
              deploy_color, deploy_text = '#16a34a', '✅ in sync'
          elif dl == 'deploying':
              deploy_color, deploy_text = '#2563eb', '⏳ deploying…'
          else:
              deploy_color, deploy_text = '#d97706', f'⚠️ {dl}'

          run_fail = v('RUN_FAIL')
          ci_color = '#16a34a' if run_fail == '0' else '#d97706'

          def kpi(val, label, color, sub=''):
              sub_html = f'<div style="font-size:10px;color:#a8a29e;margin-top:2px">{sub}</div>' if sub else ''
              return (
                  f'<td style="width:25%;padding:0 4px">'
                  f'<div style="background:#fff;border-radius:10px;padding:12px 8px;text-align:center;'
                  f'box-shadow:0 1px 3px rgba(0,0,0,.07)">'
                  f'<div style="font-size:18px;font-weight:700;color:{color};line-height:1.1">{val}</div>'
                  f'<div style="font-size:11px;color:#78716c;margin-top:4px;line-height:1.3">{label}</div>'
                  f'{sub_html}</div></td>'
              )

          def card(title, rows):
              rows_html = ''.join(
                  f'<tr>'
                  f'<td style="padding:6px 0;color:#78716c;font-size:13px;border-bottom:1px solid #f5f5f4">{r[0]}</td>'
                  f'<td style="padding:6px 0;text-align:left;font-size:13px;font-weight:600;'
                  f'{"color:#0f766e;" if len(r)>2 and r[2] else ""}border-bottom:1px solid #f5f5f4">{r[1]}</td>'
                  f'</tr>'
                  for r in rows
              )
              return (
                  f'<div style="background:#fff;border-radius:10px;padding:18px;'
                  f'box-shadow:0 1px 3px rgba(0,0,0,.07);height:100%">'
                  f'<div style="font-size:11px;font-weight:700;color:#78716c;'
                  f'text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">{title}</div>'
                  f'<table width="100%" style="border-collapse:collapse">{rows_html}</table>'
                  f'</div>'
              )

          html = f"""
          <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Heebo,sans-serif;
                      max-width:580px;margin:0 auto;background:#f5f5f4;padding:20px;color:#1c1917">

            <!-- Header -->
            <table width="100%" style="background:{hdr_color};border-radius:14px;
                   margin-bottom:14px;border-collapse:collapse">
              <tr><td style="padding:20px 24px">
                <div style="font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.5px;
                            text-transform:uppercase;margin-bottom:3px">Dev QA · {today}</div>
                <div style="font-size:22px;font-weight:700;color:#fff">⏱ Hour Counter</div>
                <table style="margin-top:12px;border-collapse:collapse">
                  <tr>
                    <td style="background:rgba(255,255,255,.18);border-radius:7px;
                               padding:7px 12px;color:#fff;font-size:13px;font-weight:600">
                      {app_badge} &nbsp;{v('HTTP_STATUS')} · {v('RESPONSE_MS')}ms
                    </td>
                    <td style="width:8px"></td>
                    <td style="background:rgba(255,255,255,.18);border-radius:7px;
                               padding:7px 12px;color:#fff;font-size:13px;font-weight:600">
                      🗄️ DB {db_badge}
                    </td>
                    <td style="width:8px"></td>
                    <td style="background:rgba(255,255,255,.18);border-radius:7px;
                               padding:7px 12px;color:#fff;font-size:13px;font-weight:600">
                      👤 הרשמה {reg_badge}
                    </td>
                    <td style="width:8px"></td>
                    <td style="background:rgba(255,255,255,.18);border-radius:7px;
                               padding:7px 12px;color:#fff;font-size:13px;font-weight:600">
                      🛡️ יציבות {stab_badge}
                    </td>
                  </tr>
                </table>
              </td></tr>
            </table>

            {err_banner}

            <!-- KPI row -->
            <table width="100%" style="border-collapse:collapse;margin-bottom:14px">
              <tr>
                {kpi(f"{v('BUNDLE_KB')} KB", "Bundle size", "#1c1917", v('ENCODING'))}
                {kpi(f"{v('RESPONSE_MS')}ms", "Response time", "#2563eb")}
                {kpi(f"{v('RUN_PASS')}/{int(v('RUN_PASS') or 0)+int(v('RUN_FAIL') or 0)}", "CI pass rate", ci_color, "last 10 runs")}
                {kpi(num(v('TOTAL_USERS')), "DB users", "#dc2626" if v('TOTAL_USERS') == 'ERR' else "#7c3aed", f"{num(v('ACTIVE_7D'))} active in 7d" if v('ACTIVE_7D') != 'N/A' else "")}
              </tr>
            </table>

            <!-- Deployment + Repo -->
            <table width="100%" style="border-collapse:collapse;margin-bottom:14px">
              <tr>
                <td width="49%" style="vertical-align:top;padding-left:7px">
                  {card("🚀 Deployment", [
                      ("Live SHA", f'<code style="font-size:12px;background:#f5f5f4;padding:1px 5px;border-radius:4px">{v("PAGES_SHA")}</code>', False),
                      ("Live commit", v("PAGES_MSG"), False),
                      ("Deployed", v("PAGES_AGO"), False),
                      ("Sync status", f'<span style="color:{deploy_color};font-weight:700">{deploy_text}</span>', False),
                  ])}
                </td>
                <td width="49%" style="vertical-align:top;padding-right:7px">
                  {card("📦 Master branch", [
                      ("Last commit", f'<code style="font-size:12px;background:#f5f5f4;padding:1px 5px;border-radius:4px">{v("MASTER_SHA")}</code>', False),
                      ("Message", v("MASTER_MSG"), False),
                      ("Author", v("MASTER_AUTHOR"), False),
                      ("Pushed", v("MASTER_AGO"), False),
                  ])}
                </td>
              </tr>
            </table>

            <!-- CI + Repo health -->
            <table width="100%" style="border-collapse:collapse;margin-bottom:14px">
              <tr>
                <td width="49%" style="vertical-align:top;padding-left:7px">
                  {card("⚙️ CI health (last 10)", [
                      ("Run history", v("RUN_DOTS"), False),
                      ("Passed", v("RUN_PASS"), True),
                      ("Failed", v("RUN_FAIL"), False),
                  ])}
