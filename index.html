          {mode === 'register' && (
            <div className="form-group">
              <label className="form-label">שם מלא</label>
              <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="ישראל ישראלי" autoComplete="name" />
            </div>
          )}
          <div className="form-group">
            <label className="form-label">אימייל</label>
            <input type="text" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" autoComplete="email" dir="ltr" style={{textAlign:'right'}} />
          </div>
          <div className="form-group">
            <label className="form-label">סיסמה</label>
            <PasswordInput
              value={password}
              onChange={e => setPassword(e.target.value)}
              autoComplete={mode === 'login' ? 'current-password' : 'new-password'}
            />
          </div>
          <button type="submit" className="btn btn-primary btn-block btn-lg" disabled={busy}>
            {busy ? '...' : mode === 'login' ? 'כניסה' : 'הרשמה'}
          </button>
        </form>

        <div className="toggle-auth">
          {mode === 'login' ? (
            <>אין לך חשבון?
              <button type="button" onClick={() => { setMode('register'); setError(''); }}>הרשמה</button>
            </>
          ) : (
            <>יש לך חשבון?
              <button type="button" onClick={() => { setMode('login'); setError(''); }}>כניסה</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ===================== Edit active punch modal =====================
// Lets the user adjust the start time of their currently running session,
// e.g. "I actually arrived at 9:00 but only clicked in at 9:17".
function PunchEditModal({ activePunch, onSave, onClose }) {
  const originalStart = new Date(activePunch.start);
  const originalDate = ymd(originalStart);
  const originalTime = fmtTime24(originalStart);

  const [date, setDate] = useState(originalDate);
  const [time, setTime] = useState(originalTime);
  const [error, setError] = useState('');

  const save = () => {
    if (!time || !date) {
      setError('נא למלא תאריך ושעה');
      return;
    }
    const newStart = new Date(`${date}T${normalizeTimeStr(time)}:00`);
    if (isNaN(newStart.getTime())) {
      setError('תאריך או שעה לא תקינים');
      return;
    }
    const now = new Date();
    if (newStart > now) {
      setError('שעת הכניסה לא יכולה להיות בעתיד');
      return;
    }
    // Sanity: don't let people backdate more than 24 hours
    const hoursAgo = (now - newStart) / 3600000;
    if (hoursAgo > 24) {
      if (!confirm('שעת הכניסה שהזנת היא יותר מ־24 שעות אחורה. להמשיך בכל זאת?')) return;
    }
    onSave(newStart.toISOString());
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">עריכת שעת כניסה</div>

        <div style={{
          padding: '10px 14px',
          background: 'var(--surface-2)',
          borderRadius: 'var(--radius-sm)',
          marginBottom: 16,
          fontSize: 13,
        }}>
          <div style={{color:'var(--text-muted)'}}>נרשמה כניסה בפועל ב־</div>
          <div style={{fontWeight: 600, fontSize: 15, fontVariantNumeric: 'tabular-nums'}}>
            {originalTime}, {originalStart.getDate()}.{originalStart.getMonth()+1}.{originalStart.getFullYear()}
          </div>
        </div>

        {error && <div className="form-error">{error}</div>}

        <div className="form-row">
          <div>
            <label className="form-label">תאריך</label>
            <input type="date" value={date} onChange={e => { setDate(e.target.value); setError(''); }} />
          </div>
          <div>
            <label className="form-label">שעת כניסה</label>
            <Time24Input value={time} onChange={(v) => { setTime(v); setError(''); }} />
            <div className="hint">פורמט 24 שעות, לדוגמה 09:15</div>
          </div>
        </div>

        <div className="form-actions">
          <button className="btn btn-primary" onClick={save}>שמירה</button>
          <button className="btn btn-secondary" onClick={onClose}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

// ===================== Target editor modal (admin) =====================
// Lets admin edit or reset the target hours for a specific date.
function TargetEditorModal({ date, settings, setSettings, onClose }) {
  const d = parseYmd(date);
  const holidayInfo = getHolidayInfo(d, settings);
  const dow = d.getDay();
  const isWeekend = dow === 5 || dow === 6;
  const defaultHours = isWeekend ? 0 : (settings.standardHours?.[dow] ?? 0);
  const currentTarget = getDailyTarget(d, settings);

  const existingOverride = settings.overrides?.[date];
  const builtinHoliday = ISRAELI_HOLIDAYS[date];
  const isDisabledBuiltin = (settings.disabledHolidays || []).includes(date);

  const [hours, setHours] = useState(String(currentTarget));
  const [note, setNote] = useState(existingOverride?.note || '');

  const save = () => {
    const n = parseFloat(hours);
    if (isNaN(n) || n < 0 || n > 24) {
      alert('הזן מספר שעות תקין (בין 0 ל־24)');
      return;
    }
    setSettings({
      ...settings,
      overrides: {
        ...settings.overrides,
        [date]: {
          hours: n,
          note: note.trim() || (builtinHoliday ? builtinHoliday.note : 'חריגה'),
          type: 'custom',
        }
      }
    });
    onClose();
  };

  // "Reset" = remove this date's override and (if it was a builtin holiday that was disabled) re-enable it
  const reset = () => {
    const { [date]: _, ...restOverrides } = settings.overrides || {};
    const next = { ...settings, overrides: restOverrides };
    if (isDisabledBuiltin) {
      next.disabledHolidays = (settings.disabledHolidays || []).filter(k => k !== date);
    }
    setSettings(next);
    onClose();
  };

  // "Mark as regular workday" = disable the builtin holiday for this date AND remove any override
  const markRegular = () => {
    const { [date]: _, ...restOverrides } = settings.overrides || {};
    const next = { ...settings, overrides: restOverrides };
    if (builtinHoliday && !isDisabledBuiltin) {
      next.disabledHolidays = [...(settings.disabledHolidays || []), date];
    }
    setSettings(next);
    onClose();
  };

  // Source explanation for the current target
  let sourceLabel, sourceDetail;
  if (existingOverride) {
    sourceLabel = 'חריגה מותאמת אישית';
    sourceDetail = existingOverride.note || '—';
  } else if (holidayInfo?.source === 'builtin') {
    sourceLabel = HOLIDAY_TYPES[holidayInfo.type]?.label || 'חג';
    sourceDetail = holidayInfo.note;
  } else if (isWeekend) {
    sourceLabel = 'סוף שבוע';
    sourceDetail = 'ימי שישי ושבת אינם ימי עבודה';
  } else {
    sourceLabel = 'תקן יומי רגיל';
    sourceDetail = `ברירת מחדל ליום ${HEB_DAYS[dow]}: ${fmtHours(defaultHours)}`;
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">
          עריכת יעד ליום {HEB_DAYS[dow]}, {d.getDate()}.{d.getMonth()+1}.{d.getFullYear()}
        </div>

        <div style={{
          padding: '12px 14px',
          background: 'var(--surface-2)',
          borderRadius: 'var(--radius-sm)',
          marginBottom: 16,
          fontSize: 13,
        }}>
          <div style={{color:'var(--text-muted)', marginBottom: 4}}>מקור היעד הנוכחי</div>
          <div style={{fontWeight: 500}}>{sourceLabel} — {fmtHours(currentTarget)}</div>
          <div style={{color:'var(--text-muted)', marginTop: 2}}>{sourceDetail}</div>
        </div>

        <div className="form-group">
          <label className="form-label">מספר שעות יעד</label>
          <input
            type="number" step="0.25" min="0" max="24"
            value={hours}
            onChange={e => setHours(e.target.value)}
            autoFocus
          />
          <div className="hint">הזן 0 ליום חופש מלא. חריגה מותאמת אישית גוברת על כל הגדרה אחרת.</div>
        </div>

        <div className="form-group">
          <label className="form-label">תיאור (אופציונלי)</label>
          <input
            type="text"
            value={note}
            onChange={e => setNote(e.target.value)}
            placeholder="סיבה לשינוי, למשל: יום קצר, חצי חג, אירוע חברה..."
          />
        </div>

        <div className="form-actions" style={{justifyContent: 'space-between'}}>
          <div style={{display:'flex', gap: 8, flexWrap: 'wrap'}}>
            <button className="btn btn-primary" onClick={save}>שמירה</button>
            <button className="btn btn-secondary" onClick={onClose}>ביטול</button>
          </div>
          <div style={{display:'flex', gap: 8, flexWrap: 'wrap'}}>
            {(existingOverride || isDisabledBuiltin) && (
              <button className="btn btn-ghost btn-sm" onClick={reset} title="החזרה להגדרת ברירת המחדל">
                איפוס לברירת מחדל
              </button>
            )}
            {builtinHoliday && !isDisabledBuiltin && !existingOverride && (
              <button className="btn btn-ghost btn-sm" onClick={markRegular} title="ביטול החג ליום זה בלבד">
                סמן כיום עבודה רגיל
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ===================== Dashboard =====================
function Dashboard({ user, entries, settings, setSettings, activePunch, onPunch, onEditPunch }) {
  const [now, setNow] = useState(new Date());
  const [weekOffset, setWeekOffset] = useState(0);
  const [editingTargetDate, setEditingTargetDate] = useState(null); // 'YYYY-MM-DD' or null
  const [editingPunch, setEditingPunch] = useState(false);
  // Location for the *next* punch-in (or currently active punch, if any)
  const [location, setLocation] = useState(() => activePunch?.location || DEFAULT_LOCATION);
  const isAdmin = user.role === 'admin';

  // Keep location in sync with the active punch when starting/stopping
  useEffect(() => {
    if (activePunch?.location) setLocation(activePunch.location);
  }, [activePunch?.location]);

  useEffect(() => {
    if (!activePunch) return;
    const i = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(i);
  }, [activePunch]);

  const today = new Date();
  const todayTarget = getDailyTarget(today, settings);
  const todayWorked = getWorkedOnDate(entries, today);
  const liveAdd = activePunch ? sessionDuration({ start: activePunch.start }) : 0;
  const todayTotal = todayWorked + liveAdd;

  // Displayed week = current week + offset (negative = past, positive = future)
  const displayedBase = new Date(today);
  displayedBase.setDate(displayedBase.getDate() + weekOffset * 7);
  const weekStart = startOfWeek(displayedBase);
  const weekEnd = endOfWeek(displayedBase);
  const weekStats = getRangeStats(entries, settings, weekStart, weekEnd);
  const isCurrentWeek = weekOffset === 0;
  // Live-punch time only counts in the "current" week stat context
  const weekTotal = weekStats.worked + (isCurrentWeek ? liveAdd : 0);

  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
  const monthStats = getRangeStats(entries, settings, monthStart, monthEnd);
  const monthTotal = monthStats.worked + liveAdd;

  const todayPct = todayTarget > 0 ? (todayTotal / todayTarget) * 100 : (todayTotal > 0 ? 100 : 0);
  const weekPct = weekStats.target > 0 ? (weekTotal / weekStats.target) * 100 : 0;
  const monthPct = monthStats.target > 0 ? (monthTotal / monthStats.target) * 100 : 0;

  const barClass = (pct) => {
    if (pct >= 100) return 'complete';
    return '';
  };

  const renderStat = (label, worked, target, pct, showRemaining = true) => {
    const diff = worked - target;
    return (
      <div className="stat-card">
        <div className="stat-label">{label}</div>
        <div className="stat-value">{fmtHours(worked)}</div>
        <div className="stat-target">מתוך יעד {fmtHours(target)}</div>
        <div className="stat-bar">
          <div
            className={`stat-bar-fill ${barClass(pct)}`}
            style={{ width: Math.min(100, Math.max(0, pct)) + '%' }}
          />
        </div>
        {showRemaining && target > 0 && (
          <div className={`stat-diff ${diff >= 0 ? 'positive' : 'negative'}`}>
            {diff >= 0 ? '+' : ''}{fmtHours(diff)} {diff >= 0 ? 'מעל היעד' : 'נותרו להשלמה'}
          </div>
        )}
      </div>
    );
  };

  const punchStart = () => onPunch({ action: 'start', location });
  const punchStop = () => onPunch({ action: 'stop', location });

  const liveTime = activePunch ? fmtHours(liveAdd) : null;
  const startTime = activePunch ? new Date(activePunch.start) : null;

  return (
    <div>
      <div className="card" style={{marginBottom: 20}}>
        <div className="row-between">
          <div>
            <div className="card-title" style={{margin:0}}>שלום {user.name} 👋</div>
            <div style={{color:'var(--text-muted)', fontSize:13, marginTop:4}}>
              {HEB_DAYS[today.getDay()]}, {today.getDate()} ב{HEB_MONTHS[today.getMonth()]} {today.getFullYear()}
            </div>
          </div>
        </div>
      </div>

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">כניסה/יציאה מהירה</div>
        <div className="punch-panel">
          <div className={`punch-status ${activePunch ? 'active' : ''}`}>
            <div className="punch-status-label">
              {activePunch ? 'בעבודה כרגע' : 'לא בעבודה'}
            </div>
            <div className="punch-status-time">
              {activePunch ? liveTime : '--:--'}
            </div>
            <div className="punch-status-sub">
              {activePunch ? (
                <>
                  נכנסת ב־<strong style={{color:'var(--text)', fontVariantNumeric:'tabular-nums'}}>{fmtTime24(startTime)}</strong>
                  <button
                    type="button"
                    className="edit-time-link"
                    onClick={() => setEditingPunch(true)}
                    title="עריכת שעת כניסה"
                  >
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    עריכה
                  </button>
                </>
              ) : 'בחר מיקום ולחץ על "כניסה"'}
            </div>
            <LocationToggle value={location} onChange={setLocation} />
          </div>
          <div style={{display:'flex', alignItems:'center', justifyContent:'center'}}>
            {activePunch ? (
              <button className="btn btn-danger btn-lg btn-block" onClick={punchStop}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                יציאה ושמירה
              </button>
            ) : (
              <button className="btn btn-primary btn-lg btn-block" onClick={punchStart}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                כניסה
              </button>
            )}
          </div>
        </div>
      </div>

      <div className="stats-grid">
        {renderStat('היום', todayTotal, todayTarget, todayPct)}
        {renderStat('השבוע (א׳–ה׳)', weekTotal, weekStats.target, weekPct)}
        {renderStat('החודש', monthTotal, monthStats.target, monthPct)}
      </div>

      <div className="card">
        <div className="row-between" style={{marginBottom: 14}}>
          <div style={{fontSize: 16, fontWeight: 600}}>סיכום שבועי</div>
          <div className="period-nav" style={{margin: 0, flex: '0 0 auto', minWidth: 260}}>
            <button className="nav-btn" onClick={() => setWeekOffset(o => o - 1)} aria-label="שבוע קודם">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <div className="current" style={{fontSize: 13}}>
              {isCurrentWeek
                ? 'השבוע הנוכחי'
                : weekOffset === -1 ? 'שבוע קודם'
                : weekOffset === 1 ? 'שבוע הבא'
                : `${weekStart.getDate()}.${weekStart.getMonth()+1} – ${weekEnd.getDate()}.${weekEnd.getMonth()+1}`}
            </div>
            <button className="nav-btn" onClick={() => setWeekOffset(o => o + 1)} aria-label="שבוע הבא">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            {!isCurrentWeek && (
              <button className="btn btn-ghost btn-sm" onClick={() => setWeekOffset(0)} title="חזרה לשבוע הנוכחי">היום</button>
            )}
          </div>
        </div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 12}}>
          {weekStart.getDate()}.{weekStart.getMonth()+1}.{weekStart.getFullYear()} – {weekEnd.getDate()}.{weekEnd.getMonth()+1}.{weekEnd.getFullYear()}
          {' · '}
          סה"כ בפועל: <strong style={{color:'var(--text)'}}>{fmtHours(weekTotal)}</strong>
          {' · '}
          יעד: <strong style={{color:'var(--text)'}}>{fmtHours(weekStats.target)}</strong>
          {' · '}
          הפרש: <strong style={{color: (weekTotal - weekStats.target) >= 0 ? 'var(--success)' : 'var(--danger)'}}>
            {(weekTotal - weekStats.target) >= 0 ? '+' : ''}{fmtHours(weekTotal - weekStats.target)}
          </strong>
        </div>
        <div className="table-wrap">
          <table className="data">
            <thead>
              <tr>
                <th>יום</th>
                <th>תאריך</th>
                <th>יעד</th>
                <th>שעות בפועל</th>
                <th>הפרש</th>
                {isAdmin && <th style={{textAlign:'left'}}>עריכה</th>}
              </tr>
            </thead>
            <tbody>
              {daysInRange(weekStart, weekEnd).map(d => {
                const target = getDailyTarget(d, settings);
                const isToday = ymd(d) === ymd(today);
                const worked = getWorkedOnDate(entries, d) + (isToday ? liveAdd : 0);
                const diff = worked - target;
                const holidayInfo = getHolidayInfo(d, settings);
                const key = ymd(d);
                return (
                  <tr key={key}>
                    <td>
                      {HEB_DAYS[d.getDay()]}
                      {isToday && <span className="pill pill-info" style={{marginRight:6}}>היום</span>}
                      {holidayInfo && (
                        <span className={`pill ${holidayInfo.type === 'chag' ? 'pill-danger' : 'pill-warning'}`} style={{marginRight:6}}>
                          {holidayInfo.note}
                        </span>
                      )}
                    </td>
                    <td>{d.getDate()}.{d.getMonth()+1}</td>
                    <td>{fmtHours(target)}</td>
                    <td style={{fontWeight:500}}>{fmtHours(worked)}</td>
                    <td>
                      {target > 0 || worked > 0 ? (
                        <span className={diff >= 0 ? 'pill pill-success' : 'pill pill-danger'}>
                          {diff >= 0 ? '+' : ''}{fmtHours(diff)}
                        </span>
                      ) : <span style={{color:'var(--text-soft)'}}>—</span>}
                    </td>
                    {isAdmin && (
                      <td>
                        <div className="actions-inline">
                          <button
                            className="icon-btn"
                            onClick={() => setEditingTargetDate(key)}
                            title="עריכת יעד ליום זה"
                          >
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                          </button>
                        </div>
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {editingTargetDate && (
        <TargetEditorModal
          date={editingTargetDate}
          settings={settings}
          setSettings={setSettings}
          onClose={() => setEditingTargetDate(null)}
        />
      )}

      {editingPunch && activePunch && (
        <PunchEditModal
          activePunch={activePunch}
          onSave={(newStartIso) => {
            onEditPunch(newStartIso);
            setEditingPunch(false);
          }}
          onClose={() => setEditingPunch(false)}
        />
      )}
    </div>
  );
}

// ===================== Entry form + list =====================
function EntriesTab({ user, entries, setEntries, settings }) {
  const [mode, setMode] = useState('range'); // 'range' | 'hours'
  const [date, setDate] = useState(ymd(new Date()));
  const [startT, setStartT] = useState('09:00');
  const [endT, setEndT] = useState('18:00');
  const [hours, setHours] = useState('9');
  const [note, setNote] = useState('');
  const [location, setLocation] = useState(DEFAULT_LOCATION);
  const [editingId, setEditingId] = useState(null);
  const [flash, setFlash] = useState('');
  const [monthOffset, setMonthOffset] = useState(0);

  const resetForm = () => {
    setDate(ymd(new Date()));
    setStartT('09:00'); setEndT('18:00'); setHours('9'); setNote('');
    setLocation(DEFAULT_LOCATION);
    setEditingId(null); setMode('range');
  };

  const submit = (e) => {
    e.preventDefault();
    let computedHours = 0;
    let start = null, end = null;
    if (mode === 'range') {
      const s = timeStrToHours(startT);
      const e2 = timeStrToHours(endT);
      computedHours = e2 - s;
      if (computedHours <= 0) {
        alert('שעת סיום חייבת להיות אחרי שעת התחלה');
        return;
      }
      start = startT; end = endT;
    } else {
      const n = parseFloat(hours);
      if (isNaN(n) || n <= 0 || n > 24) {
        alert('הזן מספר שעות תקין (בין 0 ל־24)');
        return;
      }
      computedHours = n;
    }

    const userEntries = entries[user.id] || [];
    const newEntry = {
      id: editingId || 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      date,
      hours: Math.round(computedHours * 100) / 100,
      start,
      end,
      note: note.trim(),
      mode,
      location,
      createdAt: editingId ? (userEntries.find(e => e.id === editingId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
    };

    let next;
    if (editingId) {
      next = userEntries.map(e => e.id === editingId ? newEntry : e);
    } else {
      next = [...userEntries, newEntry];
    }
    setEntries({ ...entries, [user.id]: next });
    setFlash(editingId ? 'הרישום עודכן' : 'הרישום נוסף');
    setTimeout(() => setFlash(''), 2000);
    resetForm();
  };

  const editEntry = (entry) => {
    setEditingId(entry.id);
    setDate(entry.date);
    if (entry.mode === 'range' && entry.start && entry.end) {
      setMode('range');
      setStartT(entry.start); setEndT(entry.end);
    } else {
      setMode('hours');
      setHours(String(entry.hours));
    }
    setNote(entry.note || '');
    setLocation(entry.location || DEFAULT_LOCATION);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const deleteEntry = (id) => {
    if (!confirm('למחוק את הרישום?')) return;
    const userEntries = entries[user.id] || [];
    setEntries({ ...entries, [user.id]: userEntries.filter(e => e.id !== id) });
    if (editingId === id) resetForm();
  };

  const userEntries = entries[user.id] || [];

  // Show by selected month
  const now = new Date();
  const viewDate = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const viewStart = viewDate;
  const viewEnd = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0);
  const monthEntries = userEntries
    .filter(e => {
      const d = parseYmd(e.date);
      return d >= viewStart && d <= viewEnd;
    })
    .sort((a,b) => b.date.localeCompare(a.date) || b.createdAt.localeCompare(a.createdAt));

  const monthStats = getRangeStats(userEntries, settings, viewStart, viewEnd);

  return (
    <div>
      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">
          {editingId ? 'עריכת רישום' : 'הוספת רישום'}
          {editingId && (
            <button className="btn btn-ghost btn-sm" onClick={resetForm}>ביטול עריכה</button>
          )}
        </div>
        {flash && <div className="form-success">{flash}</div>}

        <form onSubmit={submit}>
          <div className="form-row">
            <div>
              <label className="form-label">תאריך</label>
              <input type="date" value={date} onChange={e => setDate(e.target.value)} required />
            </div>
            <div>
              <label className="form-label">סוג הרישום</label>
              <select value={mode} onChange={e => setMode(e.target.value)}>
                <option value="range">לפי שעות כניסה/יציאה</option>
                <option value="hours">מספר שעות ישירות</option>
              </select>
            </div>
          </div>

          {mode === 'range' ? (
            <div className="form-row">
              <div>
                <label className="form-label">כניסה</label>
                <Time24Input value={startT} onChange={setStartT} required />
              </div>
              <div>
                <label className="form-label">יציאה</label>
                <Time24Input value={endT} onChange={setEndT} required />
              </div>
              <div>
                <label className="form-label">סה״כ</label>
                <input type="text" readOnly value={fmtHours(timeStrToHours(endT) - timeStrToHours(startT))} style={{background:'var(--surface-2)'}} />
              </div>
            </div>
          ) : (
            <div className="form-row">
              <div>
                <label className="form-label">שעות</label>
                <input type="number" step="0.25" min="0" max="24" value={hours} onChange={e => setHours(e.target.value)} required />
                <div className="hint">ניתן להזין חלקי שעה, לדוגמה 8.5 לשמונה וחצי</div>
              </div>
            </div>
          )}

          <div className="form-group">
            <label className="form-label">מיקום עבודה</label>
            <LocationToggle value={location} onChange={setLocation} />
          </div>

          <div className="form-group">
            <label className="form-label">הערה (אופציונלי)</label>
            <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="לדוגמה: פגישת צוות, פרויקט X..." />
          </div>

          <div className="form-actions">
            <button type="submit" className="btn btn-primary">
              {editingId ? 'שמירה' : 'הוספה'}
            </button>
            {editingId && (
              <button type="button" className="btn btn-secondary" onClick={resetForm}>ביטול</button>
            )}
          </div>
        </form>
      </div>

      <div className="card">
        <div className="period-nav">
          <button className="nav-btn" onClick={() => setMonthOffset(o => o - 1)} aria-label="חודש קודם">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <div className="current">
            {HEB_MONTHS[viewDate.getMonth()]} {viewDate.getFullYear()}
          </div>
          <button className="nav-btn" onClick={() => setMonthOffset(o => o + 1)} aria-label="חודש הבא" disabled={monthOffset >= 0} style={monthOffset >= 0 ? {opacity:0.4, cursor:'not-allowed'} : {}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
        </div>

        <div className="stats-grid" style={{marginBottom: 20}}>
          <div className="stat-card">
            <div className="stat-label">שעות שנרשמו</div>
            <div className="stat-value">{fmtHours(monthStats.worked)}</div>
            <div className="stat-target">{monthEntries.length} רישומים</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">יעד חודשי</div>
            <div className="stat-value">{fmtHours(monthStats.target)}</div>
            <div className="stat-target">לפי ימי העבודה בחודש</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">הפרש</div>
            <div className="stat-value" style={{color: monthStats.diff >= 0 ? 'var(--success)' : 'var(--danger)'}}>
              {monthStats.diff >= 0 ? '+' : ''}{fmtHours(monthStats.diff)}
            </div>
            <div className="stat-target">{monthStats.diff >= 0 ? 'מעל היעד' : 'מתחת ליעד'}</div>
          </div>
        </div>

        {monthEntries.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📋</div>
            <div className="empty-title">אין רישומים בחודש זה</div>
            <div className="empty-text">התחל בהוספת רישום חדש למעלה</div>
          </div>
        ) : (
          <div className="table-wrap">
            <table className="data">
              <thead>
                <tr>
                  <th>תאריך</th>
                  <th>יום</th>
                  <th>שעות</th>
                  <th>פירוט</th>
                  <th>מיקום</th>
                  <th>הערה</th>
                  <th style={{textAlign:'left'}}>פעולות</th>
                </tr>
              </thead>
              <tbody>
                {monthEntries.map(e => {
                  const d = parseYmd(e.date);
                  return (
                    <tr key={e.id}>
                      <td>{d.getDate()}.{d.getMonth()+1}.{d.getFullYear()}</td>
                      <td>{HEB_DAYS[d.getDay()]}</td>
                      <td style={{fontWeight:600}}>{fmtHours(e.hours)}</td>
                      <td style={{color:'var(--text-muted)', fontSize:13}}>
                        {e.mode === 'range' && e.start && e.end
                          ? `${e.start} – ${e.end}`
                          : 'שעות ידני'}
                      </td>
                      <td>
                        <LocationPill loc={e.location || DEFAULT_LOCATION} />
                      </td>
                      <td style={{color:'var(--text-muted)', fontSize:13, maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {e.note || '—'}
                      </td>
                      <td>
                        <div className="actions-inline">
                          <button className="icon-btn" onClick={() => editEntry(e)} title="עריכה">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                          </button>
                          <button className="icon-btn danger" onClick={() => deleteEntry(e.id)} title="מחיקה">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ===================== Settings (Admin) =====================
function AdminSettings({ settings, setSettings, users, setUsers, deleteUser, currentUser }) {
  const [sh, setSh] = useState(settings.standardHours);
  const [hh, setHh] = useState(settings.holidayHours || DEFAULT_SETTINGS.holidayHours);
  const [overrideDate, setOverrideDate] = useState(ymd(new Date()));
  const [overrideHours, setOverrideHours] = useState('0');
  const [overrideNote, setOverrideNote] = useState('');
  const [flash, setFlash] = useState('');
  const [holidayFilter, setHolidayFilter] = useState('upcoming'); // 'upcoming' | 'all'

  useEffect(() => setSh(settings.standardHours), [settings.standardHours]);
  useEffect(() => setHh(settings.holidayHours || DEFAULT_SETTINGS.holidayHours), [settings.holidayHours]);

  const updateStandard = (dow, val) => {
    const n = parseFloat(val);
    setSh({ ...sh, [dow]: isNaN(n) ? 0 : n });
  };

  const saveStandard = () => {
    setSettings({ ...settings, standardHours: sh });
    setFlash('התקן השבועי נשמר');
    setTimeout(() => setFlash(''), 2000);
  };

  const updateHoliday = (type, val) => {
    const n = parseFloat(val);
    setHh({ ...hh, [type]: isNaN(n) ? 0 : n });
  };

  const saveHolidayHours = () => {
    setSettings({ ...settings, holidayHours: hh });
    setFlash('שעות החגים נשמרו');
    setTimeout(() => setFlash(''), 2000);
  };

  const toggleHolidayDisabled = (key) => {
    const disabled = settings.disabledHolidays || [];
    const next = disabled.includes(key)
      ? disabled.filter(k => k !== key)
      : [...disabled, key];
    setSettings({ ...settings, disabledHolidays: next });
  };

  const addOverride = (e) => {
    e.preventDefault();
    const n = parseFloat(overrideHours);
    if (isNaN(n) || n < 0 || n > 24) {
      alert('הזן מספר שעות תקין');
      return;
    }
    const next = {
      ...settings,
      overrides: {
        ...settings.overrides,
        [overrideDate]: { hours: n, note: overrideNote.trim() || (n === 0 ? 'חג' : 'חריג'), type: 'custom' }
      }
    };
    setSettings(next);
    setOverrideNote(''); setOverrideHours('0');
    setFlash('החריגה נוספה');
    setTimeout(() => setFlash(''), 2000);
  };

  const removeOverride = (key) => {
    if (!confirm('להסיר את החריגה?')) return;
    const { [key]: _, ...rest } = settings.overrides;
    setSettings({ ...settings, overrides: rest });
  };

  const toggleRole = async (userId) => {
    if (userId === currentUser.id) { alert('לא ניתן לשנות את ההרשאה שלך'); return; }
    const u = users.find(x => x.id === userId);
    if (!u) return;
    await setUsers(users.map(x => x.id === userId ? { ...x, role: x.role === 'admin' ? 'user' : 'admin' } : x));
  };

  const removeUser = async (userId) => {
    if (userId === currentUser.id) return;
    if (!confirm('למחוק את המשתמש? כל הנתונים שלו יימחקו.')) return;
    await deleteUser(userId);
  };

  const overrideList = Object.entries(settings.overrides || {})
    .sort((a, b) => b[0].localeCompare(a[0]));

  // Build sorted list of built-in holidays
  const todayKey = ymd(new Date());
  const disabled = settings.disabledHolidays || [];
  const allHolidays = Object.entries(ISRAELI_HOLIDAYS)
    .map(([key, h]) => ({ key, ...h }))
    .sort((a, b) => a.key.localeCompare(b.key));
  const visibleHolidays = holidayFilter === 'upcoming'
    ? allHolidays.filter(h => h.key >= todayKey)
    : allHolidays;

  return (
    <div>
      {flash && <div className="form-success" style={{marginBottom: 16}}>{flash}</div>}

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">תקן שעות שבועי</div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 16}}>
          קבע את מספר שעות העבודה הסטנדרטי לכל יום בשבוע. שישי ושבת אינם ימי עבודה.
        </div>
        <div className="admin-day-grid">
          {[0,1,2,3,4].map(dow => (
            <div className="admin-day-card" key={dow}>
              <div className="day-name">יום {HEB_DAYS[dow]}</div>
              <div className="day-hours-input">
                <input
                  type="number" step="0.25" min="0" max="24"
                  value={sh[dow] ?? 0}
                  onChange={e => updateStandard(dow, e.target.value)}
                />
                <span>שעות</span>
              </div>
            </div>
          ))}
        </div>
        <div className="form-actions">
          <button className="btn btn-primary" onClick={saveStandard}>שמירת תקן</button>
        </div>
      </div>

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">שעות לפי סוג חג</div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 16}}>
          הגדרות אלו חלות אוטומטית על כל חגי ישראל הרלוונטיים. שינוי כאן משפיע על כל התאריכים מהסוג הזה.
        </div>
        <div className="admin-day-grid">
          {Object.entries(HOLIDAY_TYPES).map(([type, meta]) => (
            <div className="admin-day-card holiday" key={type}>
              <div className="day-name">{meta.label}</div>
              <div className="day-hours-input">
                <input
                  type="number" step="0.25" min="0" max="24"
                  value={hh[type] ?? meta.defaultHours}
                  onChange={e => updateHoliday(type, e.target.value)}
                />
                <span>שעות</span>
              </div>
            </div>
          ))}
        </div>
        <div className="form-actions">
          <button className="btn btn-primary" onClick={saveHolidayHours}>שמירת שעות חגים</button>
        </div>
      </div>

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">
          לוח חגי ישראל
          <div style={{display:'flex', gap: 6}}>
            <button
              className={`btn btn-sm ${holidayFilter === 'upcoming' ? 'btn-primary' : 'btn-secondary'}`}
              onClick={() => setHolidayFilter('upcoming')}
            >קרובים</button>
            <button
              className={`btn btn-sm ${holidayFilter === 'all' ? 'btn-primary' : 'btn-secondary'}`}
              onClick={() => setHolidayFilter('all')}
            >כולם</button>
          </div>
        </div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 16}}>
          כל התאריכים של חגי ישראל לשנת 2026. ניתן לכבות תאריך ספציפי (למשל אם הצוות עובד באותו יום) על ידי לחיצה על הכפתור.
          שישי ושבת לא מופיעים כי הם ממילא לא ימי עבודה.
        </div>
        {visibleHolidays.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📅</div>
            <div className="empty-text">אין חגים קרובים</div>
          </div>
        ) : (
          <div className="table-wrap">
            <table className="data">
              <thead>
                <tr>
                  <th>תאריך</th>
                  <th>יום</th>
                  <th>שם החג</th>
                  <th>סוג</th>
                  <th>שעות</th>
                  <th style={{textAlign:'left'}}>סטטוס</th>
                </tr>
              </thead>
              <tbody>
                {visibleHolidays.map(h => {
                  const d = parseYmd(h.key);
                  const isDisabled = disabled.includes(h.key);
                  const hours = hh[h.type] ?? HOLIDAY_TYPES[h.type].defaultHours;
                  const pillClass =
                    h.type === 'chag' ? 'pill-danger' :
                    h.type === 'erev' ? 'pill-warning' :
                    h.type === 'memorial' ? 'pill-info' :
                    'pill-muted';
                  return (
                    <tr key={h.key} style={isDisabled ? {opacity:0.5} : {}}>
                      <td>{d.getDate()}.{d.getMonth()+1}.{d.getFullYear()}</td>
                      <td>{HEB_DAYS[d.getDay()]}</td>
                      <td>{h.note}</td>
                      <td><span className={`pill ${pillClass}`}>{HOLIDAY_TYPES[h.type].label}</span></td>
                      <td style={{fontWeight:600}}>
                        {isDisabled
                          ? <span style={{color:'var(--text-soft)', fontWeight:400}}>—</span>
                          : fmtHours(hours)
                        }
                      </td>
                      <td>
                        <div style={{display:'flex', justifyContent:'flex-end'}}>
                          <button
                            className="btn btn-ghost btn-sm"
                            onClick={() => toggleHolidayDisabled(h.key)}
                          >
                            {isDisabled ? 'הפעלה מחדש' : 'ביטול'}
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">חריגות מותאמות אישית</div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 16}}>
          לתאריכים שאינם חגים רשמיים — יום עבודה מקוצר, אירוע חברה, חופשה מרוכזת וכו'.
          חריגה מותאמת אישית גוברת על הגדרת החג המובנה.
        </div>
        <form onSubmit={addOverride}>
          <div className="form-row">
            <div>
              <label className="form-label">תאריך</label>
              <input type="date" value={overrideDate} onChange={e => setOverrideDate(e.target.value)} required />
            </div>
            <div>
              <label className="form-label">שעות ליום זה</label>
              <input type="number" step="0.25" min="0" max="24" value={overrideHours} onChange={e => setOverrideHours(e.target.value)} required />
              <div className="hint">הזן 0 ליום חופש מלא</div>
            </div>
            <div>
              <label className="form-label">תיאור</label>
              <input type="text" value={overrideNote} onChange={e => setOverrideNote(e.target.value)} placeholder="יום גיבוש, ערב חגיגה..." />
            </div>
          </div>
          <div className="form-actions">
            <button type="submit" className="btn btn-primary">הוספת חריגה</button>
          </div>
        </form>

        <div className="divider"></div>

        {overrideList.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📅</div>
            <div className="empty-text">לא הוגדרו חריגות מותאמות</div>
          </div>
        ) : (
          <div className="table-wrap">
            <table className="data">
              <thead>
                <tr>
                  <th>תאריך</th>
                  <th>יום</th>
                  <th>שעות</th>
                  <th>תיאור</th>
                  <th style={{textAlign:'left'}}>פעולות</th>
                </tr>
              </thead>
              <tbody>
                {overrideList.map(([key, val]) => {
                  const d = parseYmd(key);
                  return (
                    <tr key={key}>
                      <td>{d.getDate()}.{d.getMonth()+1}.{d.getFullYear()}</td>
                      <td>{HEB_DAYS[d.getDay()]}</td>
                      <td style={{fontWeight:600}}>{fmtHours(val.hours)}</td>
                      <td style={{color:'var(--text-muted)'}}>{val.note || '—'}</td>
                      <td>
                        <div className="actions-inline">
                          <button className="icon-btn danger" onClick={() => removeOverride(key)} title="מחיקה">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div className="card">
        <div className="card-title">
          ניהול משתמשים
          <span className="count">{users.length} משתמשים</span>
        </div>
        <div className="table-wrap">
          <table className="data">
            <thead>
              <tr>
                <th>שם</th>
                <th>שם משתמש</th>
                <th>תפקיד</th>
                <th>תאריך הצטרפות</th>
                <th style={{textAlign:'left'}}>פעולות</th>
              </tr>
            </thead>
            <tbody>
              {users.map(u => (
                <tr key={u.id}>
                  <td>
                    <div style={{display:'flex', alignItems:'center', gap:10}}>
                      <div className="user-avatar" style={{width:28, height:28, fontSize:12}}>
                        {u.name.charAt(0)}
                      </div>
                      {u.name}
                      {u.id === currentUser.id && <span className="pill pill-info">זה אתה</span>}
                    </div>
                  </td>
                  <td style={{color:'var(--text-muted)', fontSize:12}} dir="ltr">{u.email || '—'}</td>
                  <td>
                    {u.role === 'admin'
                      ? <span className="pill pill-warning">מנהל</span>
                      : <span className="pill pill-muted">עובד</span>}
                  </td>
                  <td style={{color:'var(--text-muted)', fontSize:13}}>
                    {new Date(u.createdAt).toLocaleDateString('he-IL')}
                  </td>
                  <td>
                    <div className="actions-inline">
                      {u.id !== currentUser.id && (
                        <>
                          <button className="btn btn-ghost btn-sm" onClick={() => toggleRole(u.id)}>
                            {u.role === 'admin' ? 'הסר מנהל' : 'הפוך למנהל'}
                          </button>
                          <button className="icon-btn danger" onClick={() => removeUser(u.id)} title="מחיקה">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                          </button>
                        </>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ===================== Main app =====================
function App() {
  const auth = useAuth();
  const [tab, setTab] = useState('dashboard');

  // ---- Entries ----
  const [entries, setEntriesState] = useState([]);
  const [entriesLoaded, setEntriesLoaded] = useState(false);

  // ---- Settings ----
  const [settings, setSettingsState] = useState(DEFAULT_SETTINGS);

  // ---- Active punch (device-local, ephemeral) ----
  const [activePunch, setActivePunchState] = useState(() => loadPunch());

  // ---- Loading spinner ----
  const [globalLoading, setGlobalLoading] = useState(false);

  const user = auth.currentUser;

  // Load entries + settings when user logs in
  useEffect(() => {
    if (!user) { setEntriesState([]); setEntriesLoaded(false); return; }
    loadEntries();
    loadSettings();
    if (user.role === 'admin') auth.loadUsers();
  }, [user?.id]);

  const loadEntries = async () => {
    try {
      const rows = await sb.select('time_entries',
        `user_id=eq.${user.id}&order=date.desc,created_at.desc`
      );
      setEntriesState(rows.map(normalizeEntry));
      setEntriesLoaded(true);
    } catch (e) { console.error('entries load:', e); }
  };

  const loadSettings = async () => {
    try {
      const rows = await sb.select('settings', '');
      const map = {};
      for (const r of rows) map[r.key] = r.value;
      // Load day_overrides
      const ovRows = await sb.select('day_overrides', 'order=date.asc');
      const overrides = {};
      const disabledHolidays = [];
      for (const r of ovRows) {
        if (r.disabled) {
          disabledHolidays.push(r.date);
        } else {
          overrides[r.date] = { hours: r.hours, note: r.note, type: r.type };
        }
      }
      setSettingsState({
        standardHours: map.standardHours ?? DEFAULT_SETTINGS.standardHours,
        holidayHours:  map.holidayHours  ?? DEFAULT_SETTINGS.holidayHours,
        disabledHolidays,
        overrides,
      });
    } catch (e) { console.error('settings load:', e); }
  };

  // Convert DB row to app entry format
  const normalizeEntry = r => ({
    id: r.id,
    date: typeof r.date === 'string' ? r.date.slice(0, 10) : r.date,
    hours: Number(r.hours),
    start: r.start_time,
    end: r.end_time,
    note: r.note || '',
    mode: r.mode || 'range',
    location: r.location || DEFAULT_LOCATION,
    viaPunch: r.via_punch,
    createdAt: r.created_at,
  });

  // ---- Entries CRUD ----
  const saveEntries = async (nextEntries) => {
    // Called by EntriesTab with full updated array. Diff vs current to upsert/delete.
    const currentIds = new Set(entries.map(e => e.id));
    const nextIds = new Set(nextEntries.map(e => e.id));

    // Deleted
    const deletedIds = [...currentIds].filter(id => !nextIds.has(id));
    for (const id of deletedIds) {
      await sb.delete('time_entries', 'id', id);
    }

    // Upserted (new or changed)
    const toUpsert = nextEntries.filter(e =>
      !currentIds.has(e.id) ||
      JSON.stringify(e) !== JSON.stringify(entries.find(x => x.id === e.id))
    );
    for (const e of toUpsert) {
      await sb.upsert('time_entries', {
        id: e.id,
        user_id: user.id,
        date: e.date,
        hours: e.hours,
        start_time: e.start || null,
        end_time: e.end || null,
        note: e.note || '',
        mode: e.mode || 'range',
        location: e.location || DEFAULT_LOCATION,
        via_punch: e.viaPunch || false,
        created_at: e.createdAt || new Date().toISOString(),
      }, 'id');
    }
    setEntriesState(nextEntries);
  };

  // EntriesTab passes { userId: [entries] } — flatten to array
  const setEntries = async (entriesByUser) => {
    const next = entriesByUser[user.id] || [];
    await saveEntries(next);
  };

  // ---- Settings save ----
  const setSettings = async (next) => {
    setSettingsState(next);
    try {
      // Save standardHours + holidayHours as settings rows
      await sb.upsert('settings', { key: 'standardHours', value: next.standardHours, updated_at: new Date().toISOString() }, 'key');
      await sb.upsert('settings', { key: 'holidayHours',  value: next.holidayHours,  updated_at: new Date().toISOString() }, 'key');

      // Sync day_overrides: delete all then re-insert
      // Get existing dates
      const existing = await sb.select('day_overrides', 'select=date');
      const existingDates = existing.map(r => r.date);

      // Build desired rows
      const desiredRows = [];
      for (const [date, ov] of Object.entries(next.overrides || {})) {
        desiredRows.push({ date, hours: ov.hours, note: ov.note || '', type: ov.type || 'custom', disabled: false });
      }
      for (const date of (next.disabledHolidays || [])) {
        desiredRows.push({ date, hours: 0, note: '', type: 'disabled', disabled: true });
      }

      // Delete removed dates
      const desiredDates = new Set(desiredRows.map(r => r.date));
      const toDelete = existingDates.filter(d => !desiredDates.has(d));
      if (toDelete.length) await sb.deleteMulti('day_overrides', 'date', toDelete);

      // Upsert all desired rows
      for (const row of desiredRows) {
        await sb.upsert('day_overrides', row, 'date');
      }
    } catch (e) { console.error('settings save:', e); }
  };

  // ---- Punch ----
  const setActivePunch = (v) => { savePunch(v); setActivePunchState(v); };

  const handlePunch = async ({ action, location }) => {
    if (action === 'start') {
      if (activePunch) return;
      setActivePunch({ start: new Date().toISOString(), location: location || DEFAULT_LOCATION });
    } else if (action === 'stop') {
      if (!activePunch) return;
      const startDate = new Date(activePunch.start);
      const endDate = new Date();
      const hours = diffHours(activePunch.start, endDate.toISOString());
      if (hours < 0.01) {
        if (!confirm('פחות מדקה נרשמה. להפסיק בכל זאת?')) return;
      }
      const newEntry = {
        id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        date: ymd(startDate),
        hours: Math.round(hours * 100) / 100,
        start: fmtTime24(startDate),
        end:   fmtTime24(endDate),
        note: '',
        mode: 'range',
        location: location || activePunch.location || DEFAULT_LOCATION,
        viaPunch: true,
        createdAt: new Date().toISOString(),
      };
      setActivePunch(null);
      await saveEntries([...entries, newEntry]);
    }
  };

  const handleEditPunch = (newStartIso) => {
    if (!activePunch) return;
    setActivePunch({ ...activePunch, start: newStartIso });
  };

  // ---- Admin: manage users ----
  const setUsers = async (updatedList) => {
    // Find changed roles
    for (const u2 of updatedList) {
      const orig = auth.users.find(x => x.id === u2.id);
      if (orig && orig.role !== u2.role) {
        await sb.update('profiles', { role: u2.role }, 'id', u2.id);
      }
    }
    await auth.loadUsers();
  };
  const deleteUser = async (userId) => {
    // Delete entries then profile (auth user deletion needs service role, skip for now)
    await sb.delete('time_entries', 'user_id', userId);
    await sb.delete('profiles', 'id', userId);
    await auth.loadUsers();
  };

  // ---- Loading states ----
  if (auth.loading) {
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-muted)', fontSize:15}}>
        טוען...
      </div>
    );
  }

  if (!user) return <LoginScreen auth={auth} />;

  // Build entries in the shape EntriesTab expects: { userId: [entries] }
  const entriesByUser = { [user.id]: entries };

  const tabs = [
    { id: 'dashboard', label: 'מסך ראשי' },
    { id: 'entries',   label: 'השעות שלי' },
  ];
  if (user.role === 'admin') tabs.push({ id: 'admin', label: 'הגדרות וניהול' });

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-title">
          <div className="logo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          מעקב שעות צוות
        </div>
        <div className="topbar-user">
          <div className="user-chip">
            <div className="user-avatar">{user.name.charAt(0)}</div>
            <span>{user.name}</span>
            {user.role === 'admin' && <span className="admin-badge">מנהל</span>}
          </div>
          <button className="btn btn-secondary btn-sm" onClick={auth.logout}>יציאה</button>
        </div>
      </div>

      <div className="tabs">
        {tabs.map(t => (
          <button key={t.id} className={`tab ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {tab === 'dashboard' && (
        <Dashboard
          user={user}
          entries={entries}
          settings={settings}
          setSettings={setSettings}
          activePunch={activePunch}
          onPunch={handlePunch}
          onEditPunch={handleEditPunch}
        />
      )}
      {tab === 'entries' && (
        <EntriesTab
          user={user}
          entries={entriesByUser}
          setEntries={setEntries}
          settings={settings}
        />
      )}
      {tab === 'admin' && user.role === 'admin' && (
        <AdminSettings
          settings={settings}
          setSettings={setSettings}
          users={auth.users}
          setUsers={setUsers}
          deleteUser={deleteUser}
          currentUser={user}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
