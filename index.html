<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b0f0e" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Hour Counter" />
  <meta name="apple-mobile-web-app-title" content="Hour Counter" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://yxmbammlzweasjvpouqn.supabase.co" crossorigin />
  <link rel="dns-prefetch" href="https://yxmbammlzweasjvpouqn.supabase.co" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>" />
  <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
  <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
  <title>Hour Counter by AK</title>
  <script>
    // Apply persisted theme + sidebar state BEFORE first paint (no FOUC).
    // Defaults: light theme, expanded sidebar, animations on.
    (function () {
      try {
        var theme = localStorage.getItem('th-theme');
        if (theme === 'dark') document.documentElement.classList.add('theme-dark');
        var sb = localStorage.getItem('th-sidebar');
        document.documentElement.dataset.sidebar = sb === 'collapsed' ? 'collapsed' : 'expanded';
        var anim = localStorage.getItem('th-anim');
        document.documentElement.dataset.anim = anim === 'off' ? 'off' : 'on';
      } catch (e) {
        document.documentElement.dataset.sidebar = 'expanded';
        document.documentElement.dataset.anim = 'on';
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
