        <div className="row-between" style={{marginBottom: 14}}>
          <div style={{fontSize: 16, fontWeight: 600}}>סיכום שבועי</div>
          <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
            <div className="period-nav" style={{margin: 0}}>
              <button className="nav-btn" onClick={() => setWeekOffset(o => o - 1)} aria-label="שבוע קודם">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
              <div className="current" style={{fontSize: 13, minWidth: 120}}>
                {isCurrentWeek
                  ? 'השבוע הנוכחי'
                  : weekOffset === -1 ? 'שבוע קודם'
                  : weekOffset === 1 ? 'שבוע הבא'
                  : `${fmtDateILShort(weekStart)} – ${fmtDateILShort(weekEnd)}`}
              </div>
              <button className="nav-btn" onClick={() => setWeekOffset(o => o + 1)} aria-label="שבוע הבא">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
            </div>
            {!isCurrentWeek && (
              <button className="btn btn-ghost btn-sm" onClick={() => setWeekOffset(0)} title="חזרה לשבוע הנוכחי" style={{whiteSpace:'nowrap'}}>⏎ היום</button>
            )}
          </div>
        </div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 12}}>
          {fmtDateIL(weekStart)} – {fmtDateIL(weekEnd)}
          {' · '}
          סה"כ בפועל: <strong style={{color:'var(--text)'}}>{fmtHours(weekTotal)}</strong>
          {' · '}
          יעד: <strong style={{color:'var(--text)'}}>{fmtHours(weekStats.target)}</strong>
          {' · '}
          הפרש: <strong style={{color: (weekTotal - weekStats.target) >= 0 ? 'var(--success)' : 'var(--danger)'}}>
            {(weekTotal - weekStats.target) >= 0 ? '+' : ''}{fmtHours(weekTotal - weekStats.target)}
          </strong>
        </div>
        <div className="table-wrap">
          <table className="data">
            <thead>
              <tr>
                <th>יום</th>
                <th>תאריך</th>
                <th>יעד</th>
                <th>שעות בפועל</th>
                <th>הפרש</th>
                {isAdmin && <th style={{textAlign:'left'}}>עריכה</th>}
              </tr>
            </thead>
            <tbody>
              {daysInRange(weekStart, weekEnd).map(d => {
                const key = ymd(d);
                const target = getPersonalDailyTarget(d, settings, jobPercent, daysOffDates, customDailyHours);
                const isToday = key === ymd(today);
                const dayEntries = entries.filter(e => e.date === key);
                const worked = dayEntries.reduce((s,e) => s + (e.hours||0), 0) + (isToday ? liveAdd : 0);
                const diff = worked - target;
                const holidayInfo = getHolidayInfo(d, settings);
                const vacationEntry = dayEntries.find(e => e.location === 'vacation');
                const sickEntry    = dayEntries.find(e => e.location === 'sick');
                return (
                  <tr key={key} style={vacationEntry||sickEntry ? {background:'rgba(255,255,255,0.02)'} : {}}>
                    <td>
                      {HEB_DAYS[d.getDay()]}
                      {isToday && <span className="pill pill-info" style={{marginRight:6}}>היום</span>}
                      {holidayInfo && (
                        <span className={`pill ${holidayInfo.type === 'chag' ? 'pill-danger' : 'pill-warning'}`} style={{marginRight:6}}>
                          {holidayInfo.note}
                        </span>
                      )}
                      {vacationEntry && <span className="pill" style={{marginRight:6,background:'#0d2535',color:'#38bdf8'}}>🏖️ חופשה</span>}
                      {sickEntry    && <span className="pill" style={{marginRight:6,background:'var(--danger-soft)',color:'var(--danger)'}}>🤒 מחלה</span>}
                    </td>
                    <td>{fmtDateILShort(d)}</td>
                    <td>{fmtHours(target)}</td>
                    <td style={{fontWeight:500}}>{fmtHours(worked)}</td>
                    <td>
                      {vacationEntry || sickEntry
                        ? <span className="pill" style={{background:'var(--surface-2)',color:'var(--text-muted)'}}>חופשה/מחלה</span>
                        : target > 0 || worked > 0
                          ? <span className={diff >= 0 ? 'pill pill-success' : 'pill pill-danger'}>{diff >= 0 ? '+' : ''}{fmtHours(diff)}</span>
                          : <span style={{color:'var(--text-soft)'}}>—</span>
                      }
                    </td>
                    {isAdmin && (
                      <td>
                        <div className="actions-inline">
                          <button
                            className="icon-btn"
                            onClick={() => setEditingTargetDate(key)}
                            title="עריכת יעד ליום זה"
                          >
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                          </button>
                        </div>
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {editingTargetDate && (
        <TargetEditorModal
          date={editingTargetDate}
          settings={settings}
          setSettings={setSettings}
          onClose={() => setEditingTargetDate(null)}
        />
      )}

      {editingPunch && activePunch && (
        <PunchEditModal
          activePunch={activePunch}
          onSave={(newStartIso) => {
            onEditPunch(newStartIso);
            setEditingPunch(false);
          }}
          onClose={() => setEditingPunch(false)}
        />
      )}
    </div>
  );
}

// ===================== Entry form + list =====================
function EntriesTab({ user, entries, setEntries, settings, daysOff = [] }) {
  const [mode, setMode] = useState('range'); // 'range' | 'hours'
  const [date, setDate] = useState(ymd(new Date()));
  const [startT, setStartT] = useState('09:00');
  const [endT, setEndT] = useState('18:00');
  const [hours, setHours] = useState('9');
  const [note, setNote] = useState('');
  const [location, setLocation] = useState(DEFAULT_LOCATION);
  const [tips, setTips] = useState('');
  const [shiftBonus, setShiftBonus] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [flash, setFlash] = useState('');
  const [monthOffset, setMonthOffset] = useState(0);
  const [showExport, setShowExport] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showSmartFill, setShowSmartFill] = useState(false);
  const isHourly = (user.salary_type || 'hourly') !== 'global';

  // When location = vacation/sick, auto-fill with daily target hours
  const isLeave = location === 'vacation' || location === 'sick';
  useEffect(() => {
    if (!isLeave) return;
    const d = parseYmd(date);
    const target = getPersonalDailyTarget(d, settings, user.job_percent ?? 100, (daysOff||[]).map(x=>x.date), user.custom_daily_hours||null);
    setMode('hours');
    setHours(String(target > 0 ? target : 8));
  }, [isLeave, date, settings, user.job_percent, user.custom_daily_hours]);

  const resetForm = () => {
    setDate(ymd(new Date()));
    setStartT('09:00'); setEndT('18:00'); setHours('9'); setNote('');
    setLocation(DEFAULT_LOCATION);
    setTips(''); setShiftBonus('');
    setEditingId(null); setMode('range');
  };

  const submit = (e) => {
    e.preventDefault();
    let computedHours = 0;
    let start = null, end = null;
    const effectiveMode = isLeave ? 'hours' : mode;
    if (effectiveMode === 'range') {
      const s = timeStrToHours(startT);
      const e2 = timeStrToHours(endT);
      computedHours = e2 - s;
      if (computedHours <= 0) {
        alert('שעת סיום חייבת להיות אחרי שעת התחלה');
        return;
      }
      start = startT; end = endT;
    } else {
      const n = parseFloat(hours);
      if (isNaN(n) || n < 0 || n > 24) {
        alert('הזן מספר שעות תקין (בין 0 ל־24)');
        return;
      }
      computedHours = n;
    }

    const userEntries = entries[user.id] || [];
    const prev = editingId ? userEntries.find(e => e.id === editingId) : null;
    const newEntry = {
      id: editingId || 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      date,
      hours: Math.round(computedHours * 100) / 100,
      start,
      end,
      note: note.trim(),
      mode: effectiveMode,
      location,
      tips: parseFloat(tips) || 0,
      shift_bonus: parseFloat(shiftBonus) || 0,
      expenses: prev?.expenses || [],
      createdAt: editingId ? (prev?.createdAt || new Date().toISOString()) : new Date().toISOString(),
    };

    let next;
    if (editingId) {
      next = userEntries.map(e => e.id === editingId ? newEntry : e);
    } else {
      next = [...userEntries, newEntry];
    }
    setEntries({ ...entries, [user.id]: next });
    setFlash(editingId ? 'הרישום עודכן' : 'הרישום נוסף');
    setTimeout(() => setFlash(''), 2000);
    resetForm();
  };

  const editEntry = (entry) => {
    setEditingId(entry.id);
    setDate(entry.date);
    if (entry.mode === 'range' && entry.start && entry.end) {
      setMode('range');
      setStartT(entry.start); setEndT(entry.end);
    } else {
      setMode('hours');
      setHours(String(entry.hours));
    }
    setNote(entry.note || '');
    setLocation(entry.location || DEFAULT_LOCATION);
    setTips(entry.tips ? String(entry.tips) : '');
    setShiftBonus(entry.shift_bonus ? String(entry.shift_bonus) : '');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const deleteEntry = (id) => {
    if (!confirm('למחוק את הרישום?')) return;
    const userEntries = entries[user.id] || [];
    setEntries({ ...entries, [user.id]: userEntries.filter(e => e.id !== id) });
    if (editingId === id) resetForm();
  };

  const userEntries = entries[user.id] || [];

  // Show by selected month
  const now = new Date();
  const viewDate = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const viewStart = viewDate;
  const viewEnd = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0);
  const monthEntries = userEntries
    .filter(e => {
      const d = parseYmd(e.date);
      return d >= viewStart && d <= viewEnd;
    })
    .sort((a,b) => b.date.localeCompare(a.date) || b.createdAt.localeCompare(a.createdAt));

  const jobPercent = user.job_percent ?? 100;
  const customDailyHours = user.custom_daily_hours || null;
  const daysOffDates = (daysOff || []).map(d => d.date);
  const monthStats = getPersonalRangeStats(userEntries, settings, viewStart, viewEnd, jobPercent, daysOffDates, customDailyHours);

  return (
    <div>
      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">
          {editingId ? 'עריכת רישום' : 'הוספת רישום'}
          {editingId && (
            <button className="btn btn-ghost btn-sm" onClick={resetForm}>ביטול עריכה</button>
          )}
        </div>
        {flash && <div className="form-success">{flash}</div>}

        <form onSubmit={submit}>
          <div className="form-row">
            <div>
              <label className="form-label">תאריך</label>
              <input type="date" value={date} onChange={e => setDate(e.target.value)} required />
            </div>
            {!isLeave && (
              <div>
                <label className="form-label">סוג הרישום</label>
                <select value={mode} onChange={e => setMode(e.target.value)}>
                  <option value="range">לפי שעות כניסה/יציאה</option>
                  <option value="hours">מספר שעות ישירות</option>
                </select>
              </div>
            )}
          </div>

          {isLeave ? (
            <div style={{padding:'10px 14px',background:'var(--surface-2)',borderRadius:'var(--radius-sm)',marginBottom:16,fontSize:13,color:'var(--text-muted)'}}>
              {location === 'vacation' ? '🏖️ חופשה' : '🤒 מחלה'} — שעות יזוכו לפי יעד יומי אישי:&nbsp;
              <strong style={{color:'var(--text)'}}>{fmtHours(parseFloat(hours)||0)}</strong>
            </div>
          ) : mode === 'range' ? (
            <div className="form-row">
              <div>
                <label className="form-label">כניסה</label>
                <Time24Input value={startT} onChange={setStartT} required />
              </div>
              <div>
                <label className="form-label">יציאה</label>
                <Time24Input value={endT} onChange={setEndT} required />
              </div>
              <div>
                <label className="form-label">סה״כ</label>
                <input type="text" readOnly value={fmtHours(timeStrToHours(endT) - timeStrToHours(startT))} style={{background:'var(--surface-2)'}} />
              </div>
            </div>
          ) : (
            <div className="form-row">
              <div>
                <label className="form-label">שעות</label>
                <input type="number" step="0.25" min="0" max="24" value={hours} onChange={e => setHours(e.target.value)} required />
                <div className="hint">ניתן להזין חלקי שעה, לדוגמה 8.5 לשמונה וחצי</div>
              </div>
            </div>
          )}

          <div className="form-group">
            <label className="form-label">מיקום עבודה</label>
            <LocationToggle value={location} onChange={setLocation} />
          </div>

          <div className="form-group">
            <label className="form-label">הערה (אופציונלי)</label>
            <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder={isLeave ? 'לדוגמה: חופשת קיץ, מחלה...' : 'לדוגמה: פגישת צוות, פרויקט X...'} />
          </div>

          {isHourly && !isLeave && (
            <div className="form-row">
              <div>
                <label className="form-label">טיפים (₪)</label>
                <input type="number" min="0" step="0.5" value={tips} onChange={e => setTips(e.target.value)} placeholder="0" />
              </div>
              <div>
                <label className="form-label">תגמול משמרת (₪)</label>
                <input type="number" min="0" step="0.5" value={shiftBonus} onChange={e => setShiftBonus(e.target.value)} placeholder="0" />
              </div>
            </div>
          )}

          <div className="form-actions">
            <button type="submit" className="btn btn-primary">
              {editingId ? 'שמירה' : 'הוספה'}
            </button>
            {editingId && (
              <button type="button" className="btn btn-secondary" onClick={resetForm}>ביטול</button>
            )}
          </div>
        </form>
      </div>

      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontWeight:600,fontSize:15}}>הרישומים שלי</div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-secondary btn-sm" onClick={() => setShowSmartFill(true)}>✨ מילוי חכם</button>
            <button className="btn btn-secondary btn-sm" onClick={() => setShowImport(true)}>ייבוא CSV</button>
            <button className="btn btn-secondary btn-sm" onClick={() => setShowExport(true)}>ייצוא CSV</button>
          </div>
        </div>
        <div className="period-nav">
          <button className="nav-btn" onClick={() => setMonthOffset(o => o - 1)} aria-label="חודש קודם">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <div className="current">
            {HEB_MONTHS[viewDate.getMonth()]} {viewDate.getFullYear()}
          </div>
          <button className="nav-btn" onClick={() => setMonthOffset(o => o + 1)} aria-label="חודש הבא" disabled={monthOffset >= 0} style={monthOffset >= 0 ? {opacity:0.4, cursor:'not-allowed'} : {}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
        </div>

        <div className="stats-grid" style={{marginBottom: 20}}>
          <div className="stat-card">
            <div className="stat-label">שעות שנרשמו</div>
            <div className="stat-value">{fmtHours(monthStats.worked)}</div>
            <div className="stat-target">{monthEntries.length} רישומים</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">יעד חודשי</div>
            <div className="stat-value">{fmtHours(monthStats.target)}</div>
            <div className="stat-target">לפי ימי העבודה בחודש</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">הפרש</div>
            <div className="stat-value" style={{color: monthStats.diff >= 0 ? 'var(--success)' : 'var(--danger)'}}>
              {monthStats.diff >= 0 ? '+' : ''}{fmtHours(monthStats.diff)}
            </div>
            <div className="stat-target">{monthStats.diff >= 0 ? 'מעל היעד' : 'מתחת ליעד'}</div>
          </div>
        </div>

        {monthEntries.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📋</div>
            <div className="empty-title">אין רישומים בחודש זה</div>
            <div className="empty-text">התחל בהוספת רישום חדש למעלה</div>
          </div>
        ) : (
          <div className="table-wrap">
            <table className="data">
              <thead>
                <tr>
                  <th>תאריך</th>
                  <th>יום</th>
                  <th>שעות</th>
                  <th>לעומת תקן</th>
                  <th>פירוט</th>
                  <th>מיקום</th>
                  <th>הערה</th>
                  <th style={{textAlign:'left'}}>פעולות</th>
                </tr>
              </thead>
              <tbody>
                {monthEntries.map(e => {
                  const d = parseYmd(e.date);
                  const dailyTarget = getPersonalDailyTarget(d, settings, user.job_percent ?? 100, daysOff.map(x=>x.date), user.custom_daily_hours||null);
                  const diff = e.hours - dailyTarget;
                  return (
                    <tr key={e.id}>
                      <td>{fmtDateIL(d)}</td>
                      <td>{HEB_DAYS[d.getDay()]}</td>
                      <td style={{fontWeight:600}}>{fmtHours(e.hours)}</td>
                      <td>
                        {(dailyTarget > 0 || e.hours > 0) ? (
                          <span style={{color: diff >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight:500, fontSize:13}}>
                            {diff >= 0 ? '+' : ''}{fmtHours(diff)}
                          </span>
                        ) : <span style={{color:'var(--text-soft)'}}>—</span>}
                      </td>
                      <td style={{color:'var(--text-muted)', fontSize:13}}>
                        {e.mode === 'range' && e.start && e.end
                          ? `${e.start} – ${e.end}`
                          : 'שעות ידני'}
                        {((e.tips||0)+(e.shift_bonus||0))>0 && (
                          <span className="chip" style={{marginRight:6,fontSize:11,background:'var(--warning-soft)',color:'var(--warning)'}}>
                            +₪{((e.tips||0)+(e.shift_bonus||0)).toLocaleString('he-IL',{maximumFractionDigits:0})}
                          </span>
                        )}
                      </td>
                      <td>
                        <LocationPill loc={e.location || DEFAULT_LOCATION} />
                      </td>
                      <td style={{color:'var(--text-muted)', fontSize:13, maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {e.note || '—'}
                      </td>
                      <td>
                        <div className="actions-inline">
                          <button className="icon-btn" onClick={() => editEntry(e)} title="עריכה">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                          </button>
                          <button className="icon-btn danger" onClick={() => deleteEntry(e.id)} title="מחיקה">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {showExport && (
        <ExportCSVModal
          entries={userEntries}
          settings={settings}
          user={user}
          onClose={() => setShowExport(false)}
        />
      )}
      {showImport && (
        <ImportCSVModal
          onImport={async (imported) => {
            const merged = [...userEntries.filter(e => !imported.find(i => i.date === e.date && Math.abs(i.hours - e.hours) < 0.01)), ...imported];
            await setEntries({ ...entries, [user.id]: merged });
          }}
          onClose={() => setShowImport(false)}
        />
      )}
      {showSmartFill && (
        <SmartFillModal
          entries={userEntries}
          settings={settings}
          user={user}
          daysOff={daysOff}
          onFill={async (newEntries) => {
            await setEntries({ ...entries, [user.id]: [...userEntries, ...newEntries] });
          }}
          onClose={() => setShowSmartFill(false)}
        />
      )}
    </div>
  );
}

// ===================== Settings (Admin) =====================
function AdminSettings({ settings, setSettings, users, setUsers, deleteUser, currentUser }) {
  const [sh, setSh] = useState(settings.standardHours);
  const [hh, setHh] = useState(settings.holidayHours || DEFAULT_SETTINGS.holidayHours);
  const [overrideDate, setOverrideDate] = useState(ymd(new Date()));
  const [overrideHours, setOverrideHours] = useState('0');
  const [overrideNote, setOverrideNote] = useState('');
  const [flash, setFlash] = useState('');
  const [holidayFilter, setHolidayFilter] = useState('upcoming'); // 'upcoming' | 'all'

  useEffect(() => setSh(settings.standardHours), [settings.standardHours]);
  useEffect(() => setHh(settings.holidayHours || DEFAULT_SETTINGS.holidayHours), [settings.holidayHours]);

  const updateStandard = (dow, val) => {
    const n = parseFloat(val);
    setSh({ ...sh, [dow]: isNaN(n) ? 0 : n });
  };

  const saveStandard = () => {
    setSettings({ ...settings, standardHours: sh });
    setFlash('התקן השבועי נשמר');
    setTimeout(() => setFlash(''), 2000);
  };

  const updateHoliday = (type, val) => {
    const n = parseFloat(val);
    setHh({ ...hh, [type]: isNaN(n) ? 0 : n });
  };

  const saveHolidayHours = () => {
    setSettings({ ...settings, holidayHours: hh });
    setFlash('שעות החגים נשמרו');
    setTimeout(() => setFlash(''), 2000);
  };

  const toggleHolidayDisabled = (key) => {
    const disabled = settings.disabledHolidays || [];
    const next = disabled.includes(key)
      ? disabled.filter(k => k !== key)
      : [...disabled, key];
    setSettings({ ...settings, disabledHolidays: next });
  };

  const addOverride = (e) => {
    e.preventDefault();
    const n = parseFloat(overrideHours);
    if (isNaN(n) || n < 0 || n > 24) {
      alert('הזן מספר שעות תקין');
      return;
    }
    const next = {
      ...settings,
      overrides: {
        ...settings.overrides,
        [overrideDate]: { hours: n, note: overrideNote.trim() || (n === 0 ? 'חג' : 'חריג'), type: 'custom' }
      }
    };
    setSettings(next);
    setOverrideNote(''); setOverrideHours('0');
    setFlash('החריגה נוספה');
    setTimeout(() => setFlash(''), 2000);
  };

  const removeOverride = (key) => {
    if (!confirm('להסיר את החריגה?')) return;
    const { [key]: _, ...rest } = settings.overrides;
    setSettings({ ...settings, overrides: rest });
  };

  const toggleRole = async (userId) => {
    if (userId === currentUser.id) { alert('לא ניתן לשנות את ההרשאה שלך'); return; }
    const u = users.find(x => x.id === userId);
    if (!u) return;
    await setUsers(users.map(x => x.id === userId ? { ...x, role: x.role === 'admin' ? 'user' : 'admin' } : x));
  };

  const removeUser = async (userId) => {
    if (userId === currentUser.id) return;
    if (!confirm('למחוק את המשתמש? כל הנתונים שלו יימחקו.')) return;
    await deleteUser(userId);
  };

  const overrideList = Object.entries(settings.overrides || {})
    .sort((a, b) => b[0].localeCompare(a[0]));

  // Build sorted list of built-in holidays
  const todayKey = ymd(new Date());
  const disabled = settings.disabledHolidays || [];
  const allHolidays = Object.entries(ISRAELI_HOLIDAYS)
    .map(([key, h]) => ({ key, ...h }))
    .sort((a, b) => a.key.localeCompare(b.key));
  const visibleHolidays = holidayFilter === 'upcoming'
    ? allHolidays.filter(h => h.key >= todayKey)
    : allHolidays;

  return (
    <div>
      {flash && <div className="form-success" style={{marginBottom: 16}}>{flash}</div>}

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">תקן שעות שבועי</div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 16}}>
          קבע את מספר שעות העבודה הסטנדרטי לכל יום בשבוע. שישי ושבת אינם ימי עבודה.
        </div>
        <div className="admin-day-grid">
          {[0,1,2,3,4].map(dow => (
            <div className="admin-day-card" key={dow}>
              <div className="day-name">יום {HEB_DAYS[dow]}</div>
              <div className="day-hours-input">
                <input
                  type="number" step="0.25" min="0" max="24"
                  value={sh[dow] ?? 0}
                  onChange={e => updateStandard(dow, e.target.value)}
                />
                <span>שעות</span>
              </div>
            </div>
          ))}
        </div>
        <div className="form-actions">
          <button className="btn btn-primary" onClick={saveStandard}>שמירת תקן</button>
        </div>
      </div>

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">שעות לפי סוג חג</div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 16}}>
          הגדרות אלו חלות אוטומטית על כל חגי ישראל הרלוונטיים. שינוי כאן משפיע על כל התאריכים מהסוג הזה.
        </div>
        <div className="admin-day-grid">
          {Object.entries(HOLIDAY_TYPES).map(([type, meta]) => (
            <div className="admin-day-card holiday" key={type}>
              <div className="day-name">{meta.label}</div>
              <div className="day-hours-input">
                <input
                  type="number" step="0.25" min="0" max="24"
                  value={hh[type] ?? meta.defaultHours}
                  onChange={e => updateHoliday(type, e.target.value)}
                />
                <span>שעות</span>
              </div>
            </div>
          ))}
        </div>
        <div className="form-actions">
          <button className="btn btn-primary" onClick={saveHolidayHours}>שמירת שעות חגים</button>
        </div>
      </div>

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">
          לוח חגי ישראל
          <div style={{display:'flex', gap: 6}}>
            <button
              className={`btn btn-sm ${holidayFilter === 'upcoming' ? 'btn-primary' : 'btn-secondary'}`}
              onClick={() => setHolidayFilter('upcoming')}
            >קרובים</button>
            <button
              className={`btn btn-sm ${holidayFilter === 'all' ? 'btn-primary' : 'btn-secondary'}`}
              onClick={() => setHolidayFilter('all')}
            >כולם</button>
          </div>
        </div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 16}}>
          כל התאריכים של חגי ישראל לשנת 2026. ניתן לכבות תאריך ספציפי (למשל אם הצוות עובד באותו יום) על ידי לחיצה על הכפתור.
          שישי ושבת לא מופיעים כי הם ממילא לא ימי עבודה.
        </div>
        {visibleHolidays.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📅</div>
            <div className="empty-text">אין חגים קרובים</div>
          </div>
        ) : (
          <div className="table-wrap">
            <table className="data">
              <thead>
                <tr>
                  <th>תאריך</th>
                  <th>יום</th>
                  <th>שם החג</th>
                  <th>סוג</th>
                  <th>שעות</th>
                  <th style={{textAlign:'left'}}>סטטוס</th>
                </tr>
              </thead>
              <tbody>
                {visibleHolidays.map(h => {
                  const d = parseYmd(h.key);
                  const isDisabled = disabled.includes(h.key);
                  const hours = hh[h.type] ?? HOLIDAY_TYPES[h.type].defaultHours;
                  const pillClass =
                    h.type === 'chag' ? 'pill-danger' :
                    h.type === 'erev' ? 'pill-warning' :
                    h.type === 'memorial' ? 'pill-info' :
                    'pill-muted';
                  return (
                    <tr key={h.key} style={isDisabled ? {opacity:0.5} : {}}>
                      <td>{fmtDateIL(d)}</td>
                      <td>{HEB_DAYS[d.getDay()]}</td>
                      <td>{h.note}</td>
                      <td><span className={`pill ${pillClass}`}>{HOLIDAY_TYPES[h.type].label}</span></td>
                      <td style={{fontWeight:600}}>
                        {isDisabled
                          ? <span style={{color:'var(--text-soft)', fontWeight:400}}>—</span>
                          : fmtHours(hours)
                        }
                      </td>
                      <td>
                        <div style={{display:'flex', justifyContent:'flex-end'}}>
                          <button
                            className="btn btn-ghost btn-sm"
                            onClick={() => toggleHolidayDisabled(h.key)}
                          >
                            {isDisabled ? 'הפעלה מחדש' : 'ביטול'}
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">חריגות מותאמות אישית</div>
        <div style={{color:'var(--text-muted)', fontSize: 13, marginBottom: 16}}>
          לתאריכים שאינם חגים רשמיים — יום עבודה מקוצר, אירוע חברה, חופשה מרוכזת וכו'.
          חריגה מותאמת אישית גוברת על הגדרת החג המובנה.
        </div>
        <form onSubmit={addOverride}>
          <div className="form-row">
            <div>
              <label className="form-label">תאריך</label>
              <input type="date" value={overrideDate} onChange={e => setOverrideDate(e.target.value)} required />
            </div>
            <div>
              <label className="form-label">שעות ליום זה</label>
              <input type="number" step="0.25" min="0" max="24" value={overrideHours} onChange={e => setOverrideHours(e.target.value)} required />
              <div className="hint">הזן 0 ליום חופש מלא</div>
            </div>
            <div>
              <label className="form-label">תיאור</label>
              <input type="text" value={overrideNote} onChange={e => setOverrideNote(e.target.value)} placeholder="יום גיבוש, ערב חגיגה..." />
            </div>
          </div>
          <div className="form-actions">
            <button type="submit" className="btn btn-primary">הוספת חריגה</button>
          </div>
        </form>

        <div className="divider"></div>

        {overrideList.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📅</div>
            <div className="empty-text">לא הוגדרו חריגות מותאמות</div>
          </div>
        ) : (
          <div className="table-wrap">
            <table className="data">
              <thead>
                <tr>
                  <th>תאריך</th>
                  <th>יום</th>
                  <th>שעות</th>
                  <th>תיאור</th>
                  <th style={{textAlign:'left'}}>פעולות</th>
                </tr>
              </thead>
              <tbody>
                {overrideList.map(([key, val]) => {
                  const d = parseYmd(key);
                  return (
                    <tr key={key}>
                      <td>{fmtDateIL(d)}</td>
                      <td>{HEB_DAYS[d.getDay()]}</td>
                      <td style={{fontWeight:600}}>{fmtHours(val.hours)}</td>
                      <td style={{color:'var(--text-muted)'}}>{val.note || '—'}</td>
                      <td>
                        <div className="actions-inline">
                          <button className="icon-btn danger" onClick={() => removeOverride(key)} title="מחיקה">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div className="card">
        <div className="card-title">
          ניהול משתמשים
          <span className="count">{users.length} משתמשים</span>
        </div>
        <div className="table-wrap">
          <table className="data">
            <thead>
              <tr>
                <th>שם</th>
                <th>שם משתמש</th>
                <th>תפקיד</th>
                <th>תאריך הצטרפות</th>
                <th style={{textAlign:'left'}}>פעולות</th>
              </tr>

            <tbody>
              {users.map(u => (
                <tr key={u.id}>

                    <div style={{display:'flex', alignItems:'center', gap:10}}>

                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>

function AccountSettings({ user, auth }) {
  const current = user.job_percent ?? 100;
  const [selected, setSelected] = useState(
    current === 100 ? '100' : current === 50 ? '50' : 'custom'
  );
  const [customVal, setCustomVal] = useState(String(current));
  const [flash, setFlash] = useState('');
  const [busy, setBusy] = useState(false);

  const effectivePct = selected === '100' ? 100 : selected === '50' ? 50 : (parseFloat(customVal) || 100);

  const previewHours = () => {
    if (effectivePct >= 100) return '9 שעות (א׳–ד׳), 8.5 שעות (ה׳)';
    const base = 9;
    const h = Math.round(base * effectivePct / 100 * 100) / 100;
    return `${h} שעות בכל יום`;
  };

  const save = async () => {
    const pct = effectivePct;
    if (isNaN(pct) || pct <= 0 || pct > 100) { alert('אחוז משרה חייב להיות בין 1 ל-100'); return; }
    setBusy(true);
    await auth.updateJobPercent(user.id, pct);
    setFlash('אחוזי המשרה עודכנו');
    setTimeout(() => setFlash(''), 2500);
    setBusy(false);
  };

  return (
    <div className="card">
      <div className="card-title">החשבון שלי</div>
      {flash && <div className="form-success">{flash}</div>}
      <div style={{marginBottom: 20}}>
        <div style={{fontWeight: 600, marginBottom: 4}}>{user.name}</div>
        <div style={{fontSize: 13, color: 'var(--text-muted)'}} dir="ltr">{user.email}</div>
      </div>
      <div className="divider" />
      <div style={{marginTop: 20}}>
        <div className="admin-section-title" style={{marginBottom: 8}}>אחוזי משרה</div>
        <div style={{color:'var(--text-muted)', fontSize:13, marginBottom:14}}>
          קובע את יעד השעות היומי. 100% = משרה מלאה (9/8.5 שעות), 50% = חצי משרה (4.5 שעות).
        </div>
        <div className="pct-options">
          {[['100','משרה מלאה — 100%'],['50','חצי משרה — 50%'],['custom','אחר...']].map(([val, label]) => (
            <label key={val} className={`pct-option ${selected === val ? 'active' : ''}`}>
              <input type="radio" value={val} checked={selected === val} onChange={() => setSelected(val)} />
              {label}
            </label>
          ))}
        </div>
        {selected === 'custom' && (
          <div className="form-row" style={{maxWidth: 200, marginBottom: 12}}>
            <div>
              <label className="form-label">אחוז משרה</label>
              <input type="number" min="1" max="100" step="1" value={customVal} onChange={e => setCustomVal(e.target.value)} />
            </div>
          </div>
        )}
        <div style={{background:'var(--surface-2)', borderRadius:'var(--radius-sm)', padding:'10px 14px', fontSize:13, color:'var(--text-muted)', marginBottom:16}}>
          יעד יומי: <strong style={{color:'var(--text)'}}>{previewHours()}</strong>
        </div>
        <button className="btn btn-primary" onClick={save} disabled={busy}>{busy ? 'שומר...' : 'שמירה'}</button>
      </div>

      <div className="divider" style={{margin:'24px 0'}} />
      <CustomHoursSection user={user} auth={auth} />

      <div className="divider" style={{margin:'24px 0'}} />
      <SalaryAccountSection user={user} auth={auth} />

      <div className="divider" style={{margin:'24px 0'}} />
      <GeofenceSection />

      <div className="divider" style={{margin:'24px 0'}} />
      <ColorBlindSection />
    </div>
  );
}

function CustomHoursSection({ user, auth }) {
  const saved = user.custom_daily_hours || {};
  const [enabled, setEnabled] = useState(Object.keys(saved).length > 0);
  const [hours, setHours] = useState({
    0: saved[0] ?? '', 1: saved[1] ?? '', 2: saved[2] ?? '',
    3: saved[3] ?? '', 4: saved[4] ?? '',
  });
  const [flash, setFlash] = useState('');
  const [busy, setBusy] = useState(false);

  const save = async () => {
    setBusy(true);
    const payload = enabled
      ? Object.fromEntries(Object.entries(hours).map(([k,v]) => [k, v === '' ? null : parseFloat(v)]))
      : null;
    await auth.updateCustomHours(user.id, payload);
    setFlash('נשמר');
    setTimeout(() => setFlash(''), 2000);
    setBusy(false);
  };

  return (
    <div>
      <div className="admin-section-title" style={{marginBottom:8}}>שעות יומיות מותאמות אישית</div>
      <div style={{color:'var(--text-muted)',fontSize:13,marginBottom:12}}>
        עקוף את שעות ברירת המחדל בימים ספציפיים. כשמופעל, הגדרות אלו גוברות על אחוזי המשרה.
      </div>
      {flash && <div className="form-success" style={{marginBottom:12}}>{flash}</div>}
      <label style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,cursor:'pointer'}}>
        <input type="checkbox" checked={enabled} onChange={e => setEnabled(e.target.checked)} />
        <span style={{fontSize:14}}>הפעל שעות מותאמות אישית</span>
      </label>
      {enabled && (
        <div className="admin-day-grid" style={{marginBottom:14}}>
          {[0,1,2,3,4].map(dow => (
            <div className="admin-day-card" key={dow}>
              <div className="day-name">יום {HEB_DAYS[dow]}</div>
              <div className="day-hours-input">
                <input
                  type="number" step="0.25" min="0" max="24"
                  value={hours[dow]}
                  placeholder={String(user.custom_daily_hours?.[dow] ?? '—')}
                  onChange={e => setHours(h => ({...h, [dow]: e.target.value}))}
                />
                <span>שעות</span>
              </div>
            </div>
          ))}
        </div>
      )}
      <button className="btn btn-primary btn-sm" onClick={save} disabled={busy}>{busy?'שומר...':'שמירה'}</button>
    </div>
  );
}

// ===================== Quarterly view =====================
function QuarterlyView({ entries, settings, user }) {
  const jobPercent = user.job_percent ?? 100;
  const year = new Date().getFullYear();
  const today = new Date();
  const quarters = [
    { label: 'Q1', months: 'ינואר–מרץ',    from: new Date(year,0,1),  to: new Date(year,2,31)  },
    { label: 'Q2', months: 'אפריל–יוני',   from: new Date(year,3,1),  to: new Date(year,5,30)  },
    { label: 'Q3', months: 'יולי–ספטמבר',  from: new Date(year,6,1),  to: new Date(year,8,30)  },
    { label: 'Q4', months: 'אוקטובר–דצמבר',from: new Date(year,9,1), to: new Date(year,11,31) },
  ];

  let runningDiff = 0;
  const rows = quarters.map((q, i) => {
    const isFuture = q.from > today;
    const isCurrent = today >= q.from && today <= q.to;
    const customDailyHours = user.custom_daily_hours || null;
    const stats = getPersonalRangeStats(entries, settings, q.from, q.to, jobPercent, [], customDailyHours);
    const carryIn = i === 0 ? 0 : runningDiff;
    const adjWorked = stats.worked + carryIn;
    const diff = adjWorked - stats.target;
    runningDiff = diff;
    const pct = stats.target > 0 ? Math.min(100, (stats.worked / stats.target) * 100) : 0;
    return { ...q, stats, isFuture, isCurrent, pct, diff };
  });

  const totalTarget = rows.reduce((s, r) => s + r.stats.target, 0);
  const totalWorked = rows.reduce((s, r) => s + r.stats.worked, 0);

  return (
    <div className="card">
      <div className="card-title">סיכום רבעוני {year}</div>
      <div className="table-wrap">
        <table className="data">
          <thead>
            <tr><th>רבעון</th><th>תקופה</th><th>יעד</th><th>בפועל</th><th>הפרש</th><th>התקדמות</th></tr>
          </thead>
          <tbody>
            {rows.map(r => (
              <tr key={r.label} style={r.isCurrent ? {background:'var(--primary-soft)'} : {}}>
                <td style={{fontWeight:600}}>
                  {r.label}
                  {r.isCurrent && <span className="pill pill-info" style={{marginRight:6}}>עכשיו</span>}
                </td>
                <td style={{color:'var(--text-muted)',fontSize:13}}>{r.months}</td>
                <td>{r.isFuture ? '—' : fmtHours(r.stats.target)}</td>
                <td style={{fontWeight:500}}>{r.isFuture ? '—' : fmtHours(r.stats.worked)}</td>
                <td>{r.isFuture ? '—' : (
                  <span className={r.diff >= 0 ? 'pill pill-success' : 'pill pill-danger'}>
                    {r.diff >= 0 ? '+' : ''}{fmtHours(r.diff)}
                  </span>
                )}</td>
                <td>{r.isFuture ? '—' : (
                  <div className="q-progress">
                    <div className={`q-progress-fill ${r.pct >= 100 ? 'complete' : ''}`} style={{width: r.pct + '%'}} />
                  </div>
                )}</td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr style={{fontWeight:600}}>
              <td colSpan={2}>סה״כ שנתי</td>
              <td>{fmtHours(totalTarget)}</td>
              <td>{fmtHours(totalWorked)}</td>
              <td>
                <span className={(totalWorked-totalTarget) >= 0 ? 'pill pill-success' : 'pill pill-danger'}>
                  {(totalWorked-totalTarget) >= 0 ? '+' : ''}{fmtHours(totalWorked-totalTarget)}
                </span>
              </td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

// ===================== Export CSV =====================
function ExportCSVModal({ entries, settings, user, onClose }) {
  const [level, setLevel] = useState('monthly');
  const jobPercent = user.job_percent ?? 100;
  const customDailyHours = user.custom_daily_hours || null;
  const today = new Date();

  const buildCSV = () => {
    const rows = [['תאריך','יום','שעות','כניסה','יציאה','מיקום','הערה']];
    let filtered = [...entries].sort((a,b) => a.date.localeCompare(b.date));

    if (level === 'monthly') {
      const ms = new Date(today.getFullYear(), today.getMonth(), 1);
      const me = new Date(today.getFullYear(), today.getMonth()+1, 0);
      filtered = filtered.filter(e => { const d = parseYmd(e.date); return d >= ms && d <= me; });
    } else if (level === 'quarterly') {
      const q = Math.floor(today.getMonth() / 3);
      const qs = new Date(today.getFullYear(), q*3, 1);
      const qe = new Date(today.getFullYear(), q*3+3, 0);
      filtered = filtered.filter(e => { const d = parseYmd(e.date); return d >= qs && d <= qe; });
    } else {
      filtered = filtered.filter(e => e.date.startsWith(String(today.getFullYear())));
    }

    for (const e of filtered) {
      const d = parseYmd(e.date);
      rows.push([
        fmtDateIL(d),
        HEB_DAYS[d.getDay()],
        e.hours,
        e.start || '',
        e.end || '',
        e.location === 'home' ? 'מהבית' : 'מהמשרד',
        e.note || '',
      ]);
    }

    // Summary rows
    const totalHours = filtered.reduce((s,e) => s+e.hours, 0);
    rows.push([]);
    rows.push(['סה"כ שעות', fmtHours(totalHours), '', '', '', '', '']);

    return rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  };

  const download = () => {
    const csv = buildCSV();
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const labels = { monthly: 'חודשי', quarterly: 'רבעוני', yearly: 'שנתי' };
    a.download = `שעות_${labels[level]}_${ymd(today)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    onClose();
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">ייצוא CSV</div>
        <div className="form-group">
          <label className="form-label">רמת סיכום</label>
          <select value={level} onChange={e => setLevel(e.target.value)}>
            <option value="monthly">חודשי — החודש הנוכחי</option>
            <option value="quarterly">רבעוני — הרבעון הנוכחי</option>
            <option value="yearly">שנתי — כל השנה</option>
          </select>
        </div>
        <div className="form-actions">
          <button className="btn btn-primary" onClick={download}>הורד CSV</button>
          <button className="btn btn-secondary" onClick={onClose}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

// ===================== Import CSV =====================
function ImportCSVModal({ onImport, onClose }) {
  const [preview, setPreview] = useState(null);
  const [error, setError] = useState('');

  const parseCSV = (text) => {
    const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
    return lines.map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim());
      return cols;
    });
  };

  const detectAndParse = (rows) => {
    if (rows.length < 2) return null;
    const header = rows[0].map(h => h.toLowerCase().replace(/"/g,'').trim());
    const find = (...keys) => {
      for (const k of keys) { const i = header.findIndex(h => h.includes(k)); if (i >= 0) return i; }
      return -1;
    };
    const dateIdx  = find('תאריך','date','ymd');
    const startIdx = find('כניסה','start','from','התחלה');
    const endIdx   = find('יציאה','end','to','סיום');
    const hoursIdx = find('שעות','hours','total','סה');
    const noteIdx  = find('הערה','note','notes');
    if (dateIdx < 0) return null;

    const entries = [];
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row[dateIdx]) continue;
      let dateStr = row[dateIdx].replace(/"/g,'').trim();
      // Parse DD.MM.YYYY or YYYY-MM-DD
      let isoDate;
      if (dateStr.includes('.')) {
        const [d,m,y] = dateStr.split('.').map(Number);
        isoDate = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      } else { isoDate = dateStr.slice(0,10); }
      if (!isoDate || isoDate.length < 10) continue;

      let hours = 0, start = null, end = null, mode = 'hours';
      const startStr = startIdx >= 0 ? row[startIdx]?.replace(/"/g,'').trim() : '';
      const endStr   = endIdx   >= 0 ? row[endIdx]?.replace(/"/g,'').trim()   : '';
      if (startStr && endStr) {
        const s = timeStrToHours(startStr), e = timeStrToHours(endStr);
        if (e > s) { hours = Math.round((e-s)*100)/100; start = startStr; end = endStr; mode = 'range'; }
      }
      if (!hours && hoursIdx >= 0) {
        hours = parseFloat(row[hoursIdx]?.replace(/"/g,'').replace(':','.')) || 0;
      }
      if (!hours) continue;
      entries.push({
        id: 'imp_' + Date.now() + '_' + Math.random().toString(36).slice(2,6) + i,
        date: isoDate, hours, start, end, mode,
        note: noteIdx >= 0 ? (row[noteIdx]?.replace(/"/g,'').trim() || '') : 'יובא מ-CSV',
        location: 'office',
        createdAt: new Date().toISOString(),
      });
    }
    return entries;
  };

  const onFile = (e) => {
    setError(''); setPreview(null);
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const rows = parseCSV(ev.target.result);
        const entries = detectAndParse(rows);
        if (!entries || entries.length === 0) { setError('לא ניתן לזהות שורות תקינות בקובץ'); return; }
        setPreview(entries);
      } catch { setError('שגיאה בקריאת הקובץ'); }
    };
    reader.readAsText(file, 'UTF-8');
  };

  const doImport = () => { onImport(preview); onClose(); };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" style={{maxWidth:560}} onClick={e => e.stopPropagation()}>
        <div className="modal-title">ייבוא CSV</div>
        <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:12}}>
          העלה קובץ CSV עם עמודות תאריך, כניסה, יציאה (או שעות). המערכת תזהה אוטומטית.
        </div>
        {error && <div className="form-error">{error}</div>}
        <div className="form-group">
          <input type="file" accept=".csv,.txt" onChange={onFile} />
        </div>
        {preview && (
          <div>
            <div style={{fontSize:13,color:'var(--success)',marginBottom:8}}>
              זוהו {preview.length} רישומים — תצוגה מקדימה (5 ראשונים):
            </div>
            <div className="table-wrap" style={{maxHeight:160,overflow:'auto',marginBottom:12}}>
              <table className="data" style={{fontSize:12}}>
                <thead><tr><th>תאריך</th><th>שעות</th><th>כניסה–יציאה</th><th>הערה</th></tr></thead>
                <tbody>
                  {preview.slice(0,5).map(e => (
                    <tr key={e.id}>
                      <td>{e.date}</td>
                      <td>{fmtHours(e.hours)}</td>
                      <td style={{fontSize:11}}>{e.start && e.end ? `${e.start}–${e.end}` : '—'}</td>
                      <td style={{fontSize:11}}>{e.note}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="form-actions">
              <button className="btn btn-primary" onClick={doImport}>ייבא {preview.length} רישומים</button>
              <button className="btn btn-secondary" onClick={onClose}>ביטול</button>
            </div>
          </div>
        )}
        {!preview && <div className="form-actions"><button className="btn btn-secondary" onClick={onClose}>ביטול</button></div>}
      </div>
    </div>
  );
}

// ===================== Main app =====================
function App() {
  const auth = useAuth();
  const [tab, setTab] = useState('dashboard');

  // ---- Entries ----
  const [entries, setEntriesState] = useState([]);
  const [entriesLoaded, setEntriesLoaded] = useState(false);

  // ---- Settings ----
  const [settings, setSettingsState] = useState(DEFAULT_SETTINGS);

  // ---- Days off ----
  const [daysOff, setDaysOffState] = useState([]);

  // ---- DB setup state (null=unknown, true=ok, false=missing) ----
  const [dbSetup, setDbSetup] = useState({ daysOff: null, jobPercent: null });

  // ---- Active punch (device-local, ephemeral) ----
  const [activePunch, setActivePunchState] = useState(() => loadPunch());

  // ---- Loading spinner ----
  const [globalLoading, setGlobalLoading] = useState(false);

  const user = auth.currentUser;

  const DB_SETUP_SQL =
`-- 1. אחוז משרה + שעות מותאמות אישית
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS job_percent INTEGER DEFAULT 100;
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS custom_daily_hours JSONB;

-- 2. פיצ'ר פיננסי — הגדרות שכר
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS salary_type TEXT DEFAULT 'hourly';
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS hourly_rate NUMERIC(10,2) DEFAULT 0;
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS base_salary NUMERIC(10,2) DEFAULT 0;

-- 3. נקודות זיכוי (לחישוב נטו 2026)
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS credit_points NUMERIC(4,2) DEFAULT 2.25;

-- 4. הוצאות בהזנות זמן
ALTER TABLE time_entries ADD COLUMN IF NOT EXISTS expenses JSONB DEFAULT '[]'::jsonb;

-- 5. טיפים ותגמול משמרת
ALTER TABLE time_entries ADD COLUMN IF NOT EXISTS tips NUMERIC(10,2) DEFAULT 0;
ALTER TABLE time_entries ADD COLUMN IF NOT EXISTS shift_bonus NUMERIC(10,2) DEFAULT 0;

-- 6. פנסיה + קרן השתלמות
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS pension_rate NUMERIC(5,2) DEFAULT 6.0;
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS study_fund_rate NUMERIC(5,2) DEFAULT 2.5;
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS pensionable_pct NUMERIC(5,2) DEFAULT 100.0;

-- 7. טבלת ימי חופש
CREATE TABLE IF NOT EXISTS days_off (
  id TEXT PRIMARY KEY,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  date DATE NOT NULL,
  note TEXT DEFAULT '',
  created_at TIMESTAMPTZ DEFAULT NOW()
);
ALTER TABLE days_off ENABLE ROW LEVEL SECURITY;
DO $$ BEGIN
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='days_off' AND policyname='users_days_off') THEN
    CREATE POLICY "users_days_off" ON days_off FOR ALL USING (user_id = auth.uid()) WITH CHECK (user_id = auth.uid());
  END IF;
END $$;

-- 8. סנכרון שעון נוכחות בין מכשירים (punch_state)
ALTER TABLE profiles ADD COLUMN IF NOT EXISTS punch_state JSONB DEFAULT NULL;

-- 9. Real-time — הפעל שידור שינויים בטבלת הזנות זמן
ALTER TABLE time_entries REPLICA IDENTITY FULL;
ALTER PUBLICATION supabase_realtime ADD TABLE time_entries;`;

  // Load entries + settings when user logs in
  useEffect(() => {
    if (!user) { setEntriesState([]); setEntriesLoaded(false); setDaysOffState([]); return; }
    loadEntries();
    loadSettings();
    loadDaysOff();
    loadPunchState();
    checkDbSetup();
    if (user.role === 'admin') auth.loadUsers();
  }, [user?.id]);

  // ===== Geofencing =====
  useEffect(() => {
    if (!user || !navigator.geolocation) return;
    if (localStorage.getItem('tt_geo_enabled') !== '1') return;
    if (Notification.permission === 'default') Notification.requestPermission();
    const check = () => {
      const coordsStr = localStorage.getItem('tt_geo_coords');
      if (!coordsStr) return;
      const office = JSON.parse(coordsStr);
      const radius = parseInt(localStorage.getItem('tt_geo_radius') || '200');
      navigator.geolocation.getCurrentPosition(pos => {
        const dist = haversineMeters(pos.coords, office);
        if (dist <= radius && !activePunch && Notification.permission === 'granted') {
          new Notification('מעקב שעות 🕐', { body: 'נראה שהגעת למשרד — רוצה להתחיל שעון נוכחות?', icon: '' });
        } else if (dist > radius * 2 && activePunch && Notification.permission === 'granted') {
          new Notification('מעקב שעות 🕐', { body: 'נראה שעזבת את המשרד — רוצה לעצור את שעון הנוכחות?', icon: '' });
        }
      }, () => {});
    };
    const id = setInterval(check, 5 * 60 * 1000);
    check();
    return () => clearInterval(id);
  }, [user?.id, activePunch]);

  // ===== Real-time subscription (Supabase WebSocket) =====
  useEffect(() => {
    if (!user) return;
    const unsub = sb.subscribe(user.id, () => {
      loadEntries(); // re-fetch on any remote INSERT/UPDATE/DELETE
    });
    return unsub;
  }, [user?.id]);

  // ===== Visibility change: re-fetch data + refresh session if stale =====
  useEffect(() => {
    if (!user) return;
    let hiddenAt = null;
    let lastFetch = 0;
    const onVisibility = async () => {
      if (document.visibilityState === 'hidden') { hiddenAt = Date.now(); return; }
      // Tab became visible
      const hiddenMs = hiddenAt ? Date.now() - hiddenAt : 0;
      hiddenAt = null;
      if (Date.now() - lastFetch < 8000) return; // debounce rapid tab-switches
      lastFetch = Date.now();
      // Refresh session token if hidden > 5 min (prevents stale auth on long backgrounds)
      if (hiddenMs > 5 * 60 * 1000) {
        const session = loadToken();
        if (session?.refresh_token) {
          try {
            const res = await sb.refreshSession(session.refresh_token);
            if (res.access_token) {
              sb._token = res.access_token;
              saveToken({ access_token: res.access_token, refresh_token: res.refresh_token });
            }
          } catch {}
        }
      }
      loadEntries();
      loadSettings();
      loadPunchState();
    };
    document.addEventListener('visibilitychange', onVisibility);
    return () => document.removeEventListener('visibilitychange', onVisibility);
  }, [user?.id]);

  // ===== Window focus: re-fetch (covers switching from another OS window) =====
  useEffect(() => {
    if (!user) return;
    let lastFocus = 0;
    const onFocus = () => {
      if (Date.now() - lastFocus < 8000) return;
      lastFocus = Date.now();
      loadEntries();
      loadPunchState();
    };
    window.addEventListener('focus', onFocus);
    return () => window.removeEventListener('focus', onFocus);
  }, [user?.id]);

  const checkDbSetup = async () => {
    // Check days_off table
    try {
      await sb.select('days_off', 'limit=1');
      setDbSetup(s => ({ ...s, daysOff: true }));
    } catch(e) { setDbSetup(s => ({ ...s, daysOff: false })); }
    // Check job_percent column
    try {
      await sb.select('profiles', 'select=job_percent&limit=1');
      setDbSetup(s => ({ ...s, jobPercent: true }));
    } catch(e) { setDbSetup(s => ({ ...s, jobPercent: false })); }
    // Check salary columns
    try {
      await sb.select('profiles', 'select=salary_type,hourly_rate,base_salary&limit=1');
      setDbSetup(s => ({ ...s, salary: true }));
    } catch(e) { setDbSetup(s => ({ ...s, salary: false })); }
    // Check expenses column
    try {
      await sb.select('time_entries', 'select=expenses&limit=1');
      setDbSetup(s => ({ ...s, expenses: true }));
    } catch(e) { setDbSetup(s => ({ ...s, expenses: false })); }
    // Check tips/shift_bonus columns
    try {
      await sb.select('time_entries', 'select=tips,shift_bonus&limit=1');
      setDbSetup(s => ({ ...s, tips: true }));
    } catch(e) { setDbSetup(s => ({ ...s, tips: false })); }
  };

  const loadDaysOff = async () => {
    try {
      const rows = await sb.select('days_off', `user_id=eq.${user.id}&order=date.desc`);
      setDaysOffState(rows);
    } catch(e) { setDaysOffState([]); }
  };

  // Sync activePunch from server (cross-device). punch_state column may not exist yet — handled defensively.
  const loadPunchState = async () => {
    try {
      const rows = await sb.select('profiles', `id=eq.${user.id}&select=punch_state`);
      const serverPunch = rows[0]?.punch_state;
      if (serverPunch?.start) {
        // Another device has an active punch — adopt it
        setActivePunchState(serverPunch);
        savePunch(serverPunch);
      } else if (serverPunch === null) {
        // Server explicitly cleared punch (stopped on another device)
        const local = loadPunch();
        if (local) { setActivePunchState(null); savePunch(null); }
      }
    } catch { /* column not yet added — fall back to localStorage */ }
  };

  // pension/creditPoints handled defensively in saveEntries/updateSalaryConfig — not required for banner
  const dbNeedsSetup = (dbSetup.daysOff === false || dbSetup.jobPercent === false || dbSetup.salary === false || dbSetup.expenses === false || dbSetup.tips === false) && !localStorage.getItem('tt_db_dismissed');
  const [sqlCopied, setSqlCopied] = useState(false);
  const copySql = () => {
    navigator.clipboard.writeText(DB_SETUP_SQL).then(() => {
      setSqlCopied(true); setTimeout(() => setSqlCopied(false), 2500);
    });
  };

  const loadEntries = async () => {
    try {
      const rows = await sb.select('time_entries',
        `user_id=eq.${user.id}&order=date.desc,created_at.desc`
      );
      setEntriesState(rows.map(normalizeEntry));
      setEntriesLoaded(true);
    } catch (e) { console.error('entries load:', e); }
  };

  const loadSettings = async () => {
    try {
      const rows = await sb.select('settings', '');
      const map = {};
      for (const r of rows) map[r.key] = r.value;
      // Load day_overrides
      const ovRows = await sb.select('day_overrides', 'order=date.asc');
      const overrides = {};
      const disabledHolidays = [];
      for (const r of ovRows) {
        if (r.disabled) {
          disabledHolidays.push(r.date);
        } else {
          overrides[r.date] = { hours: r.hours, note: r.note, type: r.type };
        }
      }
      setSettingsState({
        standardHours: map.standardHours ?? DEFAULT_SETTINGS.standardHours,
        holidayHours:  map.holidayHours  ?? DEFAULT_SETTINGS.holidayHours,
        disabledHolidays,
        overrides,
      });
    } catch (e) { console.error('settings load:', e); }
  };

  // Convert DB row to app entry format
  const normalizeEntry = r => ({
    id: r.id,
    date: typeof r.date === 'string' ? r.date.slice(0, 10) : r.date,
    hours: Number(r.hours),
    start: r.start_time,
    end: r.end_time,
    note: r.note || '',
    mode: r.mode || 'range',
    location: r.location || DEFAULT_LOCATION,
    viaPunch: r.via_punch,
    expenses: Array.isArray(r.expenses) ? r.expenses : [],
    tips: parseFloat(r.tips) || 0,
    shift_bonus: parseFloat(r.shift_bonus) || 0,
    createdAt: r.created_at,
  });

  // ---- Entries CRUD ----
  const saveEntries = async (nextEntries) => {
    // Called by EntriesTab with full updated array. Diff vs current to upsert/delete.
    // Optimistic update first — UI reflects change immediately regardless of DB result.
    const prevEntries = entries;
    setEntriesState(nextEntries);

    const currentIds = new Set(prevEntries.map(e => e.id));
    const nextIds = new Set(nextEntries.map(e => e.id));

    // Deleted
    const deletedIds = [...currentIds].filter(id => !nextIds.has(id));
    for (const id of deletedIds) {
      try { await sb.delete('time_entries', 'id', id); }
      catch(err) { console.error('delete entry:', err); }
    }

    // Upserted (new or changed)
    const toUpsert = nextEntries.filter(e =>
      !currentIds.has(e.id) ||
      JSON.stringify(e) !== JSON.stringify(prevEntries.find(x => x.id === e.id))
    );
    for (const e of toUpsert) {
      const basePayload = {
        id: e.id,
        user_id: user.id,
        date: e.date,
        hours: e.hours,
        start_time: e.start || null,
        end_time: e.end || null,
        note: e.note || '',
        mode: e.mode || 'range',
        location: e.location || DEFAULT_LOCATION,
        via_punch: e.viaPunch || false,
        expenses: e.expenses || [],
        created_at: e.createdAt || new Date().toISOString(),
      };
      if (dbSetup.tips !== false) {
        try {
          await sb.upsert('time_entries', {
            ...basePayload,
            tips: parseFloat(e.tips) || 0,
            shift_bonus: parseFloat(e.shift_bonus) || 0,
          }, 'id');
          continue;
        } catch(err) {
          // Column doesn't exist yet — fall back to base payload and show DB setup banner
          setDbSetup(s => ({ ...s, tips: false }));
        }
      }
      try {
        await sb.upsert('time_entries', basePayload, 'id');
      } catch(err) {
        console.error('upsert entry:', err);
      }
    }
  };

  // EntriesTab passes { userId: [entries] } — flatten to array
  const setEntries = async (entriesByUser) => {
    const next = entriesByUser[user.id] || [];
    await saveEntries(next);
  };

  // ---- Settings save ----
  const setSettings = async (next) => {
    setSettingsState(next);
    try {
      // Save standardHours + holidayHours as settings rows
      await sb.upsert('settings', { key: 'standardHours', value: next.standardHours, updated_at: new Date().toISOString() }, 'key');
      await sb.upsert('settings', { key: 'holidayHours',  value: next.holidayHours,  updated_at: new Date().toISOString() }, 'key');

      // Sync day_overrides: delete all then re-insert
      // Get existing dates
      const existing = await sb.select('day_overrides', 'select=date');
      const existingDates = existing.map(r => r.date);

      // Build desired rows
      const desiredRows = [];
      for (const [date, ov] of Object.entries(next.overrides || {})) {
        desiredRows.push({ date, hours: ov.hours, note: ov.note || '', type: ov.type || 'custom', disabled: false });
      }
      for (const date of (next.disabledHolidays || [])) {
        desiredRows.push({ date, hours: 0, note: '', type: 'disabled', disabled: true });
      }

      // Delete removed dates
      const desiredDates = new Set(desiredRows.map(r => r.date));
      const toDelete = existingDates.filter(d => !desiredDates.has(d));
      if (toDelete.length) await sb.deleteMulti('day_overrides', 'date', toDelete);

      // Upsert all desired rows
      for (const row of desiredRows) {
        await sb.upsert('day_overrides', row, 'date');
      }
    } catch (e) { console.error('settings save:', e); }
  };

  // ---- Punch ----
  const setActivePunch = (v) => { savePunch(v); setActivePunchState(v); };

  const handlePunch = async ({ action, location }) => {
    if (action === 'start') {
      if (activePunch) return;
      const now = await sb.serverTime(); // server clock — immune to device drift
      const punch = { start: now.toISOString(), location: location || DEFAULT_LOCATION };
      setActivePunch(punch);
      try { await sb.updateProfile(user.id, { punch_state: punch }); } catch {} // cross-device sync
    } else if (action === 'stop') {
      if (!activePunch) return;
      const now = await sb.serverTime();
      const startDate = new Date(activePunch.start);
      const hours = diffHours(activePunch.start, now.toISOString());
      if (hours < 0.01) {
        if (!confirm('פחות מדקה נרשמה. להפסיק בכל זאת?')) return;
      }
      const newEntry = {
        id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        date: ymd(startDate),
        hours: Math.round(hours * 100) / 100,
        start: fmtTime24(startDate),
        end:   fmtTime24(now),
        note: '',
        mode: 'range',
        location: location || activePunch.location || DEFAULT_LOCATION,
        viaPunch: true,
        expenses: activePunch.expenses || [],
        createdAt: now.toISOString(),
      };
      setActivePunch(null);
      try { await sb.updateProfile(user.id, { punch_state: null }); } catch {} // clear cross-device
      await saveEntries([...entries, newEntry]);
    }
  };

  const handleEditPunch = (newStartIso, expenses) => {
    if (!activePunch) return;
    const updated = { ...activePunch, start: newStartIso, expenses: expenses || activePunch.expenses || [] };
    setActivePunch(updated);
    try { sb.updateProfile(user.id, { punch_state: updated }); } catch {} // sync edit cross-device
  };

  // ---- Admin: manage users ----
  const setUsers = async (updatedList) => {
    // Find changed roles
    for (const u2 of updatedList) {
      const orig = auth.users.find(x => x.id === u2.id);
      if (orig && orig.role !== u2.role) {
        await sb.update('profiles', { role: u2.role }, 'id', u2.id);
      }
    }
    await auth.loadUsers();
  };
  const deleteUser = async (userId) => {
    // Delete entries then profile (auth user deletion needs service role, skip for now)
    await sb.delete('time_entries', 'user_id', userId);
    await sb.delete('profiles', 'id', userId);
    await auth.loadUsers();
  };

  // ---- Loading states ----
  if (auth.loading) {
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-muted)', fontSize:15}}>
        טוען...
      </div>
    );
  }

  if (!user) return <LoginScreen auth={auth} />;

  // Build entries in the shape EntriesTab expects: { userId: [entries] }
  const entriesByUser = { [user.id]: entries };

  const tabs = [
    { id: 'dashboard', label: 'מסך ראשי' },
    { id: 'entries',   label: 'השעות שלי' },
    { id: 'quarterly', label: 'סיכום רבעוני' },
    { id: 'account',   label: 'החשבון שלי' },
  ];
  if (user.role === 'admin') tabs.push({ id: 'admin', label: 'הגדרות וניהול' });

  const BOTTOM_NAV = [
    { id:'dashboard', label:'ראשי', icon:(
      <svg viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
    )},
    { id:'entries', label:'שעות', icon:(
      <svg viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    )},
    { id:'quarterly', label:'רבעוני', icon:(
      <svg viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    )},
    { id:'account', label:'חשבון', icon:(
      <svg viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    )},
    ...(user.role === 'admin' ? [{ id:'admin', label:'ניהול', icon:(
      <svg viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    )}] : []),
  ];

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-title">
          <div className="logo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div className="topbar-brand">
            <span className="topbar-brand-name">TimeKeeper</span>
            <span className="topbar-brand-sub">by alon katz</span>
          </div>
        </div>
        <div className="topbar-user">
          <div className="user-chip">
            <div className="user-avatar">{user.name.charAt(0)}</div>
            <span className="user-name">{user.name}</span>
            {user.role === 'admin' && <span className="admin-badge">מנהל</span>}
          </div>
          <button className="btn btn-ghost topbar-logout" onClick={auth.logout}>יציאה</button>
        </div>
      </div>

      <div className="tabs">
        {tabs.map(t => (
          <button key={t.id} className={`tab ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Mobile bottom nav */}
      <nav className="bottom-nav" aria-label="ניווט ראשי">
        {BOTTOM_NAV.map(n => (
          <button key={n.id} className={`bottom-nav-btn ${tab === n.id ? 'active' : ''}`} onClick={() => setTab(n.id)} aria-label={n.label}>
            {n.icon}
            {n.label}
          </button>
        ))}
      </nav>

      {user.role === 'admin' && dbNeedsSetup && (
        <div className="setup-banner">
          <div className="setup-banner-title">⚙️ נדרשת הגדרה חד-פעמית של מסד הנתונים</div>
          <div style={{fontSize:13, color:'var(--text-muted)', marginBottom:10}}>
            יש להריץ את ה-SQL הבא ב-Supabase SQL Editor כדי להפעיל את כל פיצ'רי המערכת. לחץ "העתק SQL" → הדבק ב-Editor → הרץ.
          </div>
          <div className="setup-sql">{DB_SETUP_SQL}</div>
          <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
            <button className="btn btn-primary btn-sm" onClick={copySql}>
              {sqlCopied ? '✓ הועתק!' : 'העתק SQL'}
            </button>
            <a
              href="https://app.supabase.com/project/yxmbammlzweasjvpouqn/sql/new"
              target="_blank"
              rel="noopener noreferrer"
              className="btn btn-secondary btn-sm"
            >
              פתח Supabase SQL Editor ↗
            </a>
            <button className="btn btn-ghost btn-sm" onClick={checkDbSetup}>
              בדוק שוב לאחר ההרצה
            </button>
            <button className="btn btn-ghost btn-sm" style={{marginRight:'auto',color:'var(--text-muted)'}} onClick={() => { localStorage.setItem('tt_db_dismissed','1'); checkDbSetup(); }}>
              ✕ הרצתי — סגור לצמיתות
            </button>
          </div>
        </div>
      )}

      {tab === 'dashboard' && (
        <Dashboard
          user={user}
          auth={auth}
          entries={entries}
          settings={settings}
          setSettings={setSettings}
          activePunch={activePunch}
          onPunch={handlePunch}
          onEditPunch={handleEditPunch}
          daysOff={daysOff}
        />
      )}
      {tab === 'entries' && (
        <EntriesTab
          user={user}
          entries={entriesByUser}
          setEntries={setEntries}
          settings={settings}
          daysOff={daysOff}
        />
      )}
      {tab === 'quarterly' && (
        <QuarterlyView
          entries={entries}
          settings={settings}
          user={user}
        />
      )}
      {tab === 'account' && (
        <AccountSettings user={user} auth={auth} />
      )}
      {tab === 'admin' && user.role === 'admin' && (
        <AdminSettings
          settings={settings}
          setSettings={setSettings}
          users={auth.users}
          setUsers={setUsers}
          deleteUser={deleteUser}
          currentUser={user}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
