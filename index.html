<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מעקב שעות צוות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root {
    --bg: #18181d;
    --surface: #222229;
    --surface-2: #2a2a33;
    --border: #38383f;
    --border-strong: #52525e;
    --text: #eeeef2;
    --text-muted: #8a8a9e;
    --text-soft: #48485a;
    --primary: #F58800;
    --primary-hover: #e07a00;
    --primary-soft: #2a1a00;
    --danger: #f87171;
    --danger-soft: #2d1515;
    --warning: #F8BC24;
    --warning-soft: #2a2000;
    --success: #34d399;
    --success-soft: #0d2a1a;
    --info: #7878b8;
    --info-soft: #1c1c2e;
    --radius: 14px;
    --radius-sm: 9px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.6);
    --shadow: 0 4px 24px rgba(0,0,0,0.7);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Heebo", "Arial Hebrew", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
  }

  input, select, textarea {
    font-family: inherit;
    font-size: inherit;
  }

  input[type="text"],
  input[type="password"],
  input[type="number"],
  input[type="date"],
  input[type="time"],
  select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
    color-scheme: dark;
  }

  /* Custom 24h time input: two numeric fields (HH and MM) */
  .t24 {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 4px 10px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
    direction: ltr;
  }
  .t24:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
  }
  .t24 input {
    width: 3ch;
    min-width: 0;
    padding: 5px 2px;
    border: none;
    background: transparent;
    font-size: 15px;
    font-variant-numeric: tabular-nums;
    text-align: center;
    font-family: inherit;
    color: var(--text);
  }
  .t24 input:focus { outline: none; }
  .t24 input::placeholder { color: var(--text-soft); }
  .t24 .t24-sep {
    color: var(--text-muted);
    font-weight: 500;
    user-select: none;
    padding: 0 1px;
  }
  .t24 .t24-hint {
    margin-inline-start: auto;
    font-size: 11px;
    color: var(--text-soft);
    letter-spacing: 0.5px;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }

  /* ===== Top bar ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 20px;
    background: linear-gradient(135deg, #222229 0%, #2a2a36 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .topbar-title {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .topbar-title .logo {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, #F58800 0%, #F8BC24 100%);
    color: #18181d;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 2px 10px rgba(245,136,0,0.5);
    flex-shrink: 0;
  }
  .topbar-brand { display: flex; flex-direction: column; gap: 1px; }
  .topbar-brand-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.1;
    letter-spacing: -0.3px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Heebo", "Arial Hebrew", sans-serif;
  }
  .topbar-brand-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.1px;
  }
  .topbar-user {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #333340 0%, #484858 100%);
    color: #F8BC24;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 13px;
    border: 1.5px solid rgba(248,188,36,0.35);
    flex-shrink: 0;
  }
  .admin-badge {
    background: rgba(245,136,0,0.15);
    color: #F58800;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(245,136,0,0.3);
    white-space: nowrap;
  }
  .topbar-logout {
    white-space: nowrap;
    flex-shrink: 0;
    min-height: 34px !important;
    padding: 5px 12px !important;
  }
  @media (max-width: 640px) {
    .topbar { padding: 10px 14px; gap: 8px; }
    .topbar-title .logo { width: 30px; height: 30px; font-size: 14px; }
    .topbar-brand-name { font-size: 17px; }
    .topbar-brand-sub { font-size: 10px; }
    .user-chip .user-name { display: none; }
    .topbar-user { gap: 8px; }
    .topbar-logout { padding: 5px 10px !important; font-size: 12px; }
  }
  @media (max-width: 360px) {
    .topbar-brand-sub { display: none; }
    .admin-badge { display: none; }
  }

  /* ===== Tabs ===== */
  .tabs {
    display: flex;
    gap: 4px;
    background: #222229;
    padding: 5px;
    border-radius: var(--radius);
    border: 1px solid #38383f;
    margin-bottom: 20px;
    overflow-x: auto;
  }
  .tab {
    flex: 1;
    min-width: max-content;
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    text-align: center;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover:not(.active) { background: var(--surface-2); color: var(--text); }
  .tab.active {
    background: linear-gradient(135deg, #F58800 0%, #e07a00 100%);
    color: #18181d;
    font-weight: 600;
    box-shadow: 0 2px 10px rgba(245,136,0,0.4);
  }

  /* ===== Cards ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .card + .card { margin-top: 16px; }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 16px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title span.count {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ===== Buttons ===== */
  .btn {
    padding: 9px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #F58800 0%, #e07a00 100%);
    color: #18181d;
    font-weight: 600;
    box-shadow: 0 2px 10px rgba(245,136,0,0.35);
    transition: all 0.15s;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #F8BC24 0%, #F58800 100%);
    box-shadow: 0 4px 16px rgba(245,136,0,0.5);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    background: var(--border-strong);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { background: var(--surface-2); }
  .btn-danger {
    background: var(--danger-soft);
    color: var(--danger);
  }
  .btn-danger:hover { background: #fecaca; }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    padding: 6px 10px;
  }
  .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-lg { padding: 14px 20px; font-size: 16px; }
  .btn-block { width: 100%; justify-content: center; }

  /* ===== Login ===== */
  .login-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(145deg, #222229 0%, #2a2a36 100%);
    border: 1px solid #38383f;
    border-radius: var(--radius-lg);
    padding: 36px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(38,104,103,0.3);
  }
  .login-logo {
    width: 60px; height: 60px;
    border-radius: 18px;
    background: linear-gradient(135deg, #F58800 0%, #F8BC24 100%);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin: 0 auto 20px;
    box-shadow: 0 4px 20px rgba(245,136,0,0.5);
    color: #18181d;
  }
  .login-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  .login-subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 24px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text);
  }
  .form-error {
    background: var(--danger-soft);
    color: var(--danger);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
  }

  /* Password field with toggle eye button */
  .pwd-wrap {
    position: relative;
  }
  .pwd-wrap input {
    padding-left: 40px; /* space for eye on the left since dir is rtl */
  }
  .pwd-toggle {
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .pwd-toggle:hover { background: var(--surface-2); color: var(--text); }
  .pwd-toggle:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
  .form-success {
    background: var(--success-soft);
    color: var(--success);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .toggle-auth {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .toggle-auth button {
    color: var(--primary);
    font-weight: 500;
    padding: 0 4px;
  }

  /* ===== Stats grid ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 640px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat-card { padding: 14px 12px; }
    .stat-value { font-size: 20px; }
    .stat-label { font-size: 12px; }
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #F58800, #F8BC24);
  }
  .stat-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-2px);
  }
  .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .stat-target {
    font-size: 13px;
    color: var(--text-muted);
  }
  .stat-bar {
    margin-top: 12px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #F58800, #F8BC24);
    transition: width 0.4s;
    border-radius: 3px;
  }
  .stat-bar-fill.complete { background: var(--success); }
  .stat-bar-fill.over { background: #F8BC24; }
  .stat-diff {
    font-size: 13px;
    margin-top: 10px;
    font-weight: 500;
  }
  .stat-diff.positive { color: var(--success); }
  .stat-diff.negative { color: var(--danger); }

  /* ===== Punch-in panel ===== */
  .punch-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .punch-status {
    padding: 18px;
    border-radius: var(--radius);
    background: var(--surface-2);
  }
  .punch-status.active {
    background: linear-gradient(135deg, #2a2a33 0%, #363640 100%);
    border: 1px solid #52525e;
    box-shadow: 0 0 0 1px rgba(82,82,94,0.2);
  }
  .punch-status-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .punch-status-time {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .punch-status-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Location segmented control */
  .loc-segment {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 3px;
    width: 100%;
  }
  .loc-segment button {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 6px;
    font-size: 13px;
    color: var(--text-muted);
    border-radius: 4px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .loc-segment button.active {
    background: var(--primary);
    color: white;
  }
  .loc-segment button:not(.active):hover {
    background: var(--surface-2);
    color: var(--text);
  }
  .loc-segment button svg {
    width: 14px; height: 14px;
  }

  /* Location pill on entries */
  .loc-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
  }
  .loc-pill.office   { background: var(--info-soft);    color: var(--info);    }
  .loc-pill.home     { background: var(--primary-soft); color: #93c5fd;        }
  .loc-pill.field    { background: #1a2e1a;             color: #6ee7b7;        }
  .loc-pill.client   { background: #1e1a2e;             color: #c4b5fd;        }
  .loc-pill.vacation { background: #0d2535;             color: #38bdf8;        }
  .loc-pill.sick     { background: var(--danger-soft);  color: var(--danger);  }
  .loc-pill svg { width: 12px; height: 12px; }

  /* Small "edit time" link inside punch status */
  .edit-time-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-right: 8px;
    font-size: 12px;
    color: var(--primary);
    font-weight: 500;
  }
  .edit-time-link:hover { text-decoration: underline; }

  /* ===== Tables ===== */
  .table-wrap {
    overflow-x: auto;
    margin: -4px;
    padding: 4px;
  }
  table.data {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  table.data th {
    text-align: right;
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
    white-space: nowrap;
  }
  table.data td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  table.data tr:last-child td { border-bottom: none; }
  table.data tr:hover td { background: var(--surface-2); }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
  }
  .pill-success { background: var(--success-soft); color: var(--success); }
  .pill-warning { background: var(--warning-soft); color: var(--warning); }
  .pill-danger  { background: var(--danger-soft); color: var(--danger); }
  .pill-info    { background: var(--info-soft); color: var(--info); }
  .pill-muted   { background: var(--surface-2); color: var(--text-muted); }

  /* ===== Form rows ===== */
  .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(140px, 100%), 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .form-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  /* ===== Modal ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(28, 25, 23, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1100;
    padding: 20px;
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 20px 0;
  }

  /* ===== Empty state ===== */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-icon {
    width: 56px; height: 56px;
    margin: 0 auto 14px;
    border-radius: 18px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px;}
  .empty-text { font-size: 13px; }

  /* ===== Actions row ===== */
  .actions-inline {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); transform: scale(1.1); }
  .icon-btn.danger:hover { background: var(--danger-soft); color: var(--danger); transform: scale(1.1); }

  /* ===== Month picker ===== */
  .period-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .period-nav .current {
    flex: 1;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
  }
  .nav-btn {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--border-strong);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }
  .nav-btn:hover { background: var(--surface-2); }

  /* ===== Admin section ===== */
  .admin-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .admin-section-title {
    font-size: 15px;
    font-weight: 600;
  }
  .admin-day-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }

// ===================== Storage helpers =====================
const SUPABASE_URL = 'https://yxmbammlzweasjvpouqn.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bWJhbW1sendlYXNqdnBvdXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTg0MjgsImV4cCI6MjA5MjY3NDQyOH0.JZfWJcSyGWVQhj2OScCzTpLvEpVly6IQSXfcKQI-YI0';

// Minimal Supabase REST client (no npm needed — raw fetch)
const sb = {
  _url: SUPABASE_URL,
  _key: SUPABASE_ANON,
  _token: null, // set after login

  headers(extra = {}) {
    const h = {
      'apikey': this._key,
      'Content-Type': 'application/json',
      ...extra,

    if (this._token) h['Authorization'] = `Bearer ${this._token}`;

  // Auth
  async signUp(email, password, name) {
    const r = await fetch(`${this._url}/auth/v1/signup`, {
      method: 'POST',
      headers: this.headers(),
      body: JSON.stringify({ email, password, data: { name } }),
    });
    return r.json();
  },
  async signIn(email, password) {
    const r = await fetch(`${this._url}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: this.headers(),
      body: JSON.stringify({ email, password }),
    });
    return r.json();
  },
  async signOut() {
    await fetch(`${this._url}/auth/v1/logout`, {
      method: 'POST', headers: this.headers(),
    });
    this._token = null;
  },
  async refreshSession(refreshToken) {
    const r = await fetch(`${this._url}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: this.headers(),
      body: JSON.stringify({ refresh_token: refreshToken }),
    });
    return r.json();
  },
  async getUser() {
    if (!this._token) return null;
    const r = await fetch(`${this._url}/auth/v1/user`, { headers: this.headers() });
    if (!r.ok) return null;
    return r.json();
  },

  // Generic REST helpers
  async select(table, params = '') {
    const r = await fetch(`${this._url}/rest/v1/${table}?${params}`, {
      headers: this.headers({ 'Prefer': 'return=representation' }),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.status); }
    return r.json();
  },
  async upsert(table, body, onConflict) {
    const qs = onConflict ? `?on_conflict=${onConflict}` : '';
    const r = await fetch(`${this._url}/rest/v1/${table}${qs}`, {
      method: 'POST',
      headers: this.headers({ 'Prefer': 'resolution=merge-duplicates,return=representation' }),
      body: JSON.stringify(body),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.status); }
    return r.json();
  },
  async update(table, body, matchCol, matchVal) {
    const r = await fetch(`${this._url}/rest/v1/${table}?${matchCol}=eq.${encodeURIComponent(matchVal)}`, {
      method: 'PATCH',
      headers: this.headers({ 'Prefer': 'return=representation' }),
      body: JSON.stringify(body),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.status); }
    return r.json();
  },
  async delete(table, matchCol, matchVal) {
    const r = await fetch(`${this._url}/rest/v1/${table}?${matchCol}=eq.${encodeURIComponent(matchVal)}`, {
      method: 'DELETE',
      headers: this.headers(),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.status); }
  },
  async deleteMulti(table, col, vals) {
    if (!vals.length) return;
    const list = vals.map(v => encodeURIComponent(v)).join(',');
    const r = await fetch(`${this._url}/rest/v1/${table}?${col}=in.(${list})`, {
      method: 'DELETE',
      headers: this.headers(),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.status); }
  },
  async updateProfile(userId, data) {
    return this.update('profiles', data, 'id', userId);
  },

  // Returns server UTC time via response Date header (avoids client clock drift)
  async serverTime() {
    try {
      const r = await fetch(`${this._url}/rest/v1/`, { method: 'HEAD', headers: { 'apikey': this._key } });
      const d = r.headers.get('Date');
      return d ? new Date(d) : new Date();
    } catch { return new Date(); }
  },

  // Lightweight Supabase Realtime v2 subscription (Phoenix channels over WebSocket).
  // Returns an unsubscribe function. Automatically reconnects on drop.
  subscribe(userId, onEvent) {
    const host = new URL(this._url).hostname;
    const wsUrl = `wss://${host}/realtime/v1/websocket?apikey=${this._key}&vsn=1.0.0`;
    const topic  = `realtime:sync-${userId.slice(0, 8)}`;
    let ws, hbId, ref = 0, dead = false;
    const connect = () => {
      try { ws = new WebSocket(wsUrl); } catch { return; }
      ws.onopen = () => {
        ws.send(JSON.stringify({
          topic, event: 'phx_join', ref: String(++ref),
          payload: {
            access_token: this._token,
            config: {
              broadcast: { ack: false, self: false },
              presence: { key: '' },
              postgres_changes: [
                { event: '*', schema: 'public', table: 'time_entries', filter: `user_id=eq.${userId}` },
              ],
            },
          },
        }));
        hbId = setInterval(() => {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: String(++ref) }));
          }
        }, 25000);
      };
      ws.onmessage = e => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.event === 'postgres_changes' && msg.payload?.data) onEvent(msg.payload.data);
        } catch {}
      };
      ws.onclose = () => { clearInterval(hbId); if (!dead) setTimeout(connect, 5000); };
      ws.onerror  = () => ws.close();
    };
    connect();
    return () => { dead = true; clearInterval(hbId); try { ws?.close(); } catch {} };
  },
};

// ===================== Date helpers =====================

const EXPENSE_TYPES = {

function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function parseYmd(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function startOfWeek(d) {
  // Sunday = 0 in JS, week starts Sunday
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dow = x.getDay();
  x.setDate(x.getDate() - dow);
  return x;
}
function endOfWeek(d) {
  const s = startOfWeek(d);
  const e = new Date(s);
  e.setDate(e.getDate() + 4); // Sun..Thu, ends Thursday
  return e;
}
function daysInRange(from, to) {
  const out = [];
  const cur = new Date(from);
  while (cur <= to) {
    out.push(new Date(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}
function fmtHours(h) {
  if (isNaN(h) || h === null || h === undefined) return '0:00';
  const sign = h < 0 ? '-' : '';
  const abs = Math.abs(h);
  const hh = Math.floor(abs);
  const mm = Math.round((abs - hh) * 60);
  if (mm === 60) return `${sign}${hh+1}:00`;
  return `${sign}${hh}:${String(mm).padStart(2,'0')}`;
}
// Always returns HH:MM in 24-hour format, regardless of locale.
function fmtTime24(date) {
  if (!date) return '--:--';
  const d = date instanceof Date ? date : new Date(date);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
// Returns DD/MM/YYYY — Israeli standard date format.
function fmtDateIL(d) {
  if (!d) return '';
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
// Returns DD/MM (no year) — for compact displays.
function fmtDateILShort(d) {
  if (!d) return '';
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
// Same but for a HH:MM string — normalizes to always have leading zeros.
function normalizeTimeStr(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(s => parseInt(s, 10));
  if (isNaN(h) || isNaN(m)) return t;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function timeStrToHours(t) {
  if (!t) return 0;
  const [h,m] = t.split(':').map(Number);
  return h + (m || 0) / 60;
}
function diffHours(startIso, endIso) {
  return (new Date(endIso) - new Date(startIso)) / 3600000;
}

// ===================== Business logic =====================
// Returns the "holiday info" for a date, considering built-in holidays,
// disabled list, and manual overrides. Returns null if it's a regular day.
function getHolidayInfo(date, settings) {
  const key = ymd(date);
  // Manual override wins
  const ov = settings.overrides?.[key];
  if (ov) {
    return { source: 'override', hours: ov.hours, note: ov.note, type: ov.type || 'custom' };
  }
  // Built-in Israeli holiday (if not disabled by admin)
  const disabled = settings.disabledHolidays || [];
  if (disabled.includes(key)) return null;
  const h = ISRAELI_HOLIDAYS[key];
  if (h) {
    const hours = settings.holidayHours?.[h.type] ?? HOLIDAY_TYPES[h.type].defaultHours;
    return { source: 'builtin', hours, note: h.note, type: h.type };
  }
  return null;
}

function getDailyTarget(date, settings) {
  const info = getHolidayInfo(date, settings);
  if (info) return info.hours;
  const dow = date.getDay();
  if (dow === 5 || dow === 6) return 0; // Fri/Sat are not workdays
  return settings.standardHours?.[dow] ?? 0;
}

function getWorkedOnDate(entries, date) {
  const key = ymd(date);
  return entries
    .filter(e => e.date === key)
    .reduce((sum, e) => sum + (e.hours || 0), 0);
}

function sessionDuration(session) {
  if (!session) return 0;
  const end = session.end ? new Date(session.end) : new Date();
  return (end - new Date(session.start)) / 3600000;
}

// Personal daily target — adjusted for job % and days off
function getPersonalDailyTarget(date, settings, jobPercent = 100, daysOff = [], customDailyHours = null) {
  if (daysOff.includes(ymd(date))) return 0;
  const dow = date.getDay();
  if (dow === 5 || dow === 6) return 0;
  const holidayInfo = getHolidayInfo(date, settings);
  if (holidayInfo) {
    const base = customDailyHours?.[dow] ?? (jobPercent >= 100 ? null : Math.round((settings.standardHours?.[0] ?? 9) * jobPercent / 100 * 100) / 100);
    return base !== null ? Math.round(holidayInfo.hours * (base / ((settings.standardHours?.[dow] ?? 9) || 1)) * 100) / 100 : holidayInfo.hours;
  }
  if (customDailyHours?.[dow] !== undefined && customDailyHours[dow] !== null) {
    return customDailyHours[dow];
  }
  if (jobPercent >= 100) return settings.standardHours?.[dow] ?? 0;
  const pct = jobPercent / 100;
  const base = settings.standardHours?.[0] ?? 9;
  return Math.round(base * pct * 100) / 100;
}

function getPersonalRangeStats(entries, settings, from, to, jobPercent = 100, daysOff = [], customDailyHours = null) {
  const days = daysInRange(from, to);
  let target = 0, worked = 0;
  for (const d of days) {
    target += getPersonalDailyTarget(d, settings, jobPercent, daysOff, customDailyHours);
    worked += getWorkedOnDate(entries, d);
  }
  return { target, worked, diff: worked - target };
}

// ===== Smart Fill helpers =====
function detectMissingDays(entries, settings, from, to, jobPercent, daysOff, customDailyHours) {
  // Dates with vacation/sick entries are NOT considered missing
  const leaveDates = new Set(entries.filter(e => e.location === 'vacation' || e.location === 'sick').map(e => e.date));
  const workedDates = new Set(entries.map(e => e.date));
  const today = ymd(new Date());
  return daysInRange(from, to)
    .filter(d => {
      const key = ymd(d);
      if (key >= today) return false;
      if (leaveDates.has(key)) return false; // vacation/sick = not missing
      const target = getPersonalDailyTarget(d, settings, jobPercent, daysOff, customDailyHours);
      return target > 0 && !workedDates.has(key);
    })
    .map(d => ({ date: ymd(d), target: getPersonalDailyTarget(d, settings, jobPercent, daysOff, customDailyHours) }));
}

function suggestHistoricalPattern(entries) {
  const recent = entries.filter(e => e.start && e.end).slice(0, 30);
  if (!recent.length) return { start: '09:00', end: '18:00' };
  const starts = recent.map(e => timeStrToHours(e.start));
  const ends   = recent.map(e => timeStrToHours(e.end));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const toHHMM = h => {
    const hh = Math.floor(h);
    const mm = Math.round((h-hh)*60/15)*15;
    return `${String(hh).padStart(2,'0')}:${String(mm>=60?0:mm).padStart(2,'0')}`;
  };
  return { start: toHHMM(avg(starts)), end: toHHMM(avg(ends)) };
}

// ===== Financial helpers =====
function haversineMeters(c1, c2) {
  const R=6371000, dLat=(c2.lat-c1.latitude)*Math.PI/180, dLng=(c2.lng-c1.longitude)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(c1.latitude*Math.PI/180)*Math.cos(c2.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function calcOvertimeBreakdown(worked, dailyTarget) {
  if (worked <= dailyTarget) return { regular: worked, ot1: 0, ot2: 0 };
  const ot = worked - dailyTarget;
  return { regular: dailyTarget, ot1: Math.min(ot, 2), ot2: Math.max(0, ot-2) };
}

function calcMonthlySalary(entries, settings, user, monthFrom, monthTo, daysOff, customDailyHours) {
  const type      = user.salary_type || 'hourly';
  const rate      = parseFloat(user.hourly_rate)  || 0;
  const base      = parseFloat(user.base_salary)  || 0;
  const jobPct    = user.job_percent ?? 100;
  const fromStr   = ymd(monthFrom), toStr = ymd(monthTo);
  const mEntries  = entries.filter(e => e.date >= fromStr && e.date <= toStr);
  const expenses  = mEntries.reduce((s,e)=>(e.expenses||[]).reduce((ss,x)=>ss+(parseFloat(x.amount)||0),s),0);
  const tips      = mEntries.reduce((s,e)=>s+(parseFloat(e.tips)||0),0);
  const shiftBonus= mEntries.reduce((s,e)=>s+(parseFloat(e.shift_bonus)||0),0);

  // ---- Israeli sick pay law: Day1=0%, Days2-3=50%, Day4+=100% ----
  let sickPay = 0;
  const sickEntries = mEntries.filter(e => e.location === 'sick')
    .sort((a,b) => a.date.localeCompare(b.date));
  if (sickEntries.length > 0 && type !== 'global' && rate > 0) {
    const groups = [];
    let cur = [sickEntries[0]];
    for (let i = 1; i < sickEntries.length; i++) {
      const prev = parseYmd(sickEntries[i-1].date);
      const curr = parseYmd(sickEntries[i].date);
      const gap = (curr - prev) / 86400000;
      if (gap <= 3) { cur.push(sickEntries[i]); } // ≤3 day gap = same illness (covers Fri–Sun)
      else { groups.push(cur); cur = [sickEntries[i]]; }
    }
    groups.push(cur);
    for (const grp of groups) {
      grp.forEach((entry, idx) => {
        const mult = idx === 0 ? 0 : idx < 3 ? 0.5 : 1.0;
        sickPay += entry.hours * rate * mult;
      });
    }
  }

  if (type === 'global') {
    const stats = getPersonalRangeStats(mEntries, settings, monthFrom, monthTo, jobPct, daysOff, customDailyHours);
    return { base, ot:0, total:base+tips+shiftBonus, worked:stats.worked, target:stats.target, expenses, tips, shiftBonus, sickPay:0 };
  }
  let baseTotal=0, otTotal=0;
  for (const d of daysInRange(monthFrom, monthTo)) {
    const dayEntries = mEntries.filter(e => e.date === ymd(d));
    if (!dayEntries.length) continue;
    const isSickDay = dayEntries.every(e => e.location === 'sick');
    if (isSickDay) continue; // sick pay is calculated separately above
    const worked = dayEntries.reduce((s,e)=>s+e.hours,0);
    if (!worked) continue;
    const target = getPersonalDailyTarget(d, settings, jobPct, daysOff, customDailyHours);
    const { regular, ot1, ot2 } = calcOvertimeBreakdown(worked, target);
    if (type === 'hourly') { baseTotal += regular*rate; otTotal += ot1*rate*1.25 + ot2*rate*1.5; }
    if (type === 'base_ot'){ otTotal  += ot1*rate*1.25 + ot2*rate*1.5; }
  }
  if (type === 'base_ot') baseTotal = base;
  const grossTotal = baseTotal + otTotal + tips + shiftBonus + sickPay;
  return { base:baseTotal, ot:otTotal, total:grossTotal, expenses, tips, shiftBonus, sickPay };
}

// ===== 2026 Israeli Net Salary Calculator =====
// Brackets updated for 2026 fiscal year.
const IL_TAX_BRACKETS_2026 = [
  { limit: 7010,      rate: 0.10 },
  { limit: 10060,     rate: 0.14 },
  { limit: 16150,     rate: 0.20 },
  { limit: 20870,     rate: 0.31 },
  { limit: 42530,     rate: 0.35 },
  { limit: 54930,     rate: 0.47 },
  { limit: Infinity,  rate: 0.50 },
];
const IL_CREDIT_POINT_2026 = 242;   // ₪ per month
const IL_MIN_WAGE_2026     = 7522;  // ₪/month
const IL_NI_CEILING_2026   = 49030; // ₪/month max for NI

function calcNetSalary2026(grossMonthly, creditPoints, pensionRate, studyFundRate, pensionablePct) {
  const cp       = parseFloat(creditPoints)   || 2.25;
  const penRate  = parseFloat(pensionRate)    || 6;
  const sfRate   = parseFloat(studyFundRate)  || 2.5;
  const penPct   = parseFloat(pensionablePct) || 100;

  // Income tax (מס הכנסה)
  let tax = 0, prev = 0;
  for (const b of IL_TAX_BRACKETS_2026) {
    if (grossMonthly <= prev) break;
    tax += (Math.min(grossMonthly, b.limit) - prev) * b.rate;
    prev = b.limit;
  }
  tax = Math.max(0, tax - cp * IL_CREDIT_POINT_2026);

  // National insurance — ביטוח לאומי (employee share)
  let ni = 0;
  if (grossMonthly <= IL_MIN_WAGE_2026) {
    ni = grossMonthly * 0.004;
  } else {
    const capped = Math.min(grossMonthly, IL_NI_CEILING_2026);
    ni = IL_MIN_WAGE_2026 * 0.004 + (capped - IL_MIN_WAGE_2026) * 0.07;
  }

  // Health insurance — ביטוח בריאות (employee share)
  let health = 0;
  if (grossMonthly <= IL_MIN_WAGE_2026) {
    health = grossMonthly * 0.031;
  } else {
    health = IL_MIN_WAGE_2026 * 0.031 + (grossMonthly - IL_MIN_WAGE_2026) * 0.05;
  }

  // Pension — פנסיה (employee contribution)
  const pensionableSalary = grossMonthly * (penPct / 100);
  const pension = pensionableSalary * (penRate / 100);

  // Study fund — קרן השתלמות (employee contribution)
  const studyFund = grossMonthly * (sfRate / 100);

  const totalDeductions = tax + ni + health + pension + studyFund;
  return {
    gross:      Math.round(grossMonthly),
    tax:        Math.round(tax),
    ni:         Math.round(ni),
    health:     Math.round(health),
    pension:    Math.round(pension),
    studyFund:  Math.round(studyFund),
    deductions: Math.round(totalDeductions),
    net:        Math.round(grossMonthly - totalDeductions),
  };
}

// ===================== Auth =====================
function useAuth() {
  const [currentUser, setCurrentUser] = useState(null);
  const [users, setUsersState] = useState([]);  // admin only
  const [loading, setLoading] = useState(true);

  // Restore session on mount
  useEffect(() => {
    const session = loadToken();
    if (session?.access_token) {
      sb._token = session.access_token;
      sb.getUser().then(async u => {
        if (u?.id) {
          await refreshProfile(u.id);
        } else if (session.refresh_token) {
          // Access token expired — try to refresh
          const res = await sb.refreshSession(session.refresh_token);
          if (res.access_token) {
            sb._token = res.access_token;
            saveToken({ access_token: res.access_token, refresh_token: res.refresh_token });
            await refreshProfile(res.user.id);
          } else {
            saveToken(null);
            setLoading(false);
          }
        } else {
          saveToken(null);
          setLoading(false);
        }
      });
    } else {
      setLoading(false);
    }
  }, []);

  const refreshProfile = async (userId) => {
    try {
      const rows = await sb.select('profiles', `id=eq.${userId}`);
      if (rows[0]) {
        setCurrentUser(rows[0]);
      } else {
        // Profile not created yet by trigger — wait and retry once
        await new Promise(r => setTimeout(r, 1500));
        const rows2 = await sb.select('profiles', `id=eq.${userId}`);
        if (rows2[0]) setCurrentUser(rows2[0]);
      }
    } catch(e) { console.error('profile load:', e); }
    setLoading(false);
  };

  const register = async ({ email, password, name }) => {
    email = (email || '').trim().toLowerCase();
    name  = (name  || '').trim();
    if (!email || !password || !name) return { error: 'נא למלא את כל השדות' };
    if (password.length < 6) return { error: 'הסיסמה חייבת להיות לפחות 6 תווים' };
    // Basic email format validation — prevents obviously fake addresses
    const emailOk = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/.test(email);
    if (!emailOk) return { error: 'כתובת האימייל אינה תקינה (דוגמה: user@company.com)' };
    const res = await sb.signUp(email, password, name);
    if (res.error) return { error: res.error.message || res.error };
    // Session may come back immediately if email confirmation is disabled
    if (res.access_token) {
      sb._token = res.access_token;
      saveToken({ access_token: res.access_token, refresh_token: res.refresh_token });
      await refreshProfile(res.user.id);
    }
    return { ok: true, needsConfirm: !res.access_token };
  };

  const login = async ({ email, password }) => {
    email = (email || '').trim().toLowerCase();
    const res = await sb.signIn(email, password);
    if (res.error || !res.access_token) {
      const msg = (res.error_description || res.error?.message || '').toLowerCase();
      // Email not confirmed in Supabase
      if (msg.includes('email not confirmed')) {
        return { error: 'האימייל טרם אומת. בדוק את תיבת הדואר שלך ולחץ על קישור האישור.', pendingVerification: true };
      }
      // Distinguish: user not found vs wrong password
      if (msg.includes('invalid login') || msg.includes('user not found') || msg.includes('no user')) {
        try {
          const rows = await fetch(`${sb._url}/rest/v1/profiles?email=eq.${encodeURIComponent(email)}&select=id`, {
            headers: { 'apikey': sb._key }
          }).then(r => r.json());
          if (Array.isArray(rows) && rows.length === 0) {
            return { error: 'כתובת האימייל הזו אינה רשומה', notRegistered: true };
          }
        } catch {}
      }
      return { error: 'אימייל או סיסמה שגויים' };
    }
    // Guard: block access if email is not confirmed (Supabase auto-confirm disabled)
    if (res.user && res.user.email_confirmed_at === null) {
      return { error: 'האימייל טרם אומת. בדוק את תיבת הדואר שלך ולחץ על קישור האישור.', pendingVerification: true };
    }
    sb._token = res.access_token;
    saveToken({ access_token: res.access_token, refresh_token: res.refresh_token });
    await refreshProfile(res.user.id);
    return { ok: true };
  };

  const logout = async () => {
    await sb.signOut();
    saveToken(null);
    savePunch(null);
    setCurrentUser(null);
  };

  // Admin: load all profiles
  const loadUsers = async () => {
    try {
      const rows = await sb.select('profiles', 'order=created_at.asc');
      setUsersState(rows);
    } catch {}
  };

  const setUsers = async (updatedList) => {
    // updatedList is the new full array after an admin action
    setUsersState(updatedList);
  };

  const updateJobPercent = async (userId, percent) => {
    try {
      await sb.updateProfile(userId, { job_percent: percent });
      setCurrentUser(u => ({ ...u, job_percent: percent }));
    } catch(e) { console.error('updateJobPercent:', e); }
  };

  const updateCustomHours = async (userId, customDailyHours) => {
    try {
      await sb.updateProfile(userId, { custom_daily_hours: customDailyHours });
      setCurrentUser(u => ({ ...u, custom_daily_hours: customDailyHours }));
    } catch(e) { console.error('updateCustomHours:', e); }
  };

  const updateSalaryConfig = async (userId, config) => {
    try {
      await sb.updateProfile(userId, config);
      setCurrentUser(u => ({ ...u, ...config }));
    } catch(e) {
      // New columns may not exist yet — strip them and retry with base fields only
      const { credit_points, pension_rate, study_fund_rate, pensionable_pct, ...rest } = config;
      if (Object.keys(rest).length < Object.keys(config).length) {
        try {
          await sb.updateProfile(userId, rest);
          setCurrentUser(u => ({ ...u, ...rest }));
          console.warn('updateSalaryConfig: new columns missing, saved base config only');
        } catch(e2) { console.error('updateSalaryConfig:', e2); }
      } else {
        console.error('updateSalaryConfig:', e);
      }
    }
  };

  return { currentUser, users, loadUsers, setUsers, register, login, logout, loading, updateJobPercent, updateCustomHours, updateSalaryConfig };
}

// Custom 24-hour time input — uncontrolled internals.
// React does NOT control the input values during typing.
// The parent receives updates only on blur or when both fields are filled.
function Time24Input({ value, onChange, required, id }) {
  const hRef = useRef(null);
  const mRef = useRef(null);
  // Track the last external value we've synced — only sync when parent
  // changes the value from outside (e.g. editEntry loading an existing record).
  const lastExternal = useRef(value);

  useEffect(() => {
    if (value !== lastExternal.current) {
      lastExternal.current = value;
      const [h2, m2] = (value || '').split(':');
      if (hRef.current) hRef.current.value = h2 ?? '';
      if (mRef.current) mRef.current.value = m2 ?? '';
    }
  }, [value]);

  // Set initial DOM value once on mount
  useEffect(() => {
    const [h2, m2] = (value || '').split(':');
    if (hRef.current) hRef.current.value = h2 ?? '';
    if (mRef.current) mRef.current.value = m2 ?? '';
    // eslint-disable-next-line
  }, []);

  const clamp = (n, max) => Math.min(max, Math.max(0, parseInt(n, 10) || 0));
  const pad = n => String(n).padStart(2, '0');

  const emit = () => {
    const h = pad(clamp(hRef.current?.value ?? 0, 23));
    const m = pad(clamp(mRef.current?.value ?? 0, 59));
    lastExternal.current = `${h}:${m}`;
    onChange(`${h}:${m}`);
  };

  const onHourInput = (e) => {
    // Strip non-digits
    const raw = e.target.value.replace(/\D/g, '').slice(0, 2);
    e.target.value = raw;
    // Auto-jump to minutes only when user has typed exactly 2 digits
    if (raw.length === 2) {
      mRef.current?.focus();
      mRef.current?.select();
      emit();
    }
  };

  const onHourBlur = () => {
    if (!hRef.current?.value) return;
    hRef.current.value = pad(clamp(hRef.current.value, 23));
    emit();
  };

  const onMinuteInput = (e) => {
    const raw = e.target.value.replace(/\D/g, '').slice(0, 2);
    e.target.value = raw;
    if (raw.length === 2) emit();
  };

  const onMinuteBlur = () => {
    if (!mRef.current?.value) return;
    mRef.current.value = pad(clamp(mRef.current.value, 59));
    emit();
  };

  const onMinuteKeyDown = (e) => {
    if (e.key === 'Backspace' && mRef.current?.value === '') {
      hRef.current?.focus();
    }
  };

  return (
    <div className="t24">
      <input
        ref={hRef}
        id={id}
        type="text"
        inputMode="numeric"
        pattern="[0-9]*"
        maxLength={2}
        placeholder="HH"
        defaultValue=""
        onInput={onHourInput}
        onBlur={onHourBlur}
        onFocus={(e) => e.target.select()}
        aria-label="שעה"
        required={required}
      />
      <span className="t24-sep">:</span>
      <input
        ref={mRef}
        type="text"
        inputMode="numeric"
        pattern="[0-9]*"
        maxLength={2}
        placeholder="MM"
        defaultValue=""
        onInput={onMinuteInput}
        onBlur={onMinuteBlur}
        onKeyDown={onMinuteKeyDown}
        onFocus={(e) => e.target.select()}
        aria-label="דקות"
        required={required}
      />
      <span className="t24-hint">24h</span>
    </div>
  );
}

function LoginScreen({ auth }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [error, setError] = useState('');
  const [info, setInfo] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setInfo(''); setBusy(true);
    if (mode === 'login') {
      const res = await auth.login({ email, password });
      if (res.error) {
        if (res.notRegistered) {
          setError('');
          setInfo('כתובת האימייל הזו אינה רשומה במערכת.');
          setMode('register');
        } else if (res.pendingVerification) {
          setError('');
          setInfo('📧 ' + res.error);
        } else {
          setError(res.error);
        }
      }
    } else {
      const res = await auth.register({ email, password, name });
      if (res.error) setError(res.error);
      else if (res.needsConfirm) setInfo('📧 נשלח אימייל אימות — אנא אשר את הכתובת ואז התחבר');
    }
    setBusy(false);
  };

  return (
    <div className="login-wrapper">
      <div className="login-card">
        <div className="login-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <h1 className="login-title">מעקב שעות צוות</h1>
        <p className="login-subtitle">{mode === 'login' ? 'התחברות למערכת' : 'יצירת חשבון חדש'}</p>

        {error && <div className="form-error">{error}</div>}
        {info  && <div className="form-success">{info}</div>}

        <form onSubmit={submit}>
          {mode === 'register' && (
            <div className="form-group">
              <label className="form-label">שם מלא</label>
              <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="ישראל ישראלי" autoComplete="name" />
            </div>
          )}
          <div className="form-group">
            <label className="form-label">אימייל</label>
            <input type="text" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" autoComplete="email" dir="ltr" style={{textAlign:'right'}} />
          </div>
          <div className="form-group">
            <label className="form-label">סיסמה</label>
            <PasswordInput
              value={password}
              onChange={e => setPassword(e.target.value)}
              autoComplete={mode === 'login' ? 'current-password' : 'new-password'}
            />
          </div>
          <button type="submit" className="btn btn-primary btn-block btn-lg" disabled={busy}>
            {busy ? '...' : mode === 'login' ? 'כניסה' : 'הרשמה'}
          </button>
        </form>

        <div className="toggle-auth">
          {mode === 'login' ? (
            <>אין לך חשבון?
              <button type="button" onClick={() => { setMode('register'); setError(''); }}>הרשמה</button>
            </>
          ) : (
            <>יש לך חשבון?
              <button type="button" onClick={() => { setMode('login'); setError(''); }}>כניסה</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ===================== Edit active punch modal =====================
// Lets the user adjust the start time of their currently running session,
// e.g. "I actually arrived at 9:00 but only clicked in at 9:17".
function PunchEditModal({ activePunch, onSave, onClose }) {
  const originalStart = new Date(activePunch.start);
  const originalDate = ymd(originalStart);
  const originalTime = fmtTime24(originalStart);

  const [date, setDate] = useState(originalDate);
  const [time, setTime] = useState(originalTime);
  const [error, setError] = useState('');
  const [expenses, setExpenses] = useState(() => activePunch.expenses || []);

  const addExpense = () => setExpenses(ex => [...ex, { type:'travel', amount:'', note:'' }]);
  const removeExpense = (i) => setExpenses(ex => ex.filter((_,idx)=>idx!==i));
  const updateExpense = (i, field, val) => setExpenses(ex => ex.map((x,idx)=>idx===i?{...x,[field]:val}:x));
  const expenseTotal = expenses.reduce((s,x)=>s+(parseFloat(x.amount)||0),0);

  const save = () => {
    if (!time || !date) {
      setError('נא למלא תאריך ושעה');
      return;
    }
    const newStart = new Date(`${date}T${normalizeTimeStr(time)}:00`);
    if (isNaN(newStart.getTime())) {
      setError('תאריך או שעה לא תקינים');
      return;
    }
    const now = new Date();
    if (newStart > now) {
      setError('שעת הכניסה לא יכולה להיות בעתיד');
      return;
    }
    // Sanity: don't let people backdate more than 24 hours
    const hoursAgo = (now - newStart) / 3600000;
    if (hoursAgo > 24) {
      if (!confirm('שעת הכניסה שהזנת היא יותר מ־24 שעות אחורה. להמשיך בכל זאת?')) return;
    }
    onSave(newStart.toISOString(), expenses);
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">עריכת שעת כניסה</div>

        <div style={{
          padding: '10px 14px',
          background: 'var(--surface-2)',
          borderRadius: 'var(--radius-sm)',
          marginBottom: 16,
          fontSize: 13,
        }}>
          <div style={{color:'var(--text-muted)'}}>נרשמה כניסה בפועל ב־</div>
          <div style={{fontWeight: 600, fontSize: 15, fontVariantNumeric: 'tabular-nums'}}>
            {originalTime}, {fmtDateIL(originalStart)}
          </div>
        </div>

        {error && <div className="form-error">{error}</div>}

        <div className="form-row">
          <div>
            <label className="form-label">תאריך</label>
            <input type="date" value={date} onChange={e => { setDate(e.target.value); setError(''); }} />
          </div>
          <div>
            <label className="form-label">שעת כניסה</label>
            <Time24Input value={time} onChange={(v) => { setTime(v); setError(''); }} />
            <div className="hint">פורמט 24 שעות, לדוגמה 09:15</div>
          </div>
        </div>

        <div className="divider" style={{margin:'16px 0'}} />
        <div style={{fontWeight:600, fontSize:14, marginBottom:10}}>הוצאות יומיות (אופציונלי)</div>
        {expenses.map((ex, i) => (
          <div className="expense-row" key={i}>
            <select value={ex.type} onChange={e=>updateExpense(i,'type',e.target.value)}>
              {Object.entries(EXPENSE_TYPES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
            <input type="number" min="0" step="1" placeholder="₪" value={ex.amount} onChange={e=>updateExpense(i,'amount',e.target.value)} />
            <input type="text" placeholder="הערה" value={ex.note} onChange={e=>updateExpense(i,'note',e.target.value)} />
            <button className="icon-btn danger" onClick={()=>removeExpense(i)} title="הסר">✕</button>
          </div>
        ))}
        <button className="btn btn-secondary btn-sm" onClick={addExpense} style={{marginBottom:8}}>+ הוסף הוצאה</button>
        {expenseTotal > 0 && <div className="expense-total">סה"כ הוצאות: <strong>₪{expenseTotal.toLocaleString('he-IL')}</strong></div>}

        <div className="form-actions">
          <button className="btn btn-primary" onClick={save}>שמירה</button>
          <button className="btn btn-secondary" onClick={onClose}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

// ===================== Target editor modal (admin) =====================
// Lets admin edit or reset the target hours for a specific date.
function TargetEditorModal({ date, settings, setSettings, onClose }) {
  const d = parseYmd(date);
  const holidayInfo = getHolidayInfo(d, settings);
  const dow = d.getDay();
  const isWeekend = dow === 5 || dow === 6;
  const defaultHours = isWeekend ? 0 : (settings.standardHours?.[dow] ?? 0);
  const currentTarget = getDailyTarget(d, settings);

  const existingOverride = settings.overrides?.[date];
  const builtinHoliday = ISRAELI_HOLIDAYS[date];
  const isDisabledBuiltin = (settings.disabledHolidays || []).includes(date);

  const [hours, setHours] = useState(String(currentTarget));
  const [note, setNote] = useState(existingOverride?.note || '');

  const save = () => {
    const n = parseFloat(hours);
    if (isNaN(n) || n < 0 || n > 24) {
      alert('הזן מספר שעות תקין (בין 0 ל־24)');
      return;
    }
    setSettings({
      ...settings,
      overrides: {
        ...settings.overrides,
        [date]: {
          hours: n,
          note: note.trim() || (builtinHoliday ? builtinHoliday.note : 'חריגה'),
          type: 'custom',
        }
      }
    });
    onClose();
  };

  // "Reset" = remove this date's override and (if it was a builtin holiday that was disabled) re-enable it
  const reset = () => {
    const { [date]: _, ...restOverrides } = settings.overrides || {};
    const next = { ...settings, overrides: restOverrides };
    if (isDisabledBuiltin) {
      next.disabledHolidays = (settings.disabledHolidays || []).filter(k => k !== date);
    }
    setSettings(next);
    onClose();
  };

  // "Mark as regular workday" = disable the builtin holiday for this date AND remove any override
  const markRegular = () => {
    const { [date]: _, ...restOverrides } = settings.overrides || {};
    const next = { ...settings, overrides: restOverrides };
    if (builtinHoliday && !isDisabledBuiltin) {
      next.disabledHolidays = [...(settings.disabledHolidays || []), date];
    }
    setSettings(next);
    onClose();
  };

  // Source explanation for the current target
  let sourceLabel, sourceDetail;
  if (existingOverride) {
    sourceLabel = 'חריגה מותאמת אישית';
    sourceDetail = existingOverride.note || '—';
  } else if (holidayInfo?.source === 'builtin') {
    sourceLabel = HOLIDAY_TYPES[holidayInfo.type]?.label || 'חג';
    sourceDetail = holidayInfo.note;
  } else if (isWeekend) {
    sourceLabel = 'סוף שבוע';
    sourceDetail = 'ימי שישי ושבת אינם ימי עבודה';
  } else {
    sourceLabel = 'תקן יומי רגיל';
    sourceDetail = `ברירת מחדל ליום ${HEB_DAYS[dow]}: ${fmtHours(defaultHours)}`;
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">
          עריכת יעד ליום {HEB_DAYS[dow]}, {fmtDateIL(d)}
        </div>

        <div style={{
          padding: '12px 14px',
          background: 'var(--surface-2)',
          borderRadius: 'var(--radius-sm)',
          marginBottom: 16,
          fontSize: 13,
        }}>
          <div style={{color:'var(--text-muted)', marginBottom: 4}}>מקור היעד הנוכחי</div>
          <div style={{fontWeight: 500}}>{sourceLabel} — {fmtHours(currentTarget)}</div>
          <div style={{color:'var(--text-muted)', marginTop: 2}}>{sourceDetail}</div>
        </div>

        <div className="form-group">
          <label className="form-label">מספר שעות יעד</label>
          <input
            type="number" step="0.25" min="0" max="24"
            value={hours}
            onChange={e => setHours(e.target.value)}
            autoFocus
          />
          <div className="hint">הזן 0 ליום חופש מלא. חריגה מותאמת אישית גוברת על כל הגדרה אחרת.</div>
        </div>

        <div className="form-group">
          <label className="form-label">תיאור (אופציונלי)</label>
          <input
            type="text"
            value={note}
            onChange={e => setNote(e.target.value)}
            placeholder="סיבה לשינוי, למשל: יום קצר, חצי חג, אירוע חברה..."
          />
        </div>

        <div className="form-actions" style={{justifyContent: 'space-between'}}>
          <div style={{display:'flex', gap: 8, flexWrap: 'wrap'}}>
            <button className="btn btn-primary" onClick={save}>שמירה</button>
            <button className="btn btn-secondary" onClick={onClose}>ביטול</button>
          </div>
          <div style={{display:'flex', gap: 8, flexWrap: 'wrap'}}>
            {(existingOverride || isDisabledBuiltin) && (
              <button className="btn btn-ghost btn-sm" onClick={reset} title="החזרה להגדרת ברירת המחדל">
                איפוס לברירת מחדל
              </button>
            )}
            {builtinHoliday && !isDisabledBuiltin && !existingOverride && (
              <button className="btn btn-ghost btn-sm" onClick={markRegular} title="ביטול החג ליום זה בלבד">
                סמן כיום עבודה רגיל
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== ProactiveAlert =====
function ProactiveAlert({ entries, settings, user, daysOff }) {
  const [dismissed, setDismissed] = useState(false);
  const missing = useMemo(() => {
    const today = new Date();
    const weekStart = startOfWeek(today);
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
    const to = yesterday < weekStart ? new Date(weekStart.getTime()-1) : yesterday;
    if (to < weekStart) return [];
    const daysOffDates = (daysOff||[]).map(d=>d.date);
    return detectMissingDays(entries, settings, weekStart, to, user.job_percent??100, daysOffDates, user.custom_daily_hours||null);
  }, [entries, settings, user, daysOff]);
  if (!missing.length || dismissed) return null;
  const dayNames = missing.map(m=>{const d=parseYmd(m.date);return `יום ${HEB_DAYS[d.getDay()]} (${fmtDateILShort(d)})`;}).join(', ');
  return (
    <div className="alert-banner">
      <div className="alert-banner-icon">⚠️</div>
      <div className="alert-banner-body">
        <div className="alert-banner-title">לא דווחו שעות השבוע</div>
        <div className="alert-banner-text">{dayNames}</div>
      </div>
      <button className="alert-banner-close" onClick={()=>setDismissed(true)}>×</button>
    </div>
  );
}

// ===== SalaryWidget =====
function SalaryWidget({ user, entries, settings, daysOff, onConfigure }) {
  const [masked, setMasked] = React.useState(() => localStorage.getItem('tt_privacy') === '1');
  const toggleMask = () => setMasked(v => { const nv=!v; nv?localStorage.setItem('tt_privacy','1'):localStorage.removeItem('tt_privacy'); return nv; });
  const rate = parseFloat(user.hourly_rate)||0;
  const base = parseFloat(user.base_salary)||0;
  if (!rate && !base) return (
    <div className="salary-widget" style={{display:'flex',alignItems:'center',gap:12}}>
      <div style={{flex:1,fontSize:13,color:'var(--text-muted)'}}>הגדר שכר כדי לראות הכנסה חודשית משוערת</div>
      <button className="btn btn-secondary btn-sm" onClick={onConfigure}>הגדרת שכר</button>
    </div>
  );
  const today = new Date();
  const mFrom = new Date(today.getFullYear(), today.getMonth(), 1);

function SmartFillModal({ entries, settings, user, daysOff, onFill, onClose }) {
  const daysOffDates = (daysOff||[]).map(d=>d.date);
  const today = new Date();
  const mFrom = new Date(today.getFullYear(), today.getMonth(), 1);
  const mTo   = new Date(today.getFullYear(), today.getMonth()+1, 0);
  const missing = detectMissingDays(entries, settings, mFrom, mTo, user.job_percent??100, daysOffDates, user.custom_daily_hours||null);
  const pattern = suggestHistoricalPattern(entries);
  const [selected, setSelected] = useState(() => new Set(missing.map(m=>m.date)));
  const [busy, setBusy] = useState(false);
  const toggle = d => setSelected(s=>{const n=new Set(s); n.has(d)?n.delete(d):n.add(d); return n;});
  const toHHMM = h => { const hh=Math.floor(h); const mm=Math.round((h-hh)*60); return `${String(hh).padStart(2,'0')}:${String(mm>=60?0:mm).padStart(2,'0')}`; };
  const fill = async () => {
    setBusy(true);
    const newEntries = missing.filter(m=>selected.has(m.date)).map(m => {
      const endH = timeStrToHours(pattern.start) + m.target;
      return { id:'e_sf_'+m.date+'_'+Math.random().toString(36).slice(2,6), date:m.date, hours:m.target, start:pattern.start, end:toHHMM(endH), note:'מילוי חכם', mode:'range', location:'office', viaPunch:false, expenses:[], createdAt:new Date().toISOString() };
    });
    if (newEntries.length) await onFill(newEntries);
    onClose();
  };
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">מילוי חכם — {HEB_MONTHS[today.getMonth()]} {today.getFullYear()}</div>
        {missing.length===0 ? (
          <div className="empty"><div className="empty-icon">✅</div><div className="empty-title">כל הימים מולאו</div></div>
        ) : (<>
          <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:12}}>
            {missing.length} ימים ללא דיווח | הצעה לפי ממוצע היסטורי: {pattern.start}–{pattern.end}
          </div>
          <div style={{maxHeight:320,overflowY:'auto'}}>
            {missing.map(m=>{
              const d=parseYmd(m.date);
              return (
                <label key={m.date} className="smartfill-day">
                  <input type="checkbox" className="smartfill-check" checked={selected.has(m.date)} onChange={()=>toggle(m.date)}/>
                  <div className="smartfill-date">{fmtDateILShort(d)} ({HEB_DAYS[d.getDay()]})</div>
                  <div className="smartfill-meta">יעד: {fmtHours(m.target)} | {pattern.start}–{pattern.end}</div>
                </label>
              );
            })}
          </div>
          <div className="form-actions">
            <button className="btn btn-primary" onClick={fill} disabled={busy||!selected.size}>{busy?'שומר...':`מלא ${selected.size} ימים`}</button>
            <button className="btn btn-secondary" onClick={onClose}>ביטול</button>
          </div>
        </>)}
      </div>
    </div>
  );
}

// ===== GeofenceSection =====
function GeofenceSection() {
  const [enabled, setEnabled] = useState(()=>localStorage.getItem('tt_geo_enabled')==='1');
  const [coords, setCoords] = useState(()=>{ try{return JSON.parse(localStorage.getItem('tt_geo_coords')||'null');}catch{return null;} });
  const [radius, setRadius] = useState(()=>parseInt(localStorage.getItem('tt_geo_radius')||'200'));
  const [status, setStatus] = useState('');
  const setOfficeHere = () => {
    if (!navigator.geolocation) { setStatus('Geolocation אינו נתמך בדפדפן זה'); return; }
    navigator.geolocation.getCurrentPosition(pos=>{
      const c={lat:pos.coords.latitude,lng:pos.coords.longitude};
      localStorage.setItem('tt_geo_coords',JSON.stringify(c));
      setCoords(c); setStatus('✓ מיקום המשרד נשמר');
      setTimeout(()=>setStatus(''),3000);
    },()=>setStatus('שגיאה בקבלת מיקום'));
  };
  const toggle = v => { setEnabled(v); v?localStorage.setItem('tt_geo_enabled','1'):localStorage.removeItem('tt_geo_enabled'); };
  const saveRadius = v => { setRadius(v); localStorage.setItem('tt_geo_radius',String(v)); };
  return (
    <div>
      <div className="admin-section-title" style={{marginBottom:6}}>תזכורות מבוססות מיקום</div>
      <div className="geo-disclaimer">🔒 כבוי כברירת מחדל. המיקום נבדק <strong>מקומית בדפדפן בלבד</strong> ואינו נשלח לשרת.</div>
      <label style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,cursor:'pointer'}}>
        <input type="checkbox" checked={enabled} onChange={e=>toggle(e.target.checked)}/>
        <span>הפעל תזכורות מיקום</span>
      </label>
      {enabled && (
        <div>
          <button className="btn btn-secondary btn-sm" onClick={setOfficeHere} style={{marginBottom:8}}>📍 הגדר מיקום נוכחי כמשרד</button>
          {coords && <div className="geo-coords">📌 {coords.lat.toFixed(5)}, {coords.lng.toFixed(5)}</div>}
          {!coords && <div style={{fontSize:13,color:'var(--text-muted)'}}>לא הוגדר מיקום משרד</div>}
          <div style={{marginTop:12}}>
            <label className="form-label">רדיוס גילוי (מטרים)</label>
            <input type="number" min="50" max="2000" step="50" value={radius} onChange={e=>saveRadius(parseInt(e.target.value))} style={{maxWidth:120}}/>
          </div>
          {status && <div style={{fontSize:13,color:'var(--success)',marginTop:8}}>{status}</div>}
        </div>
      )}
    </div>
  );
}

function Dashboard({ user, auth, entries, settings, setSettings, activePunch, onPunch, onEditPunch, daysOff = [] }) {
  const [now, setNow] = useState(new Date());
  const [weekOffset, setWeekOffset] = useState(0);
  const [editingTargetDate, setEditingTargetDate] = useState(null); // 'YYYY-MM-DD' or null
  const [editingPunch, setEditingPunch] = useState(false);
  // Location for the *next* punch-in (or currently active punch, if any)
  const [location, setLocation] = useState(() => activePunch?.location || DEFAULT_LOCATION);
  const isAdmin = user.role === 'admin';
  const jobPercent = user.job_percent ?? 100;
  const customDailyHours = user.custom_daily_hours || null;
  const daysOffDates = daysOff.map(d => d.date);

  // Keep location in sync with the active punch when starting/stopping
  useEffect(() => {
    if (activePunch?.location) setLocation(activePunch.location);
  }, [activePunch?.location]);

  useEffect(() => {
    if (!activePunch) return;
    const i = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(i);
  }, [activePunch]);

  const today = new Date();
  const todayTarget = getPersonalDailyTarget(today, settings, jobPercent, daysOffDates, customDailyHours);
  const todayWorked = getWorkedOnDate(entries, today);
  const liveAdd = activePunch ? sessionDuration({ start: activePunch.start }) : 0;
  const todayTotal = todayWorked + liveAdd;

  // Displayed week = current week + offset (negative = past, positive = future)
  const displayedBase = new Date(today);
  displayedBase.setDate(displayedBase.getDate() + weekOffset * 7);
  const weekStart = startOfWeek(displayedBase);
  const weekEnd = endOfWeek(displayedBase);
  const weekStats = getPersonalRangeStats(entries, settings, weekStart, weekEnd, jobPercent, daysOffDates, customDailyHours);
  const isCurrentWeek = weekOffset === 0;
  // Live-punch time only counts in the "current" week stat context
  const weekTotal = weekStats.worked + (isCurrentWeek ? liveAdd : 0);

  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
  const monthStats = getPersonalRangeStats(entries, settings, monthStart, monthEnd, jobPercent, daysOffDates, customDailyHours);
  const monthTotal = monthStats.worked + liveAdd;

  // Weekly averages over last 4 complete weeks
  const weeklyAvgs = useMemo(() => {
    let totalWorked = 0, totalTarget = 0;
    for (let w = -1; w >= -4; w--) {
      const base = new Date(today); base.setDate(base.getDate() + w * 7);
      const ws = getPersonalRangeStats(entries, settings, startOfWeek(base), endOfWeek(base), jobPercent, daysOffDates, customDailyHours);
      totalWorked += ws.worked; totalTarget += ws.target;
    }
    return { weeklyAvg: totalWorked / 4, dailyAvg: totalWorked / 20 };
  }, [entries, settings, jobPercent]);

  const todayPct = todayTarget > 0 ? (todayTotal / todayTarget) * 100 : (todayTotal > 0 ? 100 : 0);
  const weekPct = weekStats.target > 0 ? (weekTotal / weekStats.target) * 100 : 0;
  const monthPct = monthStats.target > 0 ? (monthTotal / monthStats.target) * 100 : 0;

  const barClass = (pct) => {
    if (pct >= 100) return 'complete';
    return '';
  };

  const renderStat = (label, worked, target, pct, showRemaining = true) => {
    const diff = worked - target;
    return (
      <div className="stat-card">
        <div className="stat-label">{label}</div>
        <div className="stat-value">{fmtHours(worked)}</div>
        <div className="stat-target">מתוך יעד {fmtHours(target)}</div>
        <div className="stat-bar">
          <div
            className={`stat-bar-fill ${barClass(pct)}`}
            style={{ width: Math.min(100, Math.max(0, pct)) + '%' }}
          />
        </div>
        {showRemaining && target > 0 && (
          <div className={`stat-diff ${diff >= 0 ? 'positive' : 'negative'}`}>
            {diff >= 0 ? '+' : ''}{fmtHours(diff)} {diff >= 0 ? 'מעל היעד' : 'נותרו להשלמה'}
          </div>
        )}
      </div>
    );
  };

  const punchStart = () => onPunch({ action: 'start', location });
  const punchStop = () => onPunch({ action: 'stop', location });

  const liveTime = activePunch ? fmtHours(liveAdd) : null;
  const startTime = activePunch ? new Date(activePunch.start) : null;
  const [showSalaryCfg, setShowSalaryCfg] = useState(false);

  return (
    <div>
      {showSalaryCfg && <SalaryConfigModal user={user} auth={auth} onClose={()=>setShowSalaryCfg(false)}/>}

      <div className="card" style={{marginBottom: 20}}>
        <div className="row-between">
          <div>
            <div className="card-title" style={{margin:0}}>שלום {user.name} 👋</div>
            <div style={{color:'var(--text-muted)', fontSize:13, marginTop:4}}>
              {HEB_DAYS[today.getDay()]}, {today.getDate()} ב{HEB_MONTHS[today.getMonth()]} {today.getFullYear()}
            </div>
          </div>
        </div>
      </div>

      <div className="card" style={{marginBottom: 20}}>
        <div className="card-title">כניסה/יציאה מהירה</div>
        <div className="punch-panel">
          <div className={`punch-status ${activePunch ? 'active' : ''}`}>
            <div className="punch-status-label">
              {activePunch ? 'בעבודה כרגע' : 'לא בעבודה'}
            </div>
            <div className="punch-status-time">
              {activePunch ? liveTime : '--:--'}
            </div>
            <div className="punch-status-sub">
              {activePunch ? (
                <>
                  נכנסת ב־<strong style={{color:'var(--text)', fontVariantNumeric:'tabular-nums'}}>{fmtTime24(startTime)}</strong>
                  <button
                    type="button"
                    className="edit-time-link"

                  >
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    עריכה
                  </button>
                </>
              ) : 'בחר מיקום ולחץ על "כניסה"'}
            </div>

          <LocationToggle value={location} onChange={setLocation} />
          {activePunch ? (
            <button className="btn btn-danger btn-lg btn-block" onClick={punchStop}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>

          <div className="stat-label">ממוצע שבועי</div>
          <div className="stat-value">{fmtHours(weeklyAvgs.weeklyAvg)}</div>
